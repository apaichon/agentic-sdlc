<title>Figure 4.2 — Three-Phase PRD Generation Workflow</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#F0F2F5;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; min-height:100vh;
    font-family:system-ui,-apple-system,sans-serif; user-select:none;
  }
  .container { width:1200px; height:700px; position:relative; cursor:pointer; }
  svg { width:100%; height:100%; }

  /* ── progress chrome ── */
  #click-hint {
    margin-top:12px; font-size:12px; color:#64748b;
    letter-spacing:.05em; display:flex; align-items:center; gap:8px;
  }
  #click-hint .key {
    background:#e2e8f0; border:1px solid #cbd5e1;
    border-radius:5px; padding:2px 9px; font-size:11px; color:#475569;
  }
  #step-counter { font-size:11px; color:#94a3b8; margin-top:5px; letter-spacing:.08em; }
  #progress-bar { display:flex; gap:8px; margin-top:10px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#e2e8f0; transition:background .3s, transform .3s; }
  .dot.done   { background:#0E7490; }
  .dot.active { background:#3b82f6; transform:scale(1.4); }

  /* ── step-item: two-level nesting pattern ── */
  /* The outer g.step-item has NO transform attribute in SVG. */
  /* The inner g has transform="translate(X,Y)". */
  .step-item {
    opacity:0;
    transform:scale(.88);
    transform-origin:50% 50%;
    transform-box:fill-box;
    transition:opacity .5s ease, transform .5s ease;
  }
  .step-item.visible { opacity:1; transform:scale(1); }

  /* arrows are shown/hidden via JS style directly — no class toggle */
  .arrow-draw { opacity:0; stroke-dasharray:1; stroke-dashoffset:1; }

  /* ── continuous animations ── */
  @keyframes glowPulse {
    0%,100%{ opacity:.25; r:38px; }
    50%    { opacity:.55; r:46px; }
  }
  @keyframes rotateSlow {
    from{ transform:rotate(0deg); }
    to  { transform:rotate(360deg); }
  }
  @keyframes nodePing {
    0%,100%{ opacity:0; r:5px; }
    50%    { opacity:.8; r:11px; }
  }
  @keyframes floatIn {
    0%  { opacity:0; transform:translateY(6px); }
    100%{ opacity:1; transform:translateY(0);   }
  }

  #ai-glow.active    { animation:glowPulse 2.8s ease-in-out infinite; }
  #ai-ring.active    { animation:rotateSlow 14s linear infinite; opacity:.35; }
  .ping-dot.active   { animation:nodePing 2.2s ease-in-out infinite; }
</style>
</head>

<!-- Progress / navigation chrome -->
<div id="progress-bar"></div>
<div id="step-counter">STEP 0 / 12</div>
<div id="click-hint">
  <span class="key">CLICK</span> advance &nbsp;·&nbsp;
  <span class="key">RIGHT-CLICK</span> back &nbsp;·&nbsp;
  <span class="key">← →</span> step &nbsp;·&nbsp;
  <span class="key">Home</span> start &nbsp;·&nbsp;
  <span class="key">End</span> finish
</div>

<script>
const TOTAL = 12;
let step = -1;

function buildDots() {
  const bar = document.getElementById('progress-bar');
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + i;
    bar.appendChild(d);
  }
}

function showArrow(el) {
  // Reset to hidden state
  el.style.transition = 'none';
  el.style.opacity = '0';
  el.style.strokeDashoffset = '1';
  // Force reflow so the browser registers the reset before transitioning
  el.getBoundingClientRect();
  // Now animate in
  el.style.transition = 'opacity 0.05s ease, stroke-dashoffset 0.6s ease 0.05s';
  el.style.opacity = '1';
  el.style.strokeDashoffset = '0';
}

function hideArrow(el) {
  el.style.transition = 'none';
  el.style.opacity = '0';
  el.style.strokeDashoffset = '1';
}

function render() {
  document.querySelectorAll('[data-step]').forEach(el => {
    if (parseInt(el.dataset.step) <= step) {
      if (el.classList.contains('arrow-draw')) {
        showArrow(el);
      } else {
        el.classList.add('visible');
      }
    } else {
      if (el.classList.contains('arrow-draw')) {
        hideArrow(el);
      } else {
        el.classList.remove('visible');
      }
    }
  });

  // Activate idle animations when AI agent appears (step 5)
  const aiGlow = document.getElementById('ai-glow');
  const aiRing = document.getElementById('ai-ring');
  if (step >= 5) {
    aiGlow && aiGlow.classList.add('active');
    aiRing && aiRing.classList.add('active');
    document.querySelectorAll('.ping-dot').forEach(d => d.classList.add('active'));
  } else {
    aiGlow && aiGlow.classList.remove('active');
    aiRing && aiRing.classList.remove('active');
    document.querySelectorAll('.ping-dot').forEach(d => d.classList.remove('active'));
  }

  // Update progress dots
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) d.className = 'dot' + (i < step ? ' done' : i === step ? ' active' : '');
  }
  document.getElementById('step-counter').textContent = `STEP ${step} / ${TOTAL}`;
}

function nextStep() { if (step < TOTAL) { step++; render(); } }
function prevStep()  { if (step > 0)    { step--; render(); } }

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); prevStep(); }
  if (e.key === 'Home')       { step = 0; render(); }
  if (e.key === 'End')        { step = TOTAL; render(); }
});

// Right-click goes back
document.getElementById('slide').addEventListener('contextmenu', e => {
  e.preventDefault();
  prevStep();
});

buildDots();
nextStep(); // auto-advance to step 0 on load
</script>
