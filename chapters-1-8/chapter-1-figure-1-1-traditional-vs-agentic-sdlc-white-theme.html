<head>
<meta charset="UTF-8">

<title>Traditional SDLC vs. Agentic SDLC Pipeline Comparison</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#1a1a2e; display:flex; flex-direction:column;
    align-items:center; justify-content:center; min-height:100vh;
    font-family:system-ui,-apple-system,sans-serif; user-select:none;
  }
  .container { width:1200px; height:700px; position:relative; cursor:pointer; }
  svg { width:100%; height:100%; }

  #click-hint { margin-top:14px; font-size:13px; color:#94a3b8; letter-spacing:.05em; display:flex; align-items:center; gap:8px; }
  #click-hint .key { background:#334155; border:1px solid #475569; border-radius:6px; padding:2px 10px; font-size:12px; color:#cbd5e1; }
  #step-counter { font-size:12px; color:#64748b; margin-top:6px; letter-spacing:.08em; }
  #progress-bar { display:flex; gap:8px; margin-top:10px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#334155; transition:background .3s, transform .3s; }
  .dot.done   { background:#0E7490; }
  .dot.active { background:#38BDF8; transform:scale(1.4); }

  /* ── reveal classes ── */
  .step-item { opacity:0; transform:scale(.88); transform-origin:center; transition:opacity .5s ease, transform .5s ease; }
  .step-item.visible { opacity:1; transform:scale(1); }

  .arrow-draw { opacity:0; stroke-dashoffset:200; transition:opacity .1s, stroke-dashoffset .6s ease; }
  .arrow-draw.visible { opacity:1; stroke-dashoffset:0; }

  .badge-item { opacity:0; transform:scale(0); transform-origin:center; transition:opacity .4s ease, transform .4s cubic-bezier(.34,1.56,.64,1); }
  .badge-item.visible { opacity:1; transform:scale(1); }

  /* ── continuous ── */
  @keyframes dashFlow   { to { stroke-dashoffset:-24; } }
  @keyframes glowPulse  { 0%,100%{opacity:.15} 50%{opacity:.5} }
  @keyframes rotateSlow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes nodePing   { 0%,100%{opacity:0;r:6} 50%{opacity:.7;r:13} }
  @keyframes slideDown  { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeRight  { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }

  .spoke-line.visible { animation:dashFlow 1.8s linear infinite; }
  #ai-glow.active     { animation:glowPulse 2.8s ease-in-out infinite; }
  #ai-ring.active     { animation:rotateSlow 10s linear infinite; opacity:.35; }
  .ping-dot.active    { animation:nodePing 2.4s ease-in-out infinite; }

  .trad-arrow.visible { animation:none; } /* static draw-on only */
</style>
</head>

  &nbsp;·&nbsp;
  <span class="key">←</span> back &nbsp;·&nbsp;
  <span class="key">HOME</span> reset &nbsp;·&nbsp; <span class="key">END</span> skip to end
</div>

<script>
const TOTAL = 12;
let step = -1;

function buildDots() {
  const bar = document.getElementById('progress-bar');
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + i;
    bar.appendChild(d);
  }
}

function renderStep() {
  document.querySelectorAll('[data-step]').forEach(el => {
    const itemStep = parseInt(el.dataset.step, 10);
    el.classList.toggle('visible', !Number.isNaN(itemStep) && itemStep <= step);
  });
  document.getElementById('ai-glow')?.classList.toggle('active', step >= 6);
  document.getElementById('ai-ring')?.classList.toggle('active', step >= 6);
  document.querySelectorAll('.ping-dot').forEach(d => {
    const itemStep = parseInt(d.dataset.step, 10);
    d.classList.toggle('active', !Number.isNaN(itemStep) && itemStep <= step);
  });
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) d.className = 'dot' + (i < step ? ' done' : i === step ? ' active' : '');
  }
  document.getElementById('step-counter').textContent = `STEP ${step} / ${TOTAL}`;
}

function nextStep() {
  if (step >= TOTAL) return;
  step++;
  renderStep();
}

function prevStep() {
  if (step <= 0) return;
  step--;
  renderStep();
}

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
  if (e.key === 'Home') location.reload();
  if (e.key === 'End') { while (step < TOTAL) nextStep(); }
});
document.addEventListener('contextmenu', e => { e.preventDefault(); prevStep(); });

buildDots();
nextStep(); // show step 0 immediately
</script>
