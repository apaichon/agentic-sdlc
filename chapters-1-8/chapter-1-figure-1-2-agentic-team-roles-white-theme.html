<title>Agentic Team Roles — Claude Code Orchestration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, sans-serif;
    user-select: none;
  }
  .container {
    width: 1200px;
    height: 700px;
    position: relative;
    cursor: pointer;
  }
  svg { width: 100%; height: 100%; }

  #click-hint {
    margin-top: 14px;
    font-size: 13px;
    color: #94a3b8;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #click-hint .key {
    background: #334155;
    border: 1px solid #475569;
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 12px;
    color: #cbd5e1;
  }
  #step-counter {
    font-size: 12px;
    color: #64748b;
    margin-top: 6px;
    letter-spacing: 0.08em;
  }
  #progress-bar {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #334155;
    transition: background 0.3s, transform 0.3s;
  }
  .dot.done   { background: #0E7490; }
  .dot.active { background: #38BDF8; transform: scale(1.4); }

  /* ── base animation classes ── */
  .step-item {
    opacity: 0;
    transition: opacity 0.5s ease, transform 0.5s ease;
    transform: scale(0.88);
    transform-origin: center;
  }
  .step-item.visible { opacity: 1; transform: scale(1); }

  .arrow-draw {
    opacity: 0;
    stroke-dashoffset: 120;
    transition: opacity 0.1s, stroke-dashoffset 0.55s ease;
  }
  .arrow-draw.visible { opacity: 1; stroke-dashoffset: 0; }

  .badge-item {
    opacity: 0;
    transform: scale(0);
    transform-origin: center;
    transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .badge-item.visible { opacity: 1; transform: scale(1); }

  /* ── continuous animations ── */
  @keyframes dashFlow   { to { stroke-dashoffset: -20; } }
  @keyframes glowPulse  { 0%,100%{opacity:.2;r:52} 50%{opacity:.55;r:62} }
  @keyframes rotateSlow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes nodePing   { 0%,100%{opacity:0;r:5} 50%{opacity:.8;r:11} }

  .spoke-line.visible { animation: dashFlow 1.6s linear infinite; }
  #center-pulse.active { animation: glowPulse 2.8s ease-in-out infinite; }
  #center-ring.active  { animation: rotateSlow 12s linear infinite; opacity: .4; }
  .ping-dot.active     { animation: nodePing 2.2s ease-in-out infinite; }
</style>
</head>

  <span>Click slide or press</span>
  <span class="key">Space</span>
  <span>/</span>
  <span class="key">→</span>
  <span>to advance &nbsp;·&nbsp;</span>
  <span class="key">←</span>
  <span>to go back &nbsp;·&nbsp;</span>
  <span class="key">R</span>
  <span>to reset</span>
</div>
<div id="step-counter">Step <span id="cur">0</span> / <span id="total">10</span></div>
<div id="progress-bar"></div>

<script>
const TOTAL_STEPS = 10;

const STEP_ELEMENTS = {
  0:  ['title-group'],
  1:  ['center-hub'],
  2:  ['spoke-pm',    'panel-pm'],
  3:  ['artifact-pm-1', 'artifact-pm-2', 'artifact-pm-3'],
  4:  ['spoke-dev',   'panel-dev'],
  5:  ['artifact-dev-1', 'artifact-dev-2', 'artifact-dev-3'],
  6:  ['spoke-test',  'panel-test'],
  7:  ['artifact-test-1', 'artifact-test-2', 'artifact-test-3'],
  8:  ['spoke-devops','panel-devops'],
  9:  ['artifact-devops-1','artifact-devops-2','artifact-devops-3'],
  10: ['legend'],
};

let currentStep = -1;

// Build progress dots
const bar = document.getElementById('progress-bar');
for (let i = 0; i <= TOTAL_STEPS; i++) {
  const d = document.createElement('div');
  d.className = 'dot';
  d.id = `dot-${i}`;
  bar.appendChild(d);
}

function updateDots() {
  for (let i = 0; i <= TOTAL_STEPS; i++) {
    const d = document.getElementById(`dot-${i}`);
    if (i < currentStep) d.className = 'dot done';
    else if (i === currentStep) d.className = 'dot active';
    else d.className = 'dot';
  }
}

function showStep(step) {
  const ids = STEP_ELEMENTS[step] || [];
  ids.forEach((id, idx) => {
    const el = document.getElementById(id);
    if (!el) return;
    // slight stagger for multi-element steps
    setTimeout(() => el.classList.add('visible'), idx * 80);
  });

  if (step === 1) {
    document.getElementById('center-pulse').classList.add('active');
    document.getElementById('center-ring').classList.add('active');
    document.getElementById('center-ring').style.opacity = '0.4';
    try { document.querySelector('animate[id="pulse-expand"]').beginElement(); } catch(e) {}
  }
  if (step === 10) {
    document.querySelectorAll('.ping-dot').forEach(d => d.classList.add('active'));
  }
}

function hideStep(step) {
  const ids = STEP_ELEMENTS[step] || [];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('visible');
  });

  if (step === 1) {
    document.getElementById('center-pulse').classList.remove('active');
    document.getElementById('center-ring').classList.remove('active');
    document.getElementById('center-ring').style.opacity = '0';
  }
  if (step === 10) {
    document.querySelectorAll('.ping-dot').forEach(d => d.classList.remove('active'));
  }
}

function nextStep() {
  if (currentStep >= TOTAL_STEPS) {
    for (let i = 0; i <= TOTAL_STEPS; i++) hideStep(i);
    currentStep = -1;
  }
  currentStep++;
  showStep(currentStep);
  document.getElementById('cur').textContent = currentStep;
  updateDots();
}

function prevStep() {
  if (currentStep <= 0) return;
  hideStep(currentStep);
  currentStep--;
  document.getElementById('cur').textContent = currentStep;
  updateDots();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); prevStep(); }
  if (e.key === 'r' || e.key === 'R') {
    for (let i = 0; i <= TOTAL_STEPS; i++) hideStep(i);
    currentStep = -1;
    document.getElementById('cur').textContent = 0;
    updateDots();
  }
});

// Start at step 0
nextStep();
</script>
