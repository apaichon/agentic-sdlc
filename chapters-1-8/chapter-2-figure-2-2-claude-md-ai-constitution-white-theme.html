<script>
const TOTAL = 6;
let step = -1;
function buildDots() {
  const bar = document.getElementById('progress-bar');
  for (let i = 0; i <= TOTAL; i++) { const d=document.createElement('div'); d.className='dot'; d.id='dot-'+i; bar.appendChild(d); }
}
function nextStep() {
  if (step >= TOTAL) return; step++;
  document.querySelectorAll('[data-step]').forEach(el => { if (parseInt(el.dataset.step) <= step) el.classList.add('visible'); });
  for (let i = 0; i <= TOTAL; i++) { const d=document.getElementById('dot-'+i); if(d) d.className='dot'+(i<step?' done':i===step?' active':''); }
  document.getElementById('step-counter').textContent = `STEP ${step} / ${TOTAL}`;
}
document.addEventListener('keydown', e => {
  if (e.key===' '||e.key==='ArrowRight') { e.preventDefault(); nextStep(); }
  if (e.key==='Home') location.reload();
  if (e.key==='End') { while(step<TOTAL) nextStep(); }
});
buildDots(); nextStep();
</script>
