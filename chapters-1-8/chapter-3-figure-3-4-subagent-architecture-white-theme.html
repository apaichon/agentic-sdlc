  .dot.done   { background:#2563EB; }
  .dot.active { background:#3B82F6; transform:scale(1.4); }

  /* ── reveal animation classes ── */
  .step-item { opacity:0; transform:scale(.88); transform-origin:center; transition:opacity .5s ease, transform .5s ease; }
  .step-item.visible { opacity:1; transform:scale(1); }

  .arrow-draw { opacity:0; stroke-dashoffset:400; transition:opacity .15s, stroke-dashoffset .6s ease; }
  .arrow-draw.visible { opacity:1; stroke-dashoffset:0; }

  .badge-item { opacity:0; transform:scale(0); transform-origin:center; transition:opacity .4s ease, transform .4s cubic-bezier(.34,1.56,.64,1); }
  .badge-item.visible { opacity:1; transform:scale(1); }

  /* ── continuous animations ── */
  @keyframes dashFlow  { to { stroke-dashoffset:-20; } }
  @keyframes glowPulse { 0%,100%{opacity:.15} 50%{opacity:.5} }
  @keyframes rotateSlow{ from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes nodePing  { 0%,100%{opacity:0} 50%{opacity:.7} }

  #ai-glow.active      { animation:glowPulse 2.8s ease-in-out infinite; }
  #ai-ring.active      { animation:rotateSlow 10s linear infinite; opacity:.35; }
  .ping-dot.active     { animation:nodePing 2.2s ease-in-out infinite; }
</style>

<script>
const TOTAL = 8;
let step = -1;

function buildDots() {
  const bar = document.getElementById('progress-bar');
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + i;
    bar.appendChild(d);
  }
}

function render() {
  document.querySelectorAll('[data-step]').forEach(el => {
    if (parseInt(el.dataset.step) <= step) el.classList.add('visible');
    else el.classList.remove('visible');
  });
  if (step >= 1) {
    document.getElementById('ai-glow')?.classList.add('active');
    document.getElementById('ai-ring')?.classList.add('active');
  } else {
    document.getElementById('ai-glow')?.classList.remove('active');
    document.getElementById('ai-ring')?.classList.remove('active');
  }
  if (step >= 2) document.querySelectorAll('.ping-dot').forEach(d => d.classList.add('active'));
  else document.querySelectorAll('.ping-dot').forEach(d => d.classList.remove('active'));
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) d.className = 'dot' + (i < step ? ' done' : i === step ? ' active' : '');
  }
  document.getElementById('step-counter').textContent = `STEP ${step} / ${TOTAL}`;
}

function nextStep() { if (step < TOTAL) { step++; render(); } }
function prevStep() { if (step > 0) { step--; render(); } }

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
  if (e.key === 'Home') { step = 0; render(); }
  if (e.key === 'End') { step = TOTAL; render(); }
});

document.getElementById('slide').addEventListener('contextmenu', e => {
  e.preventDefault(); prevStep();
});

buildDots();
nextStep();
</script>
