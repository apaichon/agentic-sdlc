<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 3.2 — PreToolUse Hook: Command Validation Decision Tree</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#F8F9FA; display:flex; flex-direction:column;
    align-items:center; justify-content:center; min-height:100vh;
    font-family:system-ui,-apple-system,sans-serif; user-select:none;
  }
  .container { width:1200px; height:700px; position:relative; cursor:pointer; }
  svg { width:100%; height:100%; }

  /* ── chrome ── */
  #click-hint { margin-top:14px; font-size:13px; color:#64748b; letter-spacing:.05em; display:flex; align-items:center; gap:8px; }
  #click-hint .key { background:#e2e8f0; border:1px solid #cbd5e1; border-radius:6px; padding:2px 10px; font-size:12px; color:#475569; }
  #step-counter { font-size:12px; color:#94a3b8; margin-top:6px; letter-spacing:.08em; }
  #progress-bar { display:flex; gap:8px; margin-top:10px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#e2e8f0; transition:background .3s, transform .3s; }
  .dot.done   { background:#0E7490; }
  .dot.active { background:#3b82f6; transform:scale(1.4); }

  /* ── step-item: fade + scale ── */
  .step-item { opacity:0; transform:scale(.88); transform-origin:50% 50%; transform-box:fill-box; transition:opacity .45s ease, transform .45s ease; }
  .step-item.visible { opacity:1; transform:scale(1); }

  /* ── arrow-draw: pathLength="1" trick — solid line draw-on ── */
  .arrow-draw {
    opacity:0;
    stroke-dasharray:1;
    stroke-dashoffset:1;
    transition:opacity .05s ease, stroke-dashoffset .55s ease;
  }
  .arrow-draw.visible { opacity:1; stroke-dashoffset:0; }

  /* ── arrow-dashed: dashed line draw-on ── */
  .arrow-dashed {
    opacity:0;
    stroke-dasharray:0.06 0.03;
    stroke-dashoffset:1;
    transition:opacity .05s ease, stroke-dashoffset .7s ease;
  }
  .arrow-dashed.visible { opacity:1; stroke-dashoffset:0; }

  /* ── badge spring pop ── */
  .badge-item { opacity:0; transform:scale(0); transform-origin:50% 50%; transform-box:fill-box; transition:opacity .4s ease, transform .4s cubic-bezier(.34,1.56,.64,1); }
  .badge-item.visible { opacity:1; transform:scale(1); }

  /* ── label fade ── */
  .label-fade { opacity:0; transition:opacity .35s ease .15s; }
  .label-fade.visible { opacity:1; }
</style>
</head>
<body>
<div class="container" id="slide" onclick="nextStep()">
<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
<defs>

<!-- background -->
<rect width="1200" height="700" fill="#F8F9FA"/>

</g>

  <!-- pill 3 -->
  <rect x="60" y="418" width="246" height="32" rx="6" fill="white" stroke="#ef4444" stroke-width="1.8" filter="url(#shadow)"/>

  <text x="80" y="479" font-size="11" font-weight="600" fill="#dc2626" font-family="monospace">docker system prune -a</text>
  <!-- pill 5 -->
  <rect x="60" y="498" width="246" height="32" rx="6" fill="white" stroke="#ef4444" stroke-width="1.8" filter="url(#shadow)"/>
  <rect x="60" y="498" width="5"   height="32" rx="3" fill="#ef4444"/>

<!-- ═══ STEP 5: BLOCKED badge (octagon spring pop) ═══ -->
<g class="badge-item" data-step="5">
  <polygon points="108,556 152,538 218,538 262,556 262,608 218,626 152,626 108,608"
           fill="#ef4444" stroke="#b91c1c" stroke-width="2" filter="url(#shadow)"/>
  <polygon points="113,558 154,542 216,542 257,558 257,606 216,622 154,622 113,606"

  <!-- stop bar icon -->
  <rect x="178" y="562" width="28" height="5" rx="2.5" fill="white"/>

  <text x="758" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">No match</text>

  <!-- checkmark circle -->

<path class="arrow-draw" data-step="8"
      d="M910,416 L910,464" pathLength="1"

<g class="step-item" data-step="8" filter="url(#shadow)">

  <!-- gear icon -->

  <text x="920" y="514" text-anchor="middle" font-size="11" fill="#6B7280">Command runs successfully</text>

</svg>
</div>

<div id="progress-bar"></div>
<div id="step-counter">STEP 0 / 8</div>
<div id="click-hint"><span class="key">CLICK</span> advance &nbsp;·&nbsp; <span class="key">RIGHT-CLICK</span> back &nbsp;·&nbsp; <span class="key">← →</span> step &nbsp;·&nbsp; <span class="key">Home</span> start &nbsp;·&nbsp; <span class="key">End</span> finish</div>

<script>
const TOTAL = 8;
let step = -1;

function buildDots() {
  const bar = document.getElementById('progress-bar');
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + i;
    bar.appendChild(d);
  }
}

function render() {
  document.querySelectorAll('[data-step]').forEach(el => {
    if (parseInt(el.dataset.step) <= step) el.classList.add('visible');
    else el.classList.remove('visible');
  });
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) d.className = 'dot' + (i < step ? ' done' : i === step ? ' active' : '');
  }
  document.getElementById('step-counter').textContent = `STEP ${step} / ${TOTAL}`;
}

function nextStep() { if (step < TOTAL) { step++; render(); } }
function prevStep()  { if (step > 0)    { step--; render(); } }

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
  if (e.key === 'Home') { step = 0; render(); }
  if (e.key === 'End')  { step = TOTAL; render(); }
});

document.getElementById('slide').addEventListener('contextmenu', e => {
  e.preventDefault(); prevStep();
});

buildDots();
nextStep();
</script>
</body>
</html>
