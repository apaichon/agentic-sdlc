<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#F0F2F5; display:flex; flex-direction:column;
    align-items:center; justify-content:center; min-height:100vh;
    font-family:system-ui,-apple-system,sans-serif; user-select:none;
  }
  .container { width:1200px; height:700px; position:relative; cursor:pointer; }
  svg { width:100%; height:100%; }

  /* ── progress chrome ── */
  #click-hint { margin-top:14px; font-size:13px; color:#64748b; letter-spacing:.05em; display:flex; align-items:center; gap:8px; }
  #click-hint .key { background:#e2e8f0; border:1px solid #cbd5e1; border-radius:6px; padding:2px 10px; font-size:12px; color:#475569; }
  #step-counter { font-size:12px; color:#94a3b8; margin-top:6px; letter-spacing:.08em; }
  #progress-bar { display:flex; gap:8px; margin-top:10px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#e2e8f0; transition:background .3s, transform .3s; }
  .dot.done   { background:#0E7490; }
  .dot.active { background:#3b82f6; transform:scale(1.4); }

  /*
   * CARD PATTERN: two-level nesting prevents CSS scale from clobbering SVG translate.
   *   <g class="step-item" data-step="N">        ← CSS animation, NO transform attr
   *     <g transform="translate(X,Y)">            ← position, safe from CSS
   *       ...card content...
   *     </g>
   *   </g>
   */
  .step-item {
    opacity:0; transform:scale(.88);
    transform-origin:50% 50%; transform-box:fill-box;
    transition:opacity .5s ease, transform .5s ease;
  }
  .step-item.visible { opacity:1; transform:scale(1); }

  .badge-item {
    opacity:0; transform:scale(0);
    transform-origin:50% 50%; transform-box:fill-box;
    transition:opacity .4s ease, transform .4s cubic-bezier(.34,1.56,.64,1);
  }
  .badge-item.visible { opacity:1; transform:scale(1); }

  /*
   * ARROW PATTERN: data-step goes directly on the <path> (NOT inside a .step-item wrapper).
   * JS showArrow() forces a reflow between reset and animate-in so the transition fires.
   * Use pathLength="1" on every arrow path — works for any pixel length without calculation.
   *   Solid:  stroke-dasharray:1; stroke-dashoffset:1→0
   *   Dashed: stroke-dasharray:0.06 0.03; stroke-dashoffset:1→0
   */
  .arrow-draw  { opacity:0; stroke-dasharray:1;         stroke-dashoffset:1; }
  .arrow-dashed{ opacity:0; stroke-dasharray:0.06 0.03; stroke-dashoffset:1; }

  /* ── continuous animations ── */
  @keyframes dashFlow  { to { stroke-dashoffset:-20; } }
  @keyframes glowPulse { 0%,100%{opacity:.2;r:100} 50%{opacity:.45;r:115} }
  @keyframes rotateSlow{ from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes nodePing  { 0%,100%{opacity:0;r:5} 50%{opacity:.8;r:11} }

  #center-pulse { opacity:0; }
  #center-pulse.active { animation:glowPulse 2.8s ease-in-out infinite; }
  #center-ring { opacity:0; }
  #center-ring.active  { animation:rotateSlow 12s linear infinite; opacity:.4; transform-origin:490px 310px; transform-box:view-box; }
</style>

<script>
const TOTAL = 12;
let step = -1;

function buildDots() {
  const bar = document.getElementById('progress-bar');
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.createElement('div'); d.className = 'dot'; d.id = 'dot-' + i;
    bar.appendChild(d);
  }
}

function showArrow(el) {
  el.style.transition = 'none'; el.style.opacity = '0'; el.style.strokeDashoffset = '1';
  el.getBoundingClientRect();
  el.style.transition = 'opacity 0.05s ease, stroke-dashoffset 0.6s ease 0.05s';
  el.style.opacity = '1'; el.style.strokeDashoffset = '0';
}
function hideArrow(el) { el.style.transition = 'none'; el.style.opacity = '0'; el.style.strokeDashoffset = '1'; }
function isArrow(el) { return el.classList.contains('arrow-draw') || el.classList.contains('arrow-dashed'); }
function render() {
  document.querySelectorAll('[data-step]').forEach(el => {
    if (parseInt(el.dataset.step) <= step) { if (isArrow(el)) showArrow(el); else el.classList.add('visible'); }
    else { if (isArrow(el)) hideArrow(el); else el.classList.remove('visible'); }
  });
  if (step >= 1) {
    document.getElementById('center-pulse')?.classList.add('active');
    document.getElementById('center-ring')?.classList.add('active');
  } else {
    document.getElementById('center-pulse')?.classList.remove('active');
    document.getElementById('center-ring')?.classList.remove('active');
  }
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) d.className = 'dot' + (i < step ? ' done' : i === step ? ' active' : '');
  }
  document.getElementById('step-counter').textContent = `STEP ${step} / ${TOTAL}`;
}
function nextStep() { if (step < TOTAL) { step++; render(); } }
function prevStep()  { if (step > 0)    { step--; render(); } }
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
  if (e.key === 'Home') { step = 0; render(); }
  if (e.key === 'End')  { step = TOTAL; render(); }
});
document.getElementById('slide').addEventListener('contextmenu', e => { e.preventDefault(); prevStep(); });
buildDots(); nextStep();
</script>
