<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 5.3 — Redis Dual-Role Caching Architecture</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#F0F2F5; display:flex; flex-direction:column;
    align-items:center; justify-content:center; min-height:100vh;
    font-family:system-ui,-apple-system,sans-serif; user-select:none;
  }
  .container { width:1200px; height:700px; position:relative; cursor:pointer; }
  svg { width:100%; height:100%; }

  #click-hint { margin-top:14px; font-size:13px; color:#64748b; letter-spacing:.05em; display:flex; align-items:center; gap:8px; }
  #click-hint .key { background:#e2e8f0; border:1px solid #cbd5e1; border-radius:6px; padding:2px 10px; font-size:12px; color:#475569; }
  #step-counter { font-size:12px; color:#94a3b8; margin-top:6px; letter-spacing:.08em; }
  #progress-bar { display:flex; gap:8px; margin-top:10px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#e2e8f0; transition:background .3s, transform .3s; }
  .dot.done   { background:#0E7490; }
  .dot.active { background:#3b82f6; transform:scale(1.4); }

  .step-item {
    opacity:0; transform:scale(.88);
    transform-origin:50% 50%; transform-box:fill-box;
    transition:opacity .5s ease, transform .5s ease;
  }
  .step-item.visible { opacity:1; transform:scale(1); }

  .arrow-draw  { opacity:0; stroke-dasharray:1;         stroke-dashoffset:1; }
  .arrow-dashed{ opacity:0; stroke-dasharray:0.06 0.03; stroke-dashoffset:1; }

  @keyframes redisPulse { 0%,100%{opacity:.25;r:58} 50%{opacity:.6;r:68} }
  @keyframes rotateSlow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes slidingWin { 0%{transform:translateX(0)} 100%{transform:translateX(4px)} }

  #redis-pulse.active { animation:redisPulse 2.5s ease-in-out infinite; }
  #redis-ring.active  { animation:rotateSlow 10s linear infinite; opacity:.35; }
</style>
</head>
<body>
<div class="container" id="slide" onclick="nextStep()">
<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#DC2626"/>
  </marker>
  <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
  </marker>
  <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
  </marker>
  <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000025"/>
  </filter>
</defs>

<rect width="1200" height="700" fill="#F8F9FA"/>

<!-- STEP 0: Title -->
<g class="step-item" data-step="0">
  <text x="600" y="36" text-anchor="middle" font-size="22" font-weight="800" fill="#1F2937">Redis Dual-Role Caching Architecture</text>
  <text x="600" y="56" text-anchor="middle" font-size="13" fill="#6B7280">Session Cache · Rate Limiter · In-Memory Data Store</text>
</g>

<!-- STEP 1: Redis central hub -->
<g class="step-item" data-step="1">
  <circle id="redis-pulse" cx="580" cy="340" r="58" fill="none" stroke="#DC2626" stroke-width="2.5" opacity=".2"/>
  <circle id="redis-ring" cx="580" cy="340" r="68" fill="none" stroke="#DC2626" stroke-width="1" stroke-dasharray="5 4"/>
  <circle cx="580" cy="340" r="55" fill="#FEF2F2" stroke="#DC2626" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="580" y="333" text-anchor="middle" font-size="18" font-weight="800" fill="#991B1B">Redis</text>
  <text x="580" y="352" text-anchor="middle" font-size="10" fill="#DC2626">In-memory Data Store</text>
</g>

<!-- STEP 2: Session Cache panel (left) -->
<g class="step-item" data-step="2">
  <g transform="translate(18,80)">
    <rect width="340" height="36" rx="10" fill="#1D4ED8"/>
    <rect width="340" height="18" y="18" fill="#1D4ED8"/>
    <text x="170" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="white">Session Cache</text>
    <text x="170" y="42" text-anchor="middle" font-size="10" fill="#BFDBFE">Track active conversations</text>
  </g>
  <!-- Incoming message -->
  <g transform="translate(18,132)">
    <rect width="148" height="42" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
    <text x="74" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">Incoming Message</text>
    <text x="74" y="34" text-anchor="middle" font-size="9" fill="#6B7280">from any channel</text>
  </g>
  <!-- Hash Lookup -->
  <g transform="translate(18,200)">
    <rect width="148" height="50" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="74" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">Hash Lookup</text>
    <text x="74" y="32" text-anchor="middle" font-size="8" fill="#6B7280">session:{channel}:{sender_id}</text>
  </g>
  <!-- 30-min TTL -->
  <g transform="translate(18,280)">
    <rect width="148" height="50" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
    <text x="74" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#92400E">30-min Sliding TTL</text>
    <text x="74" y="32" text-anchor="middle" font-size="9" fill="#6B7280">Extend expiry on each activity</text>
  </g>
  <!-- Active session branch -->
  <g transform="translate(18,360)">
    <ellipse cx="74" cy="22" rx="74" ry="22" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
    <text x="74" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Active</text>
    <text x="74" y="32" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Session?</text>
  </g>
</g>
<path class="arrow-draw" data-step="2" pathLength="1" d="M92,174 L92,200" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
<path class="arrow-draw" data-step="2" pathLength="1" d="M92,250 L92,280" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
<path class="arrow-draw" data-step="2" pathLength="1" d="M92,330 L92,360" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

<!-- STEP 3: Yes/No session branches -->
<g class="step-item" data-step="3">
  <!-- Yes: Continue Session -->
  <g transform="translate(18,428)">
    <rect width="148" height="50" rx="8" fill="#F0FDF4" stroke="#4ADE80" stroke-width="1.5"/>
    <text x="74" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">Continue Session</text>
    <text x="74" y="32" text-anchor="middle" font-size="9" fill="#6B7280">Update TTL &amp; get state</text>
  </g>
  <!-- Yes label -->
  <text x="55" y="426" font-size="10" fill="#16a34a" font-weight="700">Yes</text>
  <!-- No: New Session -->
  <g transform="translate(188,428)">
    <rect width="148" height="50" rx="8" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/>
    <text x="74" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#9A3412">New Session</text>
    <text x="74" y="32" text-anchor="middle" font-size="9" fill="#6B7280">Create &amp; set TTL</text>
  </g>
  <text x="165" y="426" font-size="10" fill="#DC2626" font-weight="700">No</text>
</g>
<path class="arrow-draw" data-step="3" pathLength="1" d="M75,382 L75,428" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
<path class="arrow-draw" data-step="3" pathLength="1" d="M92,382 L262,428" fill="none" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>

<!-- STEP 4: Hash (Session Cache) legend -->
<g class="step-item" data-step="4">
  <g transform="translate(18,518)">
    <rect width="320" height="46" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="12" y="18" font-size="10" font-weight="700" fill="#334155">Hash (Session Cache)</text>
    <text x="12" y="34" font-size="9" fill="#6B7280">Key → Sorted Set (timestamp to score)</text>
    <text x="12" y="44" font-size="9" fill="#6B7280">O(1) lookup</text>
  </g>
</g>

<!-- STEP 5: Rate Limiter panel (right) -->
<g class="step-item" data-step="5">
  <g transform="translate(818,80)">
    <rect width="360" height="36" rx="10" fill="#DC2626"/>
    <rect width="360" height="18" y="18" fill="#DC2626"/>
    <text x="180" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="white">Rate Limiter</text>
    <text x="180" y="42" text-anchor="middle" font-size="10" fill="#FCA5A5">Protect against abusive traffic</text>
  </g>
  <!-- Incoming message -->
  <g transform="translate(892,132)">
    <rect width="148" height="42" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
    <text x="74" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#991B1B">Incoming Message</text>
    <text x="74" y="34" text-anchor="middle" font-size="9" fill="#6B7280">from any channel</text>
  </g>
  <!-- Sorted-Set Check -->
  <g transform="translate(818,200)">
    <rect width="360" height="50" rx="8" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1.5"/>
    <text x="180" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#9F1239">Sorted-Set Check</text>
    <text x="180" y="32" text-anchor="middle" font-size="8" fill="#6B7280">rate-limit:{channel}:{sender_id}</text>
  </g>
</g>
<path class="arrow-draw" data-step="5" pathLength="1" d="M966,174 L966,200" fill="none" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowRed)"/>

<!-- STEP 6: Sliding Time Window -->
<g class="step-item" data-step="6">
  <g transform="translate(818,278)">
    <rect width="360" height="110" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="180" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">Sliding Time Window</text>
    <text x="180" y="36" text-anchor="middle" font-size="9" fill="#6B7280">Window = 60 seconds</text>
    <!-- Window bars visualization -->
    <rect x="20" y="50" width="280" height="30" rx="4" fill="#F1F5F9"/>
    <rect x="20" y="50" width="140" height="30" rx="4" fill="#3b82f6" opacity=".5"/>
    <rect x="160" y="50" width="80" height="30" rx="4" fill="#EF4444" opacity=".7"/>
    <line x1="240" y1="45" x2="240" y2="85" stroke="#DC2626" stroke-width="2" stroke-dasharray="3 2"/>
    <text x="244" y="43" font-size="8" fill="#DC2626">Now</text>
    <text x="10" y="96" font-size="8" fill="#6B7280">← 60s window →</text>
    <text x="180" y="96" text-anchor="middle" font-size="8" fill="#DC2626">Threshold (e.g. 22 events / 60s)</text>
  </g>
</g>
<path class="arrow-draw" data-step="6" pathLength="1" d="M998,250 L998,278" fill="none" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowRed)"/>

<!-- STEP 7: Allow / Throttle -->
<g class="step-item" data-step="7">
  <g transform="translate(818,420)">
    <rect width="148" height="52" rx="8" fill="#F0FDF4" stroke="#4ADE80" stroke-width="1.5"/>
    <text x="74" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Allow</text>
    <text x="74" y="38" text-anchor="middle" font-size="9" fill="#6B7280">Continue: process message</text>
  </g>
  <g transform="translate(1028,420)">
    <rect width="148" height="52" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
    <text x="74" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#991B1B">Throttle</text>
    <text x="74" y="38" text-anchor="middle" font-size="9" fill="#6B7280">Drop or delay</text>
  </g>
  <text x="834" y="420" font-size="10" fill="#16a34a" font-weight="700">Under</text>
  <text x="1000" y="420" font-size="10" fill="#DC2626" font-weight="700">Over</text>
</g>
<path class="arrow-draw" data-step="7" pathLength="1" d="M890,388 L890,420" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
<path class="arrow-draw" data-step="7" pathLength="1" d="M1100,388 L1100,420" fill="none" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>

<!-- STEP 8: Sorted Set Rate Limiter legend -->
<g class="step-item" data-step="8">
  <g transform="translate(818,510)">
    <rect width="360" height="46" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="12" y="18" font-size="10" font-weight="700" fill="#334155">Sorted Set (Rate Limiter)</text>
    <text x="12" y="34" font-size="9" fill="#6B7280">Key → Sorted Set (timestamp to score)</text>
    <text x="12" y="44" font-size="9" fill="#6B7280">O(log N) operations</text>
  </g>
</g>

<!-- STEP 9: Arrows connecting panels to Redis center -->
<path class="arrow-dashed" data-step="9" pathLength="1" d="M358,340 L524,340" fill="none" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowRed)"/>
<path class="arrow-dashed" data-step="9" pathLength="1" d="M636,340 L818,340" fill="none" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowRed)"/>

<!-- STEP 10: Sliding TTL / Window footer legend -->
<g class="step-item" data-step="10">
  <g transform="translate(350,600)">
    <rect width="500" height="70" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="250" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Sliding TTL / Window</text>
    <text x="250" y="40" text-anchor="middle" font-size="11" fill="#6B7280">Keeps data fresh &amp; efficient</text>
    <text x="250" y="58" text-anchor="middle" font-size="10" fill="#6B7280">Session: extend on activity · Rate: count in window · Both: O(1)/O(log N) Redis ops</text>
  </g>
</g>

<!-- STEP 11: Dual-role insight -->
<g class="step-item" data-step="11">
  <g transform="translate(390,540)">
    <rect width="420" height="44" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
    <text x="210" y="18" text-anchor="middle" font-size="13" font-weight="800" fill="#991B1B">One Redis. Two Critical Roles.</text>
    <text x="210" y="36" text-anchor="middle" font-size="11" fill="#DC2626">Session tracking + Rate limiting in a single in-memory store</text>
  </g>
</g>

</svg>
</div>
<div id="progress-bar"></div>
<div id="step-counter">STEP 0 / 11</div>
<div id="click-hint"><span class="key">CLICK</span> advance &nbsp;·&nbsp; <span class="key">RIGHT-CLICK</span> back &nbsp;·&nbsp; <span class="key">← →</span> step &nbsp;·&nbsp; <span class="key">Home</span> start &nbsp;·&nbsp; <span class="key">End</span> finish</div>

<script>
const TOTAL = 11;
let step = -1;

function buildDots() {
  const bar = document.getElementById('progress-bar');
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.createElement('div'); d.className = 'dot'; d.id = 'dot-' + i;
    bar.appendChild(d);
  }
}

function showArrow(el) {
  el.style.transition = 'none';
  el.style.opacity = '0';
  el.style.strokeDashoffset = '1';
  el.getBoundingClientRect();
  el.style.transition = 'opacity 0.05s ease, stroke-dashoffset 0.6s ease 0.05s';
  el.style.opacity = '1';
  el.style.strokeDashoffset = '0';
}
function hideArrow(el) {
  el.style.transition = 'none';
  el.style.opacity = '0';
  el.style.strokeDashoffset = '1';
}
function isArrow(el) {
  return el.classList.contains('arrow-draw') || el.classList.contains('arrow-dashed');
}

function render() {
  document.querySelectorAll('[data-step]').forEach(el => {
    if (parseInt(el.dataset.step) <= step) {
      if (isArrow(el)) showArrow(el); else el.classList.add('visible');
    } else {
      if (isArrow(el)) hideArrow(el); else el.classList.remove('visible');
    }
  });
  if (step >= 1) {
    document.getElementById('redis-pulse')?.classList.add('active');
    document.getElementById('redis-ring')?.classList.add('active');
  } else {
    document.getElementById('redis-pulse')?.classList.remove('active');
    document.getElementById('redis-ring')?.classList.remove('active');
  }
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) d.className = 'dot' + (i < step ? ' done' : i === step ? ' active' : '');
  }
  document.getElementById('step-counter').textContent = `STEP ${Math.max(step,0)} / ${TOTAL}`;
}

function nextStep() { if (step < TOTAL) { step++; render(); } }
function prevStep()  { if (step > 0)    { step--; render(); } }

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
  if (e.key === 'Home') { step = 0; render(); }
  if (e.key === 'End')  { step = TOTAL; render(); }
});
document.getElementById('slide').addEventListener('contextmenu', e => { e.preventDefault(); prevStep(); });

buildDots();
nextStep();
</script>
</body>
</html>
