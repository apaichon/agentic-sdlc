<div id="progress-bar"></div>
<div id="step-counter">STEP 0 / 10</div>
<div id="click-hint">
  <span class="key">CLICK</span> or <span class="key">SPACE</span> to advance
  &nbsp;·&nbsp;
  <span class="key">←</span> back &nbsp;·&nbsp;
  <span class="key">HOME</span> reset &nbsp;·&nbsp;
  <span class="key">END</span> skip to end
</div>

<script>
const TOTAL = 10;
let step = -1;

function buildDots() {
  const bar = document.getElementById('progress-bar');
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + i;
    bar.appendChild(d);
  }
}

function renderStep() {
  document.querySelectorAll('[data-step]').forEach(el => {
    const itemStep = parseInt(el.dataset.step, 10);
    el.classList.toggle('visible', !Number.isNaN(itemStep) && itemStep <= step);
  });
  document.querySelectorAll('.ping-dot').forEach(d => {
    const itemStep = parseInt(d.dataset.step, 10);
    d.classList.toggle('active', !Number.isNaN(itemStep) && itemStep <= step);
  });
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) d.className = 'dot' + (i < step ? ' done' : i === step ? ' active' : '');
  }
  document.getElementById('step-counter').textContent = `STEP ${step} / ${TOTAL}`;
}

function nextStep() {
  if (step >= TOTAL) return;
  step++;
  renderStep();
}

function prevStep() {
  if (step <= 0) return;
  step--;
  renderStep();
}

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
  if (e.key === 'Home') location.reload();
  if (e.key === 'End') { while (step < TOTAL) nextStep(); }
});
document.addEventListener('contextmenu', e => { e.preventDefault(); prevStep(); });

buildDots();
nextStep();
</script>
</body>
