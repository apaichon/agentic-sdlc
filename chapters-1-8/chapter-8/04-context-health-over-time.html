<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Context Health Over Time</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;display:block;background:#fbfcff}.step-item{opacity:0;transform:scale(.9);transform-origin:50% 50%;transform-box:fill-box;transition:opacity .45s ease,transform .45s ease}.step-item.visible{opacity:1;transform:scale(1)}.arrow-draw{opacity:0;stroke-dasharray:1;stroke-dashoffset:1}.dot{width:8px;height:8px;border-radius:50%;background:#d8e0ec;transition:.25s}.dot.done{background:#0e7490}.dot.active{background:#2563eb;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#64748b;display:flex;gap:8px}.key{border:1px solid #cbd5e1;background:#e2e8f0;border-radius:6px;padding:2px 9px;font-size:12px}.axis{font-size:22px;font-weight:850;fill:#24334f}.tick{font-size:15px;fill:#24334f}.call{font-size:16px;font-weight:850}.label{font-size:16px;font-weight:800;fill:#10203f}.flow.visible{animation:dash 1.5s linear infinite}@keyframes dash{to{stroke-dashoffset:-20}}.pulse.visible{animation:pulse 1.6s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
</style>
</head>
<body>
<div class="container" id="slide" onclick="nextStep()">
<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
<defs>
<filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#26324a22"/></filter>
<linearGradient id="fresh" x1="0" x2="1"><stop stop-color="#eefcf3"/><stop offset="1" stop-color="#f5fff8"/></linearGradient>
<linearGradient id="warn" x1="0" x2="1"><stop stop-color="#fffbea"/><stop offset="1" stop-color="#fff7ed"/></linearGradient>
<linearGradient id="bad" x1="0" x2="1"><stop stop-color="#fff1f2"/><stop offset="1" stop-color="#fff7f7"/></linearGradient>
</defs>
<rect width="1200" height="700" fill="#fbfcff"/>
<g class="step-item" data-step="0">
  <text x="600" y="54" text-anchor="middle" font-size="36" font-weight="900" fill="#10203f">Context Health Over Time</text>
  <text x="600" y="90" text-anchor="middle" font-size="21" fill="#526078">Maintain high context quality for better results</text>
</g>

<g class="step-item" data-step="1">
  <rect x="110" y="190" width="245" height="365" fill="url(#fresh)" opacity=".8"/>
  <rect x="355" y="190" width="260" height="365" fill="url(#warn)" opacity=".8"/>
  <rect x="615" y="190" width="290" height="365" fill="url(#bad)" opacity=".75"/>
  <rect x="905" y="190" width="180" height="365" fill="url(#fresh)" opacity=".8"/>
  <path d="M110 555H1085M110 555V190" stroke="#10203f" stroke-width="3"/>
  <g stroke="#cbd5e1" stroke-dasharray="3 3"><path d="M110 480H1085M110 405H1085M110 330H1085M110 255H1085"/><path d="M232 190V555M355 190V555M478 190V555M615 190V555M760 190V555M905 190V555M1025 190V555"/></g>
  <text x="65" y="337" text-anchor="middle" transform="rotate(-90 65 337)" class="axis">Context Health %</text>
  <text x="600" y="620" text-anchor="middle" class="axis">Session Duration (minutes)</text>
  <text x="92" y="198" class="tick">100</text><text x="98" y="273" class="tick">80</text><text x="98" y="348" class="tick">60</text><text x="98" y="423" class="tick">40</text><text x="98" y="498" class="tick">20</text><text x="104" y="562" class="tick">0</text>
  <text x="110" y="585" text-anchor="middle" class="tick">0</text><text x="232" y="585" text-anchor="middle" class="tick">15</text><text x="355" y="585" text-anchor="middle" class="tick">30</text><text x="478" y="585" text-anchor="middle" class="tick">45</text><text x="615" y="585" text-anchor="middle" class="tick">60</text><text x="760" y="585" text-anchor="middle" class="tick">75</text><text x="905" y="585" text-anchor="middle" class="tick">90</text><text x="1025" y="585" text-anchor="middle" class="tick">105</text><text x="1085" y="585" text-anchor="middle" class="tick">120</text>
</g>

<path class="arrow-draw flow" data-step="2" pathLength="1" d="M110 190L355 250L478 315L615 405" fill="none" stroke="#0a9637" stroke-width="5"/>
<g class="step-item" data-step="2">
  <circle cx="110" cy="190" r="7" fill="#0a9637"/><circle cx="355" cy="250" r="7" fill="#0a9637"/><circle cx="478" cy="315" r="7" fill="#0a9637"/><circle cx="615" cy="405" r="7" fill="#0a9637"/>
  <rect x="255" y="120" width="110" height="56" rx="8" fill="#f8fff9" stroke="#16a34a" filter="url(#shadow)"/><text x="310" y="144" text-anchor="middle" class="call" fill="#16a34a">30 min</text><text x="310" y="166" text-anchor="middle" font-size="14" font-weight="700" fill="#10203f">Still fresh</text>
  <path d="M355 176L355 245" stroke="#16a34a" stroke-width="2"/>
</g>

<g class="step-item pulse" data-step="3">
  <rect x="410" y="145" width="140" height="76" rx="8" fill="#fff" stroke="#f59e0b" filter="url(#shadow)"/>
  <text x="480" y="170" text-anchor="middle" class="call" fill="#f59e0b">45 min</text>
  <text x="480" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#10203f">Compression begins</text>
  <path d="M480 221L478 307" stroke="#f59e0b" stroke-width="2"/>
</g>

<g class="step-item pulse" data-step="4">
  <rect x="592" y="106" width="88" height="100" rx="8" fill="#fff" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="636" y="130" text-anchor="middle" class="call" fill="#ef4444">60 min</text>
  <rect x="617" y="142" width="38" height="38" rx="6" fill="#dc2626"/><text x="636" y="167" text-anchor="middle" font-size="18" font-weight="900" fill="#fff">/c</text>
  <text x="636" y="197" text-anchor="middle" font-size="15" font-weight="800" fill="#ef4444">/compact</text>
  <path d="M636 206L615 390" stroke="#ef4444" stroke-dasharray="5 5" stroke-width="2"/>
</g>

<path class="arrow-draw flow" data-step="5" pathLength="1" d="M615 405L642 255L760 315L905 425" fill="none" stroke="#0a9637" stroke-width="5"/>
<g class="step-item" data-step="5">
  <circle cx="642" cy="255" r="7" fill="#0a9637"/><circle cx="760" cy="315" r="7" fill="#0a9637"/><circle cx="905" cy="425" r="7" fill="#0a9637"/>
  <rect x="890" y="325" width="108" height="72" rx="8" fill="#fff" stroke="#ef4444" filter="url(#shadow)"/><text x="944" y="350" text-anchor="middle" class="call" fill="#ef4444">90 min</text><text x="944" y="374" text-anchor="middle" font-size="14" font-weight="700" fill="#10203f">Split session</text><text x="944" y="393" text-anchor="middle" font-size="14" font-weight="700" fill="#10203f">recommended</text>
  <path d="M944 397L905 420" stroke="#ef4444" stroke-width="2"/>
</g>

<path class="arrow-draw flow" data-step="6" pathLength="1" d="M905 220L1025 275L1085 360" fill="none" stroke="#0a9637" stroke-width="5"/>
<g class="step-item" data-step="6">
  <circle cx="905" cy="220" r="7" fill="#0a9637"/><circle cx="1025" cy="275" r="7" fill="#0a9637"/><circle cx="1085" cy="360" r="7" fill="#0a9637"/>
  <rect x="920" y="96" width="126" height="78" rx="8" fill="#f8fff9" stroke="#16a34a" filter="url(#shadow)"/><text x="983" y="122" text-anchor="middle" class="call" fill="#16a34a">90 min</text><text x="983" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#10203f">New session:</text><text x="983" y="167" text-anchor="middle" font-size="14" font-weight="700" fill="#10203f">focused objective</text>
  <path d="M945 174L905 215" stroke="#16a34a" stroke-width="2"/>
</g>

<g class="step-item" data-step="7">
  <circle cx="155" cy="505" r="36" fill="#effdf4" stroke="#bbf7d0"/><path d="M137 518C141 492 159 482 178 482C177 506 163 522 137 518Z" fill="#16a34a"/><path d="M140 518C151 508 160 499 174 486" stroke="#f8fff9" stroke-width="3" fill="none"/>
  <text x="235" y="512" class="label" fill="#16a34a">0 - 30 min</text><text x="235" y="536" font-size="15" font-weight="750" fill="#10203f">Fresh Context</text>
  <circle cx="380" cy="505" r="36" fill="#fffbeb" stroke="#fde68a"/><path d="M366 521v-30c0-9 7-16 16-16s16 7 16 16v30M354 502h52M360 491h40M360 513h40" stroke="#f59e0b" stroke-width="5" fill="none" stroke-linecap="round"/>
  <text x="430" y="512" class="label" fill="#f59e0b">30 - 45 min</text><text x="430" y="536" font-size="15" font-weight="750" fill="#10203f">Quality Gradually Declines</text>
  <circle cx="650" cy="505" r="36" fill="#fff1f2" stroke="#fecaca"/><text x="650" y="518" text-anchor="middle" font-size="32" fill="#ef4444">!</text>
  <text x="698" y="512" class="label" fill="#ef4444">45 - 90 min</text><text x="698" y="536" font-size="15" font-weight="750" fill="#10203f">Low Context Quality</text>
  <circle cx="930" cy="505" r="36" fill="#effdf4" stroke="#bbf7d0"/><circle cx="930" cy="505" r="22" fill="none" stroke="#16a34a" stroke-width="5"/><circle cx="930" cy="505" r="10" fill="none" stroke="#16a34a" stroke-width="4"/><path d="M930 505L951 484M943 484h8v8" stroke="#16a34a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <text x="985" y="512" class="label" fill="#16a34a">90 - 120 min</text><text x="985" y="536" font-size="15" font-weight="750" fill="#10203f">Fresh Session</text>
</g>
</svg>
</div>
<div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div>
<script>
const TOTAL=7;let step=-1;for(let i=0;i<=TOTAL;i++){let d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function isArrow(e){return e.classList.contains("arrow-draw")}function showArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.getBoundingClientRect();e.style.transition="opacity .05s ease,stroke-dashoffset .8s ease .05s";e.style.opacity=1;e.style.strokeDashoffset=0;e.classList.add("visible")}function hideArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.classList.remove("visible")}function render(){document.querySelectorAll("[data-step]").forEach(e=>{parseInt(e.dataset.step)<=step?(isArrow(e)?showArrow(e):e.classList.add("visible")):(isArrow(e)?hideArrow(e):e.classList.remove("visible"))});for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script>
</body>
</html>
