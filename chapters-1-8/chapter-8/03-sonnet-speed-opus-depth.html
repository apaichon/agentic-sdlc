<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonnet Speed Opus Depth</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;display:block;background:#fbfcff}.step-item{opacity:0;transform:scale(.9);transform-origin:50% 50%;transform-box:fill-box;transition:opacity .45s ease,transform .45s ease}.step-item.visible{opacity:1;transform:scale(1)}.arrow-draw{opacity:0;stroke-dasharray:1;stroke-dashoffset:1}.dot{width:8px;height:8px;border-radius:50%;background:#d8e0ec;transition:.25s}.dot.done{background:#0e7490}.dot.active{background:#2563eb;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#64748b;display:flex;gap:8px}.key{border:1px solid #cbd5e1;background:#e2e8f0;border-radius:6px;padding:2px 9px;font-size:12px}.item{font-size:22px;font-weight:800;fill:#10203f}.title{font-size:35px;font-weight:900;fill:#10203f}.gauge.visible .needle{animation:needle 1.1s ease-out both}.gauge.opus.visible .needle{animation-name:needleSlow}@keyframes needle{from{transform:rotate(-45deg)}to{transform:rotate(35deg)}}@keyframes needleSlow{from{transform:rotate(-45deg)}to{transform:rotate(12deg)}}.flow.visible{animation:dash 1.4s linear infinite}@keyframes dash{to{stroke-dashoffset:-20}}
</style>
</head>
<body>
<div class="container" id="slide" onclick="nextStep()">
<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#e8ecf3"/></pattern>
<filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#26324a22"/></filter>
<linearGradient id="blueArc" x1="0" x2="1"><stop stop-color="#dbeafe"/><stop offset="1" stop-color="#2563eb"/></linearGradient>
<linearGradient id="purpleArc" x1="0" x2="1"><stop stop-color="#ede9fe"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
<linearGradient id="arrowGrad" x1="0" x2="1"><stop stop-color="#dbeafe"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
<marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#7c3aed"/></marker>
</defs>
<rect width="1200" height="700" fill="url(#grid)"/>

<g class="step-item" data-step="0">
  <text x="600" y="36" text-anchor="middle" font-size="28" font-weight="850" fill="#10203f">Model Handoff Pattern</text>
  <text x="600" y="660" text-anchor="middle" font-size="15" fill="#526078">Use Sonnet for fast production work, then promote critical review to Opus.</text>
</g>

<g class="step-item" data-step="1"><g transform="translate(30,72)">
  <rect width="540" height="565" rx="12" fill="#f8fbff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="68" class="title">Claude Sonnet - Speed</text>
  <path d="M45 52h-18M45 66h-28M45 80h-18M70 30L42 90H75L57 130L116 55H82L97 30z" fill="#2563eb"/>
  <line x1="30" y1="112" x2="510" y2="112" stroke="#2563eb" stroke-width="2"/>
  <circle cx="78" cy="155" r="17" fill="#2563eb"/><path d="M68 154l8 9l15-18" stroke="#fff" stroke-width="5" fill="none"/>
  <circle cx="78" cy="205" r="17" fill="#2563eb"/><path d="M68 204l8 9l15-18" stroke="#fff" stroke-width="5" fill="none"/>
  <circle cx="78" cy="255" r="17" fill="#2563eb"/><path d="M68 254l8 9l15-18" stroke="#fff" stroke-width="5" fill="none"/>
  <circle cx="78" cy="305" r="17" fill="#2563eb"/><path d="M68 304l8 9l15-18" stroke="#fff" stroke-width="5" fill="none"/>
  <circle cx="78" cy="355" r="17" fill="#2563eb"/><path d="M68 354l8 9l15-18" stroke="#fff" stroke-width="5" fill="none"/>
  <text x="120" y="163" class="item">Code scaffolding</text><text x="120" y="213" class="item">Test generation</text><text x="120" y="263" class="item">Quick refactoring</text><text x="120" y="313" class="item">Documentation</text><text x="120" y="363" class="item">Boilerplate</text>
</g></g>

<g class="step-item gauge" data-step="2"><g transform="translate(150,390)">
  <path d="M0 120A130 130 0 0 1 260 120" fill="none" stroke="url(#blueArc)" stroke-width="42" stroke-linecap="round"/>
  <path d="M0 120A130 130 0 0 1 260 120" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round" opacity=".9"/>
  <g class="needle" style="transform-origin:130px 120px"><path d="M130 120L240 58" stroke="#13243b" stroke-width="9" stroke-linecap="round"/><circle cx="130" cy="120" r="18" fill="#13243b"/></g>
  <text x="130" y="178" text-anchor="middle" font-size="32" font-weight="900" fill="#2563eb">Fast</text>
  <rect x="35" y="205" width="220" height="52" rx="8" fill="#fff" stroke="#2563eb"/><text x="145" y="240" text-anchor="middle" font-size="27" font-weight="900" fill="#10203f">Sonnet: <tspan fill="#2563eb">$$</tspan></text>
</g></g>

<path class="arrow-draw flow" data-step="3" pathLength="1" d="M522 360C555 312 602 312 638 360" fill="none" stroke="#7c3aed" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
<g class="step-item" data-step="3">
  <rect x="500" y="382" width="150" height="66" rx="10" fill="#fff" stroke="#a78bfa" filter="url(#shadow)"/>
  <text x="575" y="408" text-anchor="middle" font-size="15" font-weight="850" fill="#10203f">Sonnet generates</text>
  <text x="575" y="434" text-anchor="middle" font-size="15" font-weight="850" fill="#10203f">Opus reviews</text>
</g>

<g class="step-item" data-step="4"><g transform="translate(660,72)">
  <rect width="510" height="565" rx="12" fill="#fcfaff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="70" cy="64" r="35" fill="none" stroke="#7c3aed" stroke-width="9"/><path d="M96 91L125 120" stroke="#7c3aed" stroke-width="9" stroke-linecap="round"/>
  <text x="145" y="68" class="title">Claude Opus - Depth</text>
  <line x1="30" y1="112" x2="480" y2="112" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="85" cy="155" r="17" fill="#7c3aed"/><path d="M75 154l8 9l15-18" stroke="#fff" stroke-width="5" fill="none"/>
  <circle cx="85" cy="205" r="17" fill="#7c3aed"/><path d="M75 204l8 9l15-18" stroke="#fff" stroke-width="5" fill="none"/>
  <circle cx="85" cy="255" r="17" fill="#7c3aed"/><path d="M75 254l8 9l15-18" stroke="#fff" stroke-width="5" fill="none"/>
  <circle cx="85" cy="305" r="17" fill="#7c3aed"/><path d="M75 304l8 9l15-18" stroke="#fff" stroke-width="5" fill="none"/>
  <circle cx="85" cy="355" r="17" fill="#7c3aed"/><path d="M75 354l8 9l15-18" stroke="#fff" stroke-width="5" fill="none"/>
  <text x="125" y="163" class="item">Architecture review</text><text x="125" y="213" class="item">Security audit</text><text x="125" y="263" class="item">Bug investigation</text><text x="125" y="313" class="item">Cross-service review</text><text x="125" y="363" class="item">Final PR approval</text>
</g></g>

<g class="step-item gauge opus" data-step="5"><g transform="translate(790,390)">
  <path d="M0 120A130 130 0 0 1 260 120" fill="none" stroke="url(#purpleArc)" stroke-width="42" stroke-linecap="round"/>
  <path d="M0 120A130 130 0 0 1 260 120" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round" opacity=".9"/>
  <g class="needle" style="transform-origin:130px 120px"><path d="M130 120L230 91" stroke="#13243b" stroke-width="9" stroke-linecap="round"/><circle cx="130" cy="120" r="18" fill="#13243b"/></g>
  <text x="130" y="178" text-anchor="middle" font-size="32" font-weight="900" fill="#7c3aed">Thorough</text>
  <rect x="25" y="205" width="240" height="52" rx="8" fill="#fff" stroke="#7c3aed"/><text x="145" y="240" text-anchor="middle" font-size="27" font-weight="900" fill="#10203f">Opus: <tspan fill="#7c3aed">$$$$</tspan></text>
</g></g>
</svg>
</div>
<div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div>
<script>
const TOTAL=5;let step=-1;for(let i=0;i<=TOTAL;i++){let d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function isArrow(e){return e.classList.contains("arrow-draw")}function showArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.getBoundingClientRect();e.style.transition="opacity .05s ease,stroke-dashoffset .8s ease .05s";e.style.opacity=1;e.style.strokeDashoffset=0;e.classList.add("visible")}function hideArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.classList.remove("visible")}function render(){document.querySelectorAll("[data-step]").forEach(e=>{parseInt(e.dataset.step)<=step?(isArrow(e)?showArrow(e):e.classList.add("visible")):(isArrow(e)?hideArrow(e):e.classList.remove("visible"))});for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script>
</body>
</html>
