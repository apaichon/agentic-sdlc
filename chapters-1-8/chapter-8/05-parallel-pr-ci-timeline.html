<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Parallel PR CI Timeline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;display:block;background:#fbfcff}.step-item{opacity:0;transform:scale(.9);transform-origin:50% 50%;transform-box:fill-box;transition:opacity .45s ease,transform .45s ease}.step-item.visible{opacity:1;transform:scale(1)}.arrow-draw,.arrow-dashed{opacity:0;stroke-dasharray:1;stroke-dashoffset:1}.dot{width:8px;height:8px;border-radius:50%;background:#d8e0ec;transition:.25s}.dot.done{background:#0e7490}.dot.active{background:#2563eb;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#64748b;display:flex;gap:8px}.key{border:1px solid #cbd5e1;background:#e2e8f0;border-radius:6px;padding:2px 9px;font-size:12px}.head{font-size:20px;font-weight:850}.label{font-size:14px;font-weight:760;fill:#10203f}.small{font-size:12px;fill:#10203f}.flow.visible{animation:dash 1.35s linear infinite}@keyframes dash{to{stroke-dashoffset:-20}}.blink.visible{animation:blink 1s ease-in-out infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}
</style>
</head>
<body>

  <text x="662" y="288" class="label">gh pr create</text><text x="662" y="308" class="small">(SMS Gateway)</text>
  <rect x="764" y="222" width="76" height="45" rx="6" fill="#eff6ff" stroke="#2563eb"/><text x="802" y="242" text-anchor="middle" font-size="13" font-weight="850" fill="#2563eb">PR #101</text><text x="802" y="258" text-anchor="middle" font-size="11" fill="#2563eb">(Line)</text>
  <rect x="764" y="275" width="76" height="45" rx="6" fill="#eff6ff" stroke="#2563eb"/><text x="802" y="295" text-anchor="middle" font-size="13" font-weight="850" fill="#2563eb">PR #102</text><text x="802" y="311" text-anchor="middle" font-size="11" fill="#2563eb">(SMS)</text>
</g>

<path class="arrow-draw flow" data-step="4" pathLength="1" d="M840 297H966" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#blueArrow)"/>
<g class="step-item" data-step="4">
  <text x="862" y="224" class="label">Run pipeline</text><rect x="862" y="238" width="190" height="14" rx="7" fill="#f8fafc" stroke="#475569"/><rect x="866" y="241" width="118" height="8" rx="4" fill="#ff5b63"/>
  <text x="862" y="277" class="label">Run pipeline</text><rect x="862" y="291" width="190" height="14" rx="7" fill="#f8fafc" stroke="#475569"/><rect x="866" y="294" width="150" height="8" rx="4" fill="#4ade80"/>
</g>

<path class="arrow-dashed flow" data-step="5" pathLength="1" d="M766 297C705 300 675 325 608 325" fill="none" stroke="#6d28d9" stroke-width="2.5" marker-end="url(#purpleArrow)"/>
<g class="step-item" data-step="5">
  <rect x="470" y="326" width="150" height="70" rx="8" fill="#fff" stroke="#6d28d9" stroke-dasharray="6 5" stroke-width="2" filter="url(#shadow)"/>
  <text x="545" y="352" text-anchor="middle" font-size="14" font-weight="850" fill="#10203f">Security Subagent</text>
  <text x="545" y="373" text-anchor="middle" font-size="12" fill="#10203f">reviews both PRs</text>
  <text x="545" y="390" text-anchor="middle" font-size="12" fill="#10203f">secrets, deps, policy</text>
</g>

<path class="arrow-draw flow" data-step="6" pathLength="1" d="M470 400H166" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#greenArrow)"/>
<g class="step-item blink" data-step="6">

</g>

<path class="arrow-draw flow" data-step="7" pathLength="1" d="M166 400V475H605" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#greenArrow)"/>

<g class="step-item" data-step="7">
  <rect x="134" y="470" width="70" height="28" rx="5" fill="#f8fff9" stroke="#16a34a"/><text x="169" y="489" text-anchor="middle" font-size="13" font-weight="850" fill="#15803d">Push fix</text>
  <text x="330" y="468" class="label">Update PR #101</text><text x="330" y="488" class="small">(push fix)</text>
  <text x="658" y="468" class="label">gh pr update</text><text x="658" y="488" class="small">(Line Adapter)</text>
  <text x="862" y="455" class="label">Rerun pipeline (PR #101)</text><rect x="862" y="469" width="190" height="14" rx="7" fill="#f8fafc" stroke="#475569"/><rect x="866" y="472" width="140" height="8" rx="4" fill="#4ade80"/>

<path class="arrow-draw flow" data-step="9" pathLength="1" d="M216 610H1050" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#greenArrow)"/>
<g class="step-item" data-step="9">
  <rect x="172" y="545" width="96" height="30" rx="6" fill="#f8fff9" stroke="#16a34a"/><text x="220" y="565" text-anchor="middle" font-size="13" font-weight="850" fill="#15803d">Merge PR #101</text>

<path class="arrow-dashed flow" data-step="10" pathLength="1" d="M70 650H1130" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#blueArrow)"/>
<g class="step-item" data-step="10">
  <rect x="510" y="625" width="170" height="42" rx="9" fill="#fff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="595" y="653" text-anchor="middle" font-size="22" font-weight="900" fill="#2563eb">~30 min total</text>
</g>
</svg>
</div>
<div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div>
<script>
const TOTAL=10;let step=-1;for(let i=0;i<=TOTAL;i++){let d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function isArrow(e){return e.classList.contains("arrow-draw")||e.classList.contains("arrow-dashed")}function showArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.getBoundingClientRect();e.style.transition="opacity .05s ease,stroke-dashoffset .75s ease .05s";e.style.opacity=1;e.style.strokeDashoffset=0;e.classList.add("visible")}function hideArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.classList.remove("visible")}function render(){document.querySelectorAll("[data-step]").forEach(e=>{parseInt(e.dataset.step)<=step?(isArrow(e)?showArrow(e):e.classList.add("visible")):(isArrow(e)?hideArrow(e):e.classList.remove("visible"))});for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script>
</body>
</html>
