  <span class="key">END</span> to complete &nbsp;|&nbsp;
  <span class="key">HOME</span> to reset
</div>

<script>
const TOTAL = 9;
let step = -1;
function buildDots() {
  const bar = document.getElementById('progress-bar');
  for (let i = 0; i <= TOTAL; i++) { const d=document.createElement('div'); d.className='dot'; d.id='dot-'+i; bar.appendChild(d); }
}
function nextStep() {
  if (step >= TOTAL) return;
  step++;
  renderStep();
}
function prevStep() {
  if (step <= 0) return;
  step--;
  renderStep();
}
function renderStep() {
  document.querySelectorAll('[data-step]').forEach(el => {
    const itemStep = parseInt(el.dataset.step, 10);
    el.classList.toggle('visible', !Number.isNaN(itemStep) && itemStep <= step);
  });
  for (let i = 0; i <= TOTAL; i++) { const d=document.getElementById('dot-'+i); if(d) d.className='dot'+(i<step?' done':i===step?' active':''); }
  document.getElementById('step-counter').textContent = `STEP ${step} / ${TOTAL}`;
}
document.addEventListener('keydown', e => {
  if (e.key===' '||e.key==='ArrowRight') { e.preventDefault(); nextStep(); }
  if (e.key==='ArrowLeft') { e.preventDefault(); prevStep(); }
  if (e.key==='Home') location.reload();
  if (e.key==='End') { while(step<TOTAL) nextStep(); }
});
document.addEventListener('contextmenu', e => { e.preventDefault(); prevStep(); });
buildDots(); nextStep();
</script>
