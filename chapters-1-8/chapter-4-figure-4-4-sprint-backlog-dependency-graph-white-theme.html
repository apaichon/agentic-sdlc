<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#F0F2F5;

    font-family:system-ui,-apple-system,sans-serif; user-select:none;
  }
  .container { width:1200px; height:700px; position:relative; cursor:pointer; }
  svg { width:100%; height:100%; }

  /* ── progress chrome ── */
  #click-hint {
    margin-top:14px; font-size:13px; color:#64748b;
    letter-spacing:.05em; display:flex; align-items:center; gap:8px;

  #click-hint .key {

  }
  #step-counter { font-size:12px; color:#94a3b8; margin-top:6px; letter-spacing:.08em; }
  #progress-bar { display:flex; gap:8px; margin-top:10px; }
  .dot {
    width:8px; height:8px; border-radius:50%;
    background:#e2e8f0; transition:background .3s, transform .3s;
  }
  .dot.done   { background:#0E7490; }
  .dot.active { background:#3b82f6; transform:scale(1.4); }

  /* ── card reveal ── */
  .step-item {
    opacity:0;
    transform:scale(.88);
    transform-origin:50% 50%;
    transform-box:fill-box;
    transition:opacity .5s ease, transform .5s ease;
  }
  .step-item.visible { opacity:1; transform:scale(1); }

  /* ── arrow draw-on (pathLength="1" technique) ── */
  .arrow-draw {
    opacity:0;
    stroke-dasharray:1;
    stroke-dashoffset:1;
    transition:opacity .05s ease, stroke-dashoffset .6s ease;
  }
  .arrow-draw.visible { opacity:1; stroke-dashoffset:0; }
</style>

<!-- Progress bar + controls -->
<div id="progress-bar"></div>
<div id="step-counter">STEP 0 / 10</div>
<div id="click-hint">
  <span class="key">CLICK</span> advance &nbsp;·&nbsp;
  <span class="key">RIGHT-CLICK</span> back &nbsp;·&nbsp;
  <span class="key">← →</span> step &nbsp;·&nbsp;
  <span class="key">Home</span> start &nbsp;·&nbsp;
  <span class="key">End</span> finish
</div>

<script>
const TOTAL = 10;
let step = 0;

function buildDots() {
  const bar = document.getElementById('progress-bar');
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + i;
    bar.appendChild(d);
  }
}

function render() {
  document.querySelectorAll('[data-step]').forEach(el => {
    if (parseInt(el.dataset.step) <= step) el.classList.add('visible');
    else el.classList.remove('visible');
  });
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) d.className = 'dot' + (i < step ? ' done' : i === step ? ' active' : '');
  }
  document.getElementById('step-counter').textContent = `STEP ${step} / ${TOTAL}`;
}

function nextStep() { if (step < TOTAL) { step++; render(); } }
function prevStep()  { if (step > 0)    { step--; render(); } }

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
  if (e.key === 'Home') { step = 0; render(); }
  if (e.key === 'End')  { step = TOTAL; render(); }
});

document.getElementById('slide').addEventListener('contextmenu', e => {
  e.preventDefault(); prevStep();
});

buildDots();
render(); // show step 0 on load
</script>

</html>
