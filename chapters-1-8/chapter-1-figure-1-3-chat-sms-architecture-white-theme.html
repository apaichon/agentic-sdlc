<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat & SMS Architecture — Unified Inbox Pipeline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, sans-serif;
    user-select: none;
  }
  .container {
    width: 1200px;
    height: 700px;
    position: relative;
    cursor: pointer;
  }
  svg { width: 100%; height: 100%; }

  #click-hint {
    margin-top: 14px;
    font-size: 13px;
    color: #94a3b8;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .key {
    background: #334155;
    border: 1px solid #475569;
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 12px;
    color: #cbd5e1;
  }
  #step-counter {
    font-size: 12px;
    color: #64748b;
    margin-top: 6px;
    letter-spacing: 0.08em;
  }
  #progress-bar {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #334155;
    transition: background 0.3s, transform 0.3s;
  }
  .dot.done   { background: #0E7490; }
  .dot.active { background: #38BDF8; transform: scale(1.4); }

  /* ── animation base classes ── */
  .step-item {
    opacity: 0;
    transition: opacity 0.5s ease, transform 0.5s ease;
    transform: translateY(14px);
    transform-origin: center;
  }
  .step-item.visible { opacity: 1; transform: translateY(0); }

  .arrow-draw {
    opacity: 0;
    stroke-dashoffset: 80;
    transition: opacity 0.15s, stroke-dashoffset 0.5s ease;
  }
  .arrow-draw.visible { opacity: 1; stroke-dashoffset: 0; }

  .pop-item {
    opacity: 0;
    transform: scale(0.7);
    transform-origin: center;
    transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .pop-item.visible { opacity: 1; transform: scale(1); }

  /* ── continuous animations ── */
  @keyframes dashFlow {
    to { stroke-dashoffset: -24; }
  }
  @keyframes queuePulse {
    0%, 100% { opacity: 0.4; }
    50%       { opacity: 1; }
  }
  @keyframes dataGlow {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 1; }
  }
  .flow-arrow.visible {
    animation: dashFlow 1.2s linear infinite;
  }
  .queue-block.active {
    animation: queuePulse 1.8s ease-in-out infinite;
  }
</style>
</head>

  <span>Click slide or press</span>

  <span>/</span>
  <span class="key">→</span>
  <span>to advance &nbsp;·&nbsp;</span>
  <span class="key">←</span>
  <span>to go back &nbsp;·&nbsp;</span>
  <span class="key">R</span>
  <span>to reset</span>
</div>
<div id="step-counter">Step <span id="cur">0</span> / <span id="total">8</span></div>
<div id="progress-bar"></div>

<script>
const TOTAL_STEPS = 8;

const STEP_ELEMENTS = {
  0: ['title-group'],
  1: ['layer-inbox'],
  2: ['arrow-inbox-gw', 'layer-gateway'],
  3: ['arrow-gw-adapters', 'adapter-row-bg'],
  4: ['adapter-line', 'adapter-fb', 'adapter-slack', 'adapter-wa', 'adapter-teams', 'adapter-sms', 'adapter-badge'],
  5: ['arrow-adapters-mq', 'layer-rabbitmq', 'queue-blocks'],
  6: ['arrow-mq-mongo', 'arrow-mq-redis', 'arrow-mq-ch', 'store-mongo', 'store-redis', 'store-clickhouse'],
  7: ['layer-labels'],
  8: ['summary'],
};

let currentStep = -1;

// Build progress dots
const bar = document.getElementById('progress-bar');
for (let i = 0; i <= TOTAL_STEPS; i++) {
  const d = document.createElement('div');
  d.className = 'dot';
  d.id = `dot-${i}`;
  bar.appendChild(d);
}

function updateDots() {
  for (let i = 0; i <= TOTAL_STEPS; i++) {
    const d = document.getElementById(`dot-${i}`);
    if (i < currentStep) d.className = 'dot done';
    else if (i === currentStep) d.className = 'dot active';
    else d.className = 'dot';
  }
}

function showStep(step) {
  const ids = STEP_ELEMENTS[step] || [];
  ids.forEach((id, idx) => {
    const el = document.getElementById(id);
    if (!el) return;
    setTimeout(() => el.classList.add('visible'), idx * 90);
  });

  // Activate queue pulse animation at step 5
  if (step === 5) {
    document.querySelectorAll('#queue-blocks rect[id^="q"]').forEach(el => {
      el.classList.add('active');
    });
  }
}

function hideStep(step) {
  const ids = STEP_ELEMENTS[step] || [];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('visible');
  });
  if (step === 5) {
    document.querySelectorAll('#queue-blocks rect[id^="q"]').forEach(el => {
      el.classList.remove('active');
    });
  }
}

function nextStep() {
  if (currentStep >= TOTAL_STEPS) {
    for (let i = 0; i <= TOTAL_STEPS; i++) hideStep(i);
    currentStep = -1;
  }
  currentStep++;
  showStep(currentStep);
  document.getElementById('cur').textContent = currentStep;
  updateDots();
}

function prevStep() {
  if (currentStep <= 0) return;
  hideStep(currentStep);
  currentStep--;
  document.getElementById('cur').textContent = currentStep;
  updateDots();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); prevStep(); }
  if (e.key === 'r' || e.key === 'R') {
    for (let i = 0; i <= TOTAL_STEPS; i++) hideStep(i);
    currentStep = -1;
    document.getElementById('cur').textContent = 0;
    updateDots();
  }
});

nextStep();
</script>
