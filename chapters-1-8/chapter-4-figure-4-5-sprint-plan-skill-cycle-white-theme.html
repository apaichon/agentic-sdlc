<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#F0F2F5;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:100vh;
    font-family:system-ui,-apple-system,sans-serif;
    user-select:none;
  }
  .container { width:1200px; height:700px; position:relative; cursor:pointer; }
  svg { width:100%; height:100%; }

  /* step nodes: two-level nesting — outer has no SVG transform */
  .step-item {
    opacity:0;
    transform:scale(.88);
    transform-origin:50% 50%;
    transform-box:fill-box;
    transition:opacity .5s ease, transform .5s ease;
  }
  .step-item.visible { opacity:1; transform:scale(1); }

  /* arrows: controlled entirely via JS showArrow/hideArrow */
  .arrow-draw  { opacity:0; stroke-dasharray:1;          stroke-dashoffset:1; }
  .arrow-dashed{ opacity:0; stroke-dasharray:0.06 0.03;  stroke-dashoffset:1; }

  /* progress chrome */
  #progress-bar { display:flex; gap:8px; margin-top:12px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#e2e8f0; transition:background .3s, transform .3s; }
  .dot.done   { background:#0E7490; }
  .dot.active { background:#3b82f6; transform:scale(1.5); }
  #step-counter { font-size:12px; color:#64748b; margin-top:6px; letter-spacing:.08em; }
  #click-hint {
    margin-top:8px; font-size:12px; color:#94a3b8;
    letter-spacing:.04em; display:flex; align-items:center; gap:6px;
  }
  #click-hint .key {
    background:#e2e8f0; border:1px solid #cbd5e1;
    border-radius:5px; padding:1px 8px; font-size:11px; color:#475569;
  }

  /* idle animations */
  @keyframes glowPulse {
    0%,100%{ opacity:.15; r:95; }
    50%    { opacity:.40; r:105; }
  }
  @keyframes rotateSlow {
    from{ transform:rotate(0deg); }
    to  { transform:rotate(360deg); }
  }
  #center-pulse.active { animation:glowPulse 3s ease-in-out infinite; }
  #center-ring.active  {
    animation:rotateSlow 18s linear infinite;
    transform-origin:620px 370px;
    opacity:.35;
  }
</style>

  <span class="key">Home</span> start &nbsp;·&nbsp;
  <span class="key">End</span> finish
</div>

<script>
const TOTAL = 11;
let step = -1;

function buildDots() {
  const bar = document.getElementById('progress-bar');
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + i;
    bar.appendChild(d);
  }
}

/* Guaranteed arrow animation: force reflow between reset and animate-in */
function showArrow(el) {
  el.style.transition = 'none';
  el.style.opacity = '0';
  el.style.strokeDashoffset = '1';
  el.getBoundingClientRect(); // force reflow
  el.style.transition = 'opacity 0.05s ease, stroke-dashoffset 0.6s ease 0.05s';
  el.style.opacity = '1';
  el.style.strokeDashoffset = '0';
}

function hideArrow(el) {
  el.style.transition = 'none';
  el.style.opacity = '0';
  el.style.strokeDashoffset = '1';
}

function isArrow(el) {
  return el.classList.contains('arrow-draw') || el.classList.contains('arrow-dashed');
}

function render() {
  document.querySelectorAll('[data-step]').forEach(el => {
    if (parseInt(el.dataset.step) <= step) {
      if (isArrow(el)) showArrow(el);
      else el.classList.add('visible');
    } else {
      if (isArrow(el)) hideArrow(el);
      else el.classList.remove('visible');
    }
  });

  const pulse = document.getElementById('center-pulse');
  const ring  = document.getElementById('center-ring');
  if (step >= 1) {
    pulse && pulse.classList.add('active');
    ring  && ring.classList.add('active');
  } else {
    pulse && pulse.classList.remove('active');
    ring  && ring.classList.remove('active');
  }

  for (let i = 0; i <= TOTAL; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) d.className = 'dot' + (i < step ? ' done' : i === step ? ' active' : '');
  }
  document.getElementById('step-counter').textContent = `STEP ${step} / ${TOTAL}`;
}

function nextStep() { if (step < TOTAL) { step++; render(); } }
function prevStep()  { if (step > 0)    { step--; render(); } }

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); prevStep(); }
  if (e.key === 'Home')       { step = 0; render(); }
  if (e.key === 'End')        { step = TOTAL; render(); }
});

document.getElementById('slide').addEventListener('contextmenu', e => {
  e.preventDefault(); prevStep();
});

buildDots();
nextStep();
</script>
