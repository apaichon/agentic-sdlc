  <text x="945" y="486" text-anchor="middle" font-size="10" fill="#3b82f6">All MCP servers registered</text>

</svg>
</div>

<div id="progress-bar"></div>
<div id="step-counter">STEP 0 / 8</div>
<div id="click-hint">
  <span class="key">CLICK</span> or <span class="key">SPACE</span> to advance &nbsp;·&nbsp;
  <span class="key">Home</span> reset &nbsp;·&nbsp;
  <span class="key">End</span> jump to last
</div>

<script>
const TOTAL = 8;
let step = -1;
function buildDots() {
  const bar = document.getElementById('progress-bar');
  for (let i = 0; i <= TOTAL; i++) { const d=document.createElement('div'); d.className='dot'; d.id='dot-'+i; bar.appendChild(d); }
}
function nextStep() {
  if (step >= TOTAL) return; step++;
  document.querySelectorAll('[data-step]').forEach(el => { if (parseInt(el.dataset.step) <= step) el.classList.add('visible'); });
  if (step >= 1) { document.getElementById('ai-glow')?.classList.add('active'); document.getElementById('ai-ring')?.classList.add('active'); }
  for (let i = 0; i <= TOTAL; i++) { const d=document.getElementById('dot-'+i); if(d) d.className='dot'+(i<step?' done':i===step?' active':''); }
  document.getElementById('step-counter').textContent = `STEP ${step} / ${TOTAL}`;
}
document.addEventListener('keydown', e => {
  if (e.key===' '||e.key==='ArrowRight') { e.preventDefault(); nextStep(); }
  if (e.key==='Home') location.reload();
  if (e.key==='End') { while(step<TOTAL) nextStep(); }
});
buildDots(); nextStep();
</script>
</body>
</html>
