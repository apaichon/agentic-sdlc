  /*
   * KEY PATTERN: .step-item wraps each card with ONLY CSS fade+scale.
   * SVG translate is on an inner child <g> — never on the .step-item itself.
   * transform-box:fill-box keeps scale origin local to each element.
   */
  .step-item {
    opacity: 0;
    transform: scale(.88);
    transform-origin: 50% 50%;
    transform-box: fill-box;
    transition: opacity .5s ease, transform .5s ease;
  }
  .step-item.visible { opacity:1; transform:scale(1); }

  /* Arrow draw-on: pathLength="1" so dashoffset 1→0 works for any path length */
  .arrow-draw {
    opacity: 0;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
    transition: opacity .05s ease, stroke-dashoffset .6s ease;
  }
  .arrow-draw.visible { opacity:1; stroke-dashoffset:0; }

  .badge-item {
    opacity:0; transform:scale(0);
    transform-origin:50% 50%; transform-box:fill-box;
    transition:opacity .4s ease, transform .4s cubic-bezier(.34,1.56,.64,1);
  }
  .badge-item.visible { opacity:1; transform:scale(1); }
</style>

<div id="step-counter">STEP 0 / 10</div>
<div id="click-hint"><span class="key">CLICK</span> advance &nbsp;·&nbsp; <span class="key">RIGHT-CLICK</span> back &nbsp;·&nbsp; <span class="key">← →</span> step &nbsp;·&nbsp; <span class="key">Home</span> start &nbsp;·&nbsp; <span class="key">End</span> finish</div>

<script>
const TOTAL = 10;
let step = -1;

function buildDots() {
  const bar = document.getElementById('progress-bar');
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + i;
    bar.appendChild(d);
  }
}

function render() {
  document.querySelectorAll('[data-step]').forEach(el => {
    if (parseInt(el.dataset.step) <= step) el.classList.add('visible');
    else el.classList.remove('visible');
  });
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) d.className = 'dot' + (i < step ? ' done' : i === step ? ' active' : '');
  }
  document.getElementById('step-counter').textContent = `STEP ${step} / ${TOTAL}`;
}

function nextStep() { if (step < TOTAL) { step++; render(); } }
function prevStep()  { if (step > 0)    { step--; render(); } }

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
  if (e.key === 'Home') { step = 0; render(); }
  if (e.key === 'End')  { step = TOTAL; render(); }
});

document.getElementById('slide').addEventListener('contextmenu', e => {
  e.preventDefault(); prevStep();
});

buildDots();
nextStep(); // auto-show step 0
</script>
</body>
</html>
