<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sprint Improvement Cycle</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;display:block;background:#fbfcff}.step-item{opacity:0;transform:scale(.9);transform-origin:50% 50%;transform-box:fill-box;transition:.45s}.step-item.visible{opacity:1;transform:scale(1)}.arrow-draw{opacity:0;stroke-dasharray:1;stroke-dashoffset:1}.dot{width:8px;height:8px;border-radius:50%;background:#d8e0ec;transition:.25s}.dot.done{background:#0e7490}.dot.active{background:#2563eb;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#64748b;display:flex;gap:8px}.key{border:1px solid #cbd5e1;background:#e2e8f0;border-radius:6px;padding:2px 9px}.h{font-size:31px;font-weight:900}.s{font-size:20px;fill:#0f172a}.flow.visible{animation:dash 1.4s linear infinite}@keyframes dash{to{stroke-dashoffset:-20}}
</style></head><body><div class="container" id="slide" onclick="nextStep()"><svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#e8ecf3"/></pattern><filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#26324a25"/></filter><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#10243a"/></marker></defs><rect width="1200" height="700" fill="url(#grid)"/>
<g class="step-item" data-step="0"><text x="600" y="45" text-anchor="middle" font-size="30" font-weight="900" fill="#0f172a">Continuous Sprint Improvement Loop</text><text x="600" y="72" text-anchor="middle" font-size="15" fill="#526078">Measure usage, analyze patterns, refine conventions, and evolve the system.</text></g>
<g class="step-item" data-step="1"><circle cx="405" cy="190" r="130" fill="#f4f8ff" stroke="#1d5bd8" stroke-width="4" filter="url(#shadow)"/><text x="405" y="160" text-anchor="middle" font-size="56" fill="#1d5bd8">chart</text><text x="405" y="205" text-anchor="middle" class="h" fill="#1d5bd8">1. Measure</text><line x1="310" y1="225" x2="500" y2="225" stroke="#bfdbfe"/><text x="345" y="255" class="s">• AI usage metrics</text><text x="345" y="285" class="s">• Sprint velocity</text></g>
<path class="arrow-draw flow" data-step="2" pathLength="1" d="M510 145C585 100 660 100 730 145" fill="none" stroke="#10243a" stroke-width="6" marker-end="url(#arrow)"/>
<g class="step-item" data-step="2"><circle cx="795" cy="190" r="130" fill="#fbf7ff" stroke="#6d3bc1" stroke-width="4" filter="url(#shadow)"/><text x="795" y="160" text-anchor="middle" font-size="58" fill="#6d3bc1">lens</text><text x="795" y="205" text-anchor="middle" class="h" fill="#6d3bc1">2. Analyze</text><line x1="700" y1="225" x2="890" y2="225" stroke="#ddd6fe"/><text x="735" y="255" class="s">• /retrospective skill</text><text x="735" y="285" class="s">• Usage patterns</text></g>
<path class="arrow-draw flow" data-step="3" pathLength="1" d="M890 300C925 370 910 445 835 505" fill="none" stroke="#10243a" stroke-width="6" marker-end="url(#arrow)"/>
<g class="step-item" data-step="3"><circle cx="795" cy="500" r="125" fill="#fff4f8" stroke="#ec407a" stroke-width="4" filter="url(#shadow)"/><text x="795" y="470" text-anchor="middle" font-size="56" fill="#ec407a">edit</text><text x="795" y="515" text-anchor="middle" class="h" fill="#ec407a">3. Refine</text><line x1="700" y1="535" x2="890" y2="535" stroke="#fbcfe8"/><text x="735" y="565" class="s">• Update CLAUDE.md</text><text x="735" y="595" class="s">• Add new skills</text></g>
<path class="arrow-draw flow" data-step="4" pathLength="1" d="M675 555C590 600 515 600 450 545" fill="none" stroke="#10243a" stroke-width="6" marker-end="url(#arrow)"/>
<g class="step-item" data-step="4"><circle cx="405" cy="500" r="125" fill="#fff8ed" stroke="#f97316" stroke-width="4" filter="url(#shadow)"/><text x="405" y="470" text-anchor="middle" font-size="56" fill="#f97316">rocket</text><text x="405" y="515" text-anchor="middle" class="h" fill="#f97316">4. Evolve</text><line x1="310" y1="535" x2="500" y2="535" stroke="#fed7aa"/><text x="345" y="565" class="s">• New hooks</text><text x="345" y="595" class="s">• Better prompts</text></g>
<path class="arrow-draw flow" data-step="5" pathLength="1" d="M320 390C285 320 285 250 330 205" fill="none" stroke="#10243a" stroke-width="6" marker-end="url(#arrow)"/><g class="step-item" data-step="5"><circle cx="600" cy="350" r="95" fill="#fff" stroke="#cbd5e1" stroke-dasharray="8 7" stroke-width="2"/><text x="600" y="320" text-anchor="middle" font-size="35" font-weight="900" fill="#0f172a">Sprint N</text><text x="600" y="365" text-anchor="middle" font-size="38" font-weight="900" fill="#0f172a">→</text><text x="600" y="405" text-anchor="middle" font-size="30" font-weight="900" fill="#0f172a">Sprint N+1</text></g>
<g class="step-item" data-step="6"><rect x="180" y="625" width="370" height="52" rx="10" fill="#fff" stroke="#93c5fd" stroke-width="2" filter="url(#shadow)"/><text x="270" y="660" font-size="28" font-weight="900" fill="#1d5bd8">Sprint 1:</text><text x="405" y="660" font-size="28" fill="#0f172a">3 conventions</text><circle cx="600" cy="651" r="38" fill="#10243a"/><text x="600" y="663" text-anchor="middle" font-size="30" font-weight="900" fill="#fff">VS</text><rect x="650" y="625" width="370" height="52" rx="10" fill="#fff" stroke="#c4b5fd" stroke-width="2" filter="url(#shadow)"/><text x="720" y="660" font-size="28" font-weight="900" fill="#6d3bc1">Sprint 6:</text><text x="860" y="660" font-size="28" fill="#0f172a">12 conventions</text></g>
</svg></div><div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div><script>
const TOTAL=6;let step=-1;for(let i=0;i<=TOTAL;i++){const d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function isArrow(e){return e.classList.contains("arrow-draw")}function showArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.getBoundingClientRect();e.style.transition="opacity .05s ease,stroke-dashoffset .7s ease .05s";e.style.opacity=1;e.style.strokeDashoffset=0;e.classList.add("visible")}function hideArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.classList.remove("visible")}function render(){document.querySelectorAll("[data-step]").forEach(e=>{parseInt(e.dataset.step)<=step?(isArrow(e)?showArrow(e):e.classList.add("visible")):(isArrow(e)?hideArrow(e):e.classList.remove("visible"))});for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script></body></html>
