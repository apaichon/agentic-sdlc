<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Production Dashboard</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#0b1118;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;display:block;background:#0b1118}.step-item{opacity:0;transform:scale(.96);transform-origin:50% 50%;transform-box:fill-box;transition:.45s}.step-item.visible{opacity:1;transform:scale(1)}.dot{width:8px;height:8px;border-radius:50%;background:#243244;transition:.25s}.dot.done{background:#22c55e}.dot.active{background:#60a5fa;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#94a3b8;display:flex;gap:8px}.key{border:1px solid #334155;background:#1e293b;border-radius:6px;padding:2px 9px}.panel{fill:#111a24;stroke:#263241}.h{font-size:20px;font-weight:900;fill:#f8fafc}.s{font-size:15px;fill:#e2e8f0}
</style></head><body><div class="container" id="slide" onclick="nextStep()"><svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"><defs><filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0008"/></filter></defs>
<g class="step-item" data-step="0"><text x="70" y="42" font-size="28" font-weight="900" fill="#fff">CONSOLIDATE CHAT - PRODUCTION DASHBOARD</text><text x="760" y="42" font-size="16" fill="#d1d5db">All Systems Operational</text><circle cx="740" cy="34" r="8" fill="none" stroke="#22c55e" stroke-width="3"/></g>
<g class="step-item" data-step="1"><rect x="18" y="74" width="580" height="290" rx="8" class="panel" filter="url(#shadow)"/><text x="48" y="110" class="h">LATENCY (P95)</text><text x="520" y="112" text-anchor="end" font-size="28" font-weight="900" fill="#4ade80">88ms</text><line x1="80" y1="310" x2="560" y2="310" stroke="#475569"/><line x1="80" y1="150" x2="80" y2="310" stroke="#475569"/><path d="M80 250C130 235 160 260 210 242S280 255 330 238S410 255 470 242S520 245 560 238" fill="none" stroke="#4ade80" stroke-width="3"/><line x1="80" y1="170" x2="560" y2="170" stroke="#ef4444" stroke-dasharray="8 8"/><text x="100" y="150" class="s" fill="#ef4444">Threshold 200ms</text></g>
<g class="step-item" data-step="2"><rect x="610" y="74" width="570" height="290" rx="8" class="panel" filter="url(#shadow)"/><text x="640" y="110" class="h">TRAFFIC (msg/min)</text><g font-size="17" font-weight="850" fill="#f8fafc"><text x="675" y="158">Line</text><text x="675" y="203">Facebook</text><text x="675" y="248">Slack</text><text x="675" y="293">WhatsApp</text><text x="675" y="338">SMS</text></g><rect x="755" y="138" width="340" height="28" fill="#4ade80"/><rect x="755" y="183" width="255" height="28" fill="#3b82f6"/><rect x="755" y="228" width="135" height="28" fill="#a855f7"/><rect x="755" y="273" width="200" height="28" fill="#2dd4bf"/><rect x="755" y="318" width="102" height="28" fill="#f59e0b"/><g font-size="21" font-weight="900" fill="#fff"><text x="1115" y="160">120</text><text x="1115" y="205">89</text><text x="1115" y="250">45</text><text x="1115" y="295">67</text><text x="1115" y="340">34</text></g></g>
<g class="step-item" data-step="3"><rect x="18" y="380" width="580" height="290" rx="8" class="panel" filter="url(#shadow)"/><text x="48" y="420" class="h">ERRORS</text><text x="48" y="520" font-size="70" font-weight="900" fill="#4ade80">0.02%</text><text x="80" y="560" font-size="24" fill="#4ade80">OK &lt; 0.1%</text><text x="300" y="455" class="s">TOP ERROR TYPES</text><g class="s"><text x="300" y="490">Webhook Signature Invalid</text><text x="300" y="525">Upstream Timeout</text><text x="300" y="560">Rate Limit Exceeded</text><text x="300" y="595">Message Parse Error</text></g></g>
<g class="step-item" data-step="4"><rect x="610" y="380" width="570" height="290" rx="8" class="panel" filter="url(#shadow)"/><text x="640" y="420" class="h">SATURATION</text><g transform="translate(720,505)"><path d="M-55 20A55 55 0 0 1 55 20" fill="none" stroke="#334155" stroke-width="16"/><path d="M-55 20A55 55 0 0 1 -10 -32" fill="none" stroke="#4ade80" stroke-width="16"/><text text-anchor="middle" font-size="26" font-weight="900" fill="#4ade80">23%</text><text y="48" text-anchor="middle" class="s">RabbitMQ</text></g><g transform="translate(890,505)"><path d="M-55 20A55 55 0 0 1 55 20" fill="none" stroke="#334155" stroke-width="16"/><path d="M-55 20A55 55 0 0 1 0 -35" fill="none" stroke="#facc15" stroke-width="16"/><text text-anchor="middle" font-size="26" font-weight="900" fill="#facc15">45%</text><text y="48" text-anchor="middle" class="s">MongoDB</text></g><g transform="translate(1060,505)"><path d="M-55 20A55 55 0 0 1 55 20" fill="none" stroke="#334155" stroke-width="16"/><path d="M-55 20A55 55 0 0 1 -25 -25" fill="none" stroke="#4ade80" stroke-width="16"/><text text-anchor="middle" font-size="26" font-weight="900" fill="#4ade80">12%</text><text y="48" text-anchor="middle" class="s">Redis</text></g><g transform="translate(805,625)"><path d="M-55 20A55 55 0 0 1 55 20" fill="none" stroke="#334155" stroke-width="16"/><path d="M-55 20A55 55 0 0 1 -2 -35" fill="none" stroke="#4ade80" stroke-width="16"/><text text-anchor="middle" font-size="26" font-weight="900" fill="#4ade80">34%</text></g><g transform="translate(975,625)"><path d="M-55 20A55 55 0 0 1 55 20" fill="none" stroke="#334155" stroke-width="16"/><path d="M-55 20A55 55 0 0 1 -15 -32" fill="none" stroke="#4ade80" stroke-width="16"/><text text-anchor="middle" font-size="26" font-weight="900" fill="#4ade80">28%</text></g></g>
</svg></div><div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div><script>
const TOTAL=4;let step=-1;for(let i=0;i<=TOTAL;i++){const d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function render(){document.querySelectorAll("[data-step]").forEach(e=>parseInt(e.dataset.step)<=step?e.classList.add("visible"):e.classList.remove("visible"));for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script></body></html>
