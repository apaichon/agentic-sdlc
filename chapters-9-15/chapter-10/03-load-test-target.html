<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Load Test Target</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;display:block;background:#fbfcff}.step-item{opacity:0;transform:scale(.9);transform-origin:50% 50%;transform-box:fill-box;transition:.45s}.step-item.visible{opacity:1;transform:scale(1)}.dot{width:8px;height:8px;border-radius:50%;background:#d8e0ec;transition:.25s}.dot.done{background:#0e7490}.dot.active{background:#2563eb;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#64748b;display:flex;gap:8px}.key{border:1px solid #cbd5e1;background:#e2e8f0;border-radius:6px;padding:2px 9px}.h{font-size:26px;font-weight:900;fill:#0f172a}.s{font-size:16px;fill:#0f172a}.ok{fill:#15803d}
</style></head><body><div class="container" id="slide" onclick="nextStep()"><svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#e8ecf3"/></pattern><filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#26324a25"/></filter></defs><rect width="1200" height="700" fill="url(#grid)"/>
<g class="step-item" data-step="0"><rect x="210" y="20" width="780" height="70" rx="8" fill="#fff" stroke="#0f2b6f" stroke-width="3" filter="url(#shadow)"/><text x="600" y="66" text-anchor="middle" font-size="42" font-weight="900" fill="#0f172a">Load Test: 10,000 msg/hr Target</text></g>
<g class="step-item" data-step="1"><rect x="25" y="105" width="535" height="260" rx="8" fill="#fff" stroke="#94a3b8" filter="url(#shadow)"/><text x="65" y="145" class="h">1. Throughput</text><line x1="100" y1="325" x2="390" y2="325" stroke="#64748b"/><line x1="100" y1="325" x2="100" y2="165" stroke="#64748b"/><rect x="155" y="205" width="90" height="120" fill="#1d4ed8"/><rect x="285" y="170" width="90" height="155" fill="#16a34a"/><text x="200" y="195" text-anchor="middle" font-size="20" font-weight="900">10,000</text><text x="330" y="160" text-anchor="middle" font-size="20" font-weight="900">12,300</text><rect x="420" y="180" width="105" height="60" rx="8" fill="#f0fdf4" stroke="#15803d"/><text x="472" y="218" text-anchor="middle" font-size="26" font-weight="900" fill="#15803d">PASS</text><text x="470" y="305" text-anchor="middle" font-size="42" font-weight="900" fill="#15803d">12.3k</text></g>
<g class="step-item" data-step="2"><rect x="580" y="105" width="595" height="260" rx="8" fill="#fff" stroke="#94a3b8" filter="url(#shadow)"/><text x="625" y="145" class="h">2. Latency</text><g font-size="20" font-weight="900"><text x="625" y="205">P50</text><text x="625" y="265">P95</text><text x="625" y="325">P99</text></g><g stroke="#94a3b8" stroke-width="14" stroke-linecap="round"><line x1="720" y1="200" x2="1040" y2="200"/><line x1="720" y1="260" x2="1040" y2="260"/><line x1="720" y1="320" x2="1040" y2="320"/></g><g stroke="#16a34a" stroke-width="14" stroke-linecap="round"><line x1="720" y1="200" x2="830" y2="200"/><line x1="720" y1="260" x2="880" y2="260"/><line x1="720" y1="320" x2="940" y2="320"/></g><text x="835" y="185" font-size="20" font-weight="900" fill="#15803d">42ms</text><text x="885" y="245" font-size="20" font-weight="900" fill="#15803d">88ms</text><text x="945" y="305" font-size="20" font-weight="900" fill="#15803d">156ms</text><g fill="#15803d" font-size="25"><text x="1100" y="208">v</text><text x="1100" y="268">v</text><text x="1100" y="328">v</text></g></g>
<g class="step-item" data-step="3"><rect x="25" y="380" width="535" height="230" rx="8" fill="#fff" stroke="#94a3b8" filter="url(#shadow)"/><text x="65" y="420" class="h">3. Error Rate</text><path d="M120 570A140 140 0 0 1 400 570" fill="none" stroke="#16a34a" stroke-width="28"/><path d="M320 448A140 140 0 0 1 400 570" fill="none" stroke="#f59e0b" stroke-width="28"/><path d="M370 490A140 140 0 0 1 400 570" fill="none" stroke="#ef4444" stroke-width="28"/><line x1="190" y1="530" x2="120" y2="500" stroke="#0f172a" stroke-width="6"/><circle cx="190" cy="530" r="10" fill="#0f172a"/><text x="300" y="555" text-anchor="middle" font-size="45" font-weight="900" fill="#15803d">0.02%</text><rect x="420" y="510" width="110" height="58" rx="8" fill="#f0fdf4" stroke="#15803d"/><text x="475" y="548" text-anchor="middle" font-size="25" font-weight="900" fill="#15803d">PASS</text></g>
<g class="step-item" data-step="4"><rect x="580" y="380" width="595" height="230" rx="8" fill="#fff" stroke="#94a3b8" filter="url(#shadow)"/><text x="625" y="420" class="h">4. Resource Utilization</text><g font-size="18" font-weight="900"><text x="650" y="475">CPU</text><text x="650" y="530">Memory</text><text x="650" y="585">RabbitMQ Queue</text></g><g stroke="#94a3b8" stroke-width="14" stroke-linecap="round"><line x1="780" y1="470" x2="1050" y2="470"/><line x1="780" y1="525" x2="1050" y2="525"/><line x1="780" y1="580" x2="1050" y2="580"/></g><line x1="780" y1="470" x2="925" y2="470" stroke="#2563eb" stroke-width="14" stroke-linecap="round"/><line x1="780" y1="525" x2="948" y2="525" stroke="#7c3aed" stroke-width="14" stroke-linecap="round"/><line x1="780" y1="580" x2="860" y2="580" stroke="#f97316" stroke-width="14" stroke-linecap="round"/><text x="940" y="455" font-size="18" font-weight="900" fill="#2563eb">52%</text><text x="960" y="510" font-size="18" font-weight="900" fill="#7c3aed">61%</text><text x="870" y="565" font-size="18" font-weight="900" fill="#f97316">23%</text></g>
<g class="step-item" data-step="5"><rect x="35" y="625" width="1130" height="55" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/><text x="140" y="662" font-size="34" font-weight="900" fill="#0f172a">Headroom: <tspan fill="#15803d">23%</tspan> above target - Ready for Production</text></g>
</svg></div><div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div><script>
const TOTAL=5;let step=-1;for(let i=0;i<=TOTAL;i++){const d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function render(){document.querySelectorAll("[data-step]").forEach(e=>parseInt(e.dataset.step)<=step?e.classList.add("visible"):e.classList.remove("visible"));for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script></body></html>
