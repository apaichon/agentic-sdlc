<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 10 Skill & Agent Exercises</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;display:block;background:#fbfcff}.step-item{opacity:0;transform:translateY(14px) scale(.98);transform-origin:50% 50%;transform-box:fill-box;transition:opacity .42s ease,transform .42s ease}.step-item.visible{opacity:1;transform:translateY(0) scale(1)}.dot{width:8px;height:8px;border-radius:50%;background:#d8e0ec;transition:.25s}.dot.done{background:#0e7490}.dot.active{background:#2563eb;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#64748b;display:flex;gap:8px}.key{border:1px solid #cbd5e1;background:#e2e8f0;border-radius:6px;padding:2px 9px;font-size:12px}.title{font-size:30px;font-weight:900;fill:#10203f}.subtitle{font-size:15px;fill:#526078}.card-title{font-size:17px;font-weight:900;fill:#10203f}.label{font-size:11px;font-weight:900;letter-spacing:.08em;fill:#64748b}.body{font-size:13.5px;fill:#10203f}.answer{font-size:13.5px;font-weight:850;fill:#0f172a}.chip{font-size:11px;font-weight:900;fill:#fff}.agent{font-size:12px;font-weight:900;fill:#fff}.skill{font-family:"SFMono-Regular","Cascadia Code","Liberation Mono",Menlo,monospace;font-size:12.5px;fill:#0f172a}.pop.visible{animation:pop .7s ease both}@keyframes pop{0%{transform:translateY(14px) scale(.92)}70%{transform:translateY(0) scale(1.03)}100%{transform:translateY(0) scale(1)}}
</style>
</head>
<body>
<div class="container" id="slide" onclick="nextStep()">
<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#e8ecf3"/></pattern>
<filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#26324a25"/></filter>
</defs>
<rect width="1200" height="700" fill="url(#grid)"/>

<g class="step-item" data-step="0">
  <text x="600" y="42" text-anchor="middle" class="title">Chapter 10 Skill & Agent Exercises</text>
  <text x="600" y="68" text-anchor="middle" class="subtitle">Practice assigning production-launch work to the right Agent and repeatable Skill.</text>
  <rect x="240" y="86" width="720" height="38" rx="19" fill="#ecfeff" stroke="#0891b2"/>
  <text x="600" y="110" text-anchor="middle" font-size="15" font-weight="900" fill="#0e7490">Question pattern: Who owns launch readiness? What Skill produces the review artifact?</text>
</g>

<g class="step-item pop" data-step="1">
  <g transform="translate(48,146)">
    <rect width="356" height="210" rx="10" fill="#fff" stroke="#3154d4" stroke-width="2" filter="url(#shadow)"/>
    <rect width="356" height="42" rx="10" fill="#dbeafe" stroke="#3154d4"/>
    <circle cx="28" cy="21" r="15" fill="#3154d4"/><text x="28" y="26" text-anchor="middle" class="chip">10.1</text>
    <text x="55" y="27" class="card-title">Readiness Scorecard</text>
    <text x="22" y="68" class="label">QUESTION</text>
    <text x="22" y="90" class="body">ใครควร own go-live readiness decision?</text>
    <text x="22" y="117" class="label">EXPECTED ANSWER</text>
    <rect x="22" y="132" width="112" height="24" rx="12" fill="#3154d4"/><text x="78" y="149" text-anchor="middle" class="agent">Release Agent</text>
    <text x="150" y="149" class="skill">readiness-scorecard</text>
    <text x="22" y="177" class="label">EXERCISE</text>
    <text x="22" y="198" class="answer">Build pass/warn/fail scorecard with owners</text>
  </g>
</g>

<g class="step-item pop" data-step="2">
  <g transform="translate(422,146)">
    <rect width="356" height="210" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
    <rect width="356" height="42" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
    <circle cx="28" cy="21" r="15" fill="#7c3aed"/><text x="28" y="26" text-anchor="middle" class="chip">10.2</text>
    <text x="55" y="27" class="card-title">Launch Day Timeline</text>
    <text x="22" y="68" class="label">QUESTION</text>
    <text x="22" y="90" class="body">ใครควร coordinate timeline และ checkpoints?</text>
    <text x="22" y="117" class="label">EXPECTED ANSWER</text>
    <rect x="22" y="132" width="112" height="24" rx="12" fill="#7c3aed"/><text x="78" y="149" text-anchor="middle" class="agent">Release Agent</text>
    <text x="150" y="149" class="skill">launch-runbook</text>
    <text x="22" y="177" class="label">EXERCISE</text>
    <text x="22" y="198" class="answer">Create T-60 to T+120 timeline table</text>
  </g>
</g>

<g class="step-item pop" data-step="3">
  <g transform="translate(796,146)">
    <rect width="356" height="210" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <rect width="356" height="42" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
    <circle cx="28" cy="21" r="15" fill="#f59e0b"/><text x="28" y="26" text-anchor="middle" class="chip">10.3</text>
    <text x="55" y="27" class="card-title">Load Test Targets</text>
    <text x="22" y="68" class="label">QUESTION</text>
    <text x="22" y="90" class="body">ใครควร define SLO และ test thresholds?</text>
    <text x="22" y="117" class="label">EXPECTED ANSWER</text>
    <rect x="22" y="132" width="112" height="24" rx="12" fill="#f59e0b"/><text x="78" y="149" text-anchor="middle" class="agent">Tester Agent</text>
    <text x="150" y="149" class="skill">load-test-design</text>
    <text x="22" y="177" class="label">EXERCISE</text>
    <text x="22" y="198" class="answer">Write test matrix with pass/fail thresholds</text>
  </g>
</g>

<g class="step-item pop" data-step="4">
  <g transform="translate(165,388)">
    <rect width="410" height="210" rx="10" fill="#fff" stroke="#0d9488" stroke-width="2" filter="url(#shadow)"/>
    <rect width="410" height="42" rx="10" fill="#ccfbf1" stroke="#0d9488"/>
    <circle cx="28" cy="21" r="15" fill="#0d9488"/><text x="28" y="26" text-anchor="middle" class="chip">10.4</text>
    <text x="55" y="27" class="card-title">Production Dashboard</text>
    <text x="22" y="68" class="label">QUESTION</text>
    <text x="22" y="90" class="body">ใครควร own launch observability และ alerts?</text>
    <text x="22" y="117" class="label">EXPECTED ANSWER</text>
    <rect x="22" y="132" width="112" height="24" rx="12" fill="#0d9488"/><text x="78" y="149" text-anchor="middle" class="agent">SRE Agent</text>
    <text x="150" y="149" class="skill">dashboard-design</text>
    <text x="22" y="177" class="label">EXERCISE</text>
    <text x="22" y="198" class="answer">Define Grafana panels, alerts, and golden signals</text>
  </g>
</g>

<g class="step-item pop" data-step="5">
  <g transform="translate(625,388)">
    <rect width="410" height="210" rx="10" fill="#fff" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
    <rect width="410" height="42" rx="10" fill="#dcfce7" stroke="#16a34a"/>
    <circle cx="28" cy="21" r="15" fill="#16a34a"/><text x="28" y="26" text-anchor="middle" class="chip">10.5</text>
    <text x="55" y="27" class="card-title">Sprint Improvement Cycle</text>
    <text x="22" y="68" class="label">QUESTION</text>
    <text x="22" y="90" class="body">ใครควร convert launch learnings into backlog?</text>
    <text x="22" y="117" class="label">EXPECTED ANSWER</text>
    <rect x="22" y="132" width="112" height="24" rx="12" fill="#16a34a"/><text x="78" y="149" text-anchor="middle" class="agent">PM Agent</text>
    <text x="150" y="149" class="skill">retro-improvement</text>
    <text x="22" y="177" class="label">EXERCISE</text>
    <text x="22" y="198" class="answer">Create improvement backlog with owners and due dates</text>
  </g>
</g>

<g class="step-item" data-step="6">
  <rect x="128" y="620" width="944" height="46" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="648" text-anchor="middle" font-size="16" font-weight="900" fill="#f8fafc">Rule of thumb: launch work needs a named owner, a repeatable Skill, and a go/no-go artifact.</text>
</g>
</svg>
</div>
<div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div>
<script>
const TOTAL=6;let step=-1;for(let i=0;i<=TOTAL;i++){const d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function render(){document.querySelectorAll("[data-step]").forEach(e=>{parseInt(e.dataset.step)<=step?e.classList.add("visible"):e.classList.remove("visible")});for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script>
</body>
</html>
