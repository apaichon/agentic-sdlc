<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Observability Pillars</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;background:#fbfcff}.step-item{opacity:0;transform:scale(.9);transform-origin:50% 50%;transform-box:fill-box;transition:.45s}.step-item.visible{opacity:1;transform:scale(1)}.arrow-draw{opacity:0;stroke-dasharray:1;stroke-dashoffset:1}.dot{width:8px;height:8px;border-radius:50%;background:#d8e0ec;transition:.25s}.dot.done{background:#0e7490}.dot.active{background:#2563eb;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#64748b;display:flex;gap:8px}.key{border:1px solid #cbd5e1;background:#e2e8f0;border-radius:6px;padding:2px 9px}.h{font-size:42px;font-weight:900}.b{font-size:22px;font-weight:800;fill:#1f3448}.s{font-size:17px;fill:#102033}.flow.visible{animation:dash 1.4s linear infinite}@keyframes dash{to{stroke-dashoffset:-20}}</style></head><body><div class="container" id="slide" onclick="nextStep()"><svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#e8ecf3"/></pattern><filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#26324a25"/></filter><marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#475569"/></marker></defs><rect width="1200" height="700" fill="url(#grid)"/>
<g class="step-item" data-step="0"><text x="600" y="38" text-anchor="middle" font-size="30" font-weight="900" fill="#102033">Metrics, Logs, Traces</text><text x="600" y="64" text-anchor="middle" font-size="15" fill="#526078">Use all three signals to move from symptom to root cause.</text></g>
<g class="step-item" data-step="1"><g transform="translate(50,78)"><rect width="310" height="430" rx="14" fill="#fff" stroke="#1d6ed8" stroke-width="2" filter="url(#shadow)"/><text x="155" y="62" text-anchor="middle" class="h" fill="#1d6ed8">METRICS</text><polyline points="75,250 75,145 240,145" fill="none" stroke="#334155" stroke-width="5"/><polyline points="80,230 115,210 145,180 175,195 205,155 235,160 260,135" fill="none" stroke="#1d6ed8" stroke-width="5"/><line x1="25" y1="270" x2="285" y2="270" stroke="#1d6ed8"/><text x="65" y="315" class="b">• Numeric, aggregated</text><text x="65" y="360" class="b">• Cheap to store</text><text x="65" y="405" class="b">• Trends & thresholds</text><rect x="25" y="455" width="260" height="54" rx="8" fill="#f8fbff" stroke="#93c5fd" stroke-dasharray="6 5"/><text x="155" y="488" text-anchor="middle" class="s">P95 latency, msg/sec</text></g></g>
<g class="step-item" data-step="2"><g transform="translate(445,78)"><rect width="310" height="430" rx="14" fill="#fff" stroke="#15803d" stroke-width="2" filter="url(#shadow)"/><text x="155" y="62" text-anchor="middle" class="h" fill="#15803d">LOGS</text><rect x="80" y="130" width="150" height="95" rx="6" fill="#263747" stroke="#0f172a"/><rect x="80" y="130" width="150" height="22" rx="6" fill="#4ade80"/><text x="100" y="190" font-size="34" fill="#4ade80">&gt;_</text><line x1="25" y1="270" x2="285" y2="270" stroke="#15803d"/><text x="65" y="315" class="b">• Textual events</text><text x="65" y="360" class="b">• High-cardinality</text><text x="65" y="405" class="b">• Narrative context</text><rect x="25" y="455" width="260" height="54" rx="8" fill="#f8fff9" stroke="#86efac" stroke-dasharray="6 5"/><text x="155" y="488" text-anchor="middle" class="s">Errors, payloads, config</text></g></g>
<g class="step-item" data-step="3"><g transform="translate(840,78)"><rect width="310" height="430" rx="14" fill="#fff" stroke="#6d3bc1" stroke-width="2" filter="url(#shadow)"/><text x="155" y="62" text-anchor="middle" class="h" fill="#6d3bc1">TRACES</text><g stroke="#6d3bc1" stroke-width="5" fill="#a78bfa"><line x1="80" y1="175" x2="130" y2="145"/><line x1="130" y1="145" x2="190" y2="165"/><line x1="190" y1="165" x2="245" y2="130"/><line x1="190" y1="165" x2="245" y2="195"/><circle cx="80" cy="175" r="14"/><circle cx="130" cy="145" r="14"/><circle cx="190" cy="165" r="14"/><circle cx="245" cy="130" r="14"/><circle cx="245" cy="195" r="14"/></g><line x1="25" y1="270" x2="285" y2="270" stroke="#6d3bc1"/><text x="65" y="315" class="b">• Causal chains</text><text x="65" y="360" class="b">• Cross-service</text><text x="65" y="405" class="b">• Latency breakdown</text><rect x="25" y="455" width="260" height="54" rx="8" fill="#fbf7ff" stroke="#c4b5fd" stroke-dasharray="6 5"/><text x="155" y="488" text-anchor="middle" class="s">Webhook → Router → DB</text></g></g>
<g class="step-item" data-step="4"><rect x="55" y="535" width="1090" height="105" rx="14" fill="#fff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/><text x="205" y="600" text-anchor="middle" class="b">Metric spike</text><path class="arrow-draw flow" data-step="4" pathLength="1" d="M280 590H350" fill="none" stroke="#475569" stroke-width="8" marker-end="url(#arr)"/><text x="455" y="600" text-anchor="middle" class="b">Find logs</text><path class="arrow-draw flow" data-step="4" pathLength="1" d="M540 590H610" fill="none" stroke="#475569" stroke-width="8" marker-end="url(#arr)"/><text x="705" y="600" text-anchor="middle" class="b">Open trace</text><path class="arrow-draw flow" data-step="4" pathLength="1" d="M790 590H860" fill="none" stroke="#475569" stroke-width="8" marker-end="url(#arr)"/><text x="985" y="600" text-anchor="middle" class="b">Root cause</text></g>
</svg></div><div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div><script>
const TOTAL=4;let step=-1;for(let i=0;i<=TOTAL;i++){const d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function isArrow(e){return e.classList.contains("arrow-draw")}function showArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.getBoundingClientRect();e.style.transition="opacity .05s ease,stroke-dashoffset .7s ease .05s";e.style.opacity=1;e.style.strokeDashoffset=0;e.classList.add("visible")}function hideArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.classList.remove("visible")}function render(){document.querySelectorAll("[data-step]").forEach(e=>{parseInt(e.dataset.step)<=step?(isArrow(e)?showArrow(e):e.classList.add("visible")):(isArrow(e)?hideArrow(e):e.classList.remove("visible"))});for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script></body></html>
