<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trace Waterfall Dark</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#07111d;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,ui-monospace,monospace;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;background:#07111d}.step-item{opacity:0;transform:scale(.98);transform-origin:50% 50%;transform-box:fill-box;transition:.45s}.step-item.visible{opacity:1;transform:scale(1)}.dot{width:8px;height:8px;border-radius:50%;background:#243244;transition:.25s}.dot.done{background:#22c55e}.dot.active{background:#60a5fa;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#94a3b8;display:flex;gap:8px}.key{border:1px solid #334155;background:#1e293b;border-radius:6px;padding:2px 9px}.t{font-size:18px;fill:#cbd5e1}.bar{rx:4;ry:4}</style></head><body><div class="container" id="slide" onclick="nextStep()"><svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"><rect width="1200" height="700" fill="#07111d"/><g class="step-item" data-step="0"><text x="20" y="40" font-size="24" fill="#cbd5e1">Trace ID: <tspan fill="#4ade80">abc-123-def-456</tspan> | Total: <tspan fill="#facc15">178ms</tspan></text><line x1="0" y1="60" x2="1200" y2="60" stroke="#334155"/></g><g class="step-item" data-step="1"><text x="20" y="95" class="t">Service / Span</text><text x="285" y="95" class="t">Duration</text><line x1="370" y1="105" x2="1160" y2="105" stroke="#475569"/><g class="t"><text x="385" y="90">0ms</text><text x="535" y="90">30ms</text><text x="685" y="90">60ms</text><text x="835" y="90">90ms</text><text x="985" y="90">120ms</text><text x="1110" y="90">150ms</text></g><g stroke="#243244" stroke-dasharray="3 4"><line x1="385" y1="110" x2="385" y2="650"/><line x1="535" y1="110" x2="535" y2="650"/><line x1="685" y1="110" x2="685" y2="650"/><line x1="835" y1="110" x2="835" y2="650"/><line x1="985" y1="110" x2="985" y2="650"/><line x1="1110" y1="110" x2="1110" y2="650"/></g></g>
<g class="step-item" data-step="2"><text x="25" y="145" class="t" fill="#4ade80">⌄ line-adapter.Receive</text><text x="300" y="145" class="t" fill="#4ade80">45ms</text><rect class="bar" x="385" y="125" width="210" height="22" fill="#4ade80"/><text x="605" y="142" class="t">45ms</text><text x="55" y="185" class="t">├ ValidateWebhook</text><rect class="bar" x="395" y="165" width="45" height="22" fill="#4ade80"/><text x="55" y="220" class="t">├ ParseEvent</text><rect class="bar" x="415" y="200" width="60" height="22" fill="#4ade80"/><text x="55" y="255" class="t">└ NormalizeMessage</text><rect class="bar" x="445" y="235" width="140" height="22" fill="#4ade80"/></g>
<g class="step-item" data-step="3"><line x1="0" y1="285" x2="1200" y2="285" stroke="#243244"/><text x="25" y="325" class="t" fill="#38bdf8">⌄ router.Route</text><text x="300" y="325" class="t" fill="#38bdf8">8ms</text><rect class="bar" x="520" y="305" width="45" height="22" fill="#38bdf8"/><text x="55" y="365" class="t">└ RabbitMQ.Publish</text><rect class="bar" x="520" y="345" width="45" height="22" fill="#38bdf8"/></g>
<g class="step-item" data-step="4"><line x1="0" y1="395" x2="1200" y2="395" stroke="#243244"/><text x="25" y="435" class="t" fill="#fb923c">⌄ persistence.Save</text><text x="300" y="435" class="t" fill="#fb923c">35ms</text><rect class="bar" x="560" y="415" width="180" height="22" fill="#fb923c"/><text x="55" y="475" class="t">├ MongoDB.InsertOne</text><rect class="bar" x="575" y="455" width="145" height="22" fill="#fb923c"/><text x="55" y="510" class="t">└ IndexUpdate</text><rect class="bar" x="720" y="495" width="28" height="22" fill="#fb923c"/></g>
<g class="step-item" data-step="5"><line x1="0" y1="535" x2="1200" y2="535" stroke="#243244"/><text x="25" y="575" class="t" fill="#22d3ee">⌄ analytics.Ingest</text><text x="300" y="575" class="t" fill="#22d3ee">22ms</text><rect class="bar" x="755" y="555" width="110" height="22" fill="#22d3ee"/><text x="25" y="625" class="t" fill="#c084fc">⌄ notification.Push</text><text x="300" y="625" class="t" fill="#c084fc">68ms</text><rect class="bar" x="855" y="605" width="320" height="22" fill="#a855f7"/><rect class="bar" x="920" y="645" width="260" height="22" fill="#ef4444"/><text x="930" y="685" fill="#fb7185" font-size="16">BOTTLENECK: FCM.Push 53ms</text></g></svg></div><div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div><script>
const TOTAL=5;let step=-1;for(let i=0;i<=TOTAL;i++){const d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function render(){document.querySelectorAll("[data-step]").forEach(e=>parseInt(e.dataset.step)<=step?e.classList.add("visible"):e.classList.remove("visible"));for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script></body></html>
