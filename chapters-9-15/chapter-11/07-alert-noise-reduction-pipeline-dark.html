*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#07111d;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;background:#07111d}.step-item{opacity:0;transform:scale(.94);transform-origin:50% 50%;transform-box:fill-box;transition:.45s}.step-item.visible{opacity:1;transform:scale(1)}.arrow-draw,.arrow-dashed{opacity:0;stroke-dasharray:1;stroke-dashoffset:1}.dot{width:8px;height:8px;border-radius:50%;background:#243244;transition:.25s}.dot.done{background:#22c55e}.dot.active{background:#60a5fa;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#94a3b8;display:flex;gap:8px}.key{border:1px solid #334155;background:#1e293b;border-radius:6px;padding:2px 9px}.h{font-size:21px;font-weight:900;fill:#fff}.s{font-size:16px;fill:#e5e7eb}.flow.visible{animation:dash 1.4s linear infinite}@keyframes dash{to{stroke-dashoffset:-20}}</style></head><body><div class="container" id="slide" onclick="nextStep()"><svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"><defs><filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000b"/></filter><marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#60a5fa"/></marker><marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#4ade80"/></marker><marker id="arrP" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#a855f7"/></marker></defs>

<path class="arrow-draw flow" data-step="1" pathLength="1" d="M230 290H305" fill="none" stroke="#60a5fa" stroke-width="5" marker-end="url(#arr)"/><g class="step-item" data-step="1"><text x="320" y="65" class="h" fill="#60a5fa">1 Deduplicate</text><text x="320" y="95" class="s">Same alert from 3 pods becomes 1</text><path d="M260 140C290 170 310 430 260 460L520 420C555 400 560 200 520 180z" fill="#062044" stroke="#2563eb" stroke-width="2"/><text x="330" y="220" class="s">pod-1  -- !</text><text x="330" y="285" class="s">pod-2  -- !</text><text x="330" y="350" class="s">pod-3  -- !</text></g>

<g class="step-item" data-step="5"><rect x="480" y="525" width="260" height="82" rx="8" fill="#111827" stroke="#94a3b8" filter="url(#shadow)"/><text x="610" y="560" text-anchor="middle" class="h">Maintenance Window</text><text x="610" y="586" text-anchor="middle" class="s">Suppress alerts during maintenance</text><rect x="40" y="625" width="1120" height="48" rx="8" fill="#071825" stroke="#334155"/><text x="120" y="656" class="h" fill="#ef4444">47</text><text x="180" y="656" class="s">Raw Alerts</text><text x="330" y="656" class="h" fill="#60a5fa">18</text><text x="390" y="656" class="s">After Dedup</text><text x="550" y="656" class="h" fill="#4ade80">5</text><text x="610" y="656" class="s">Service Groups</text><text x="780" y="656" class="h" fill="#a855f7">20</text><text x="850" y="656" class="s">Routed Alerts</text></g>
</svg></div><div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div><script>
const TOTAL=5;let step=-1;for(let i=0;i<=TOTAL;i++){const d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function isArrow(e){return e.classList.contains("arrow-draw")||e.classList.contains("arrow-dashed")}function showArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.getBoundingClientRect();e.style.transition="opacity .05s ease,stroke-dashoffset .7s ease .05s";e.style.opacity=1;e.style.strokeDashoffset=0;e.classList.add("visible")}function hideArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.classList.remove("visible")}function render(){document.querySelectorAll("[data-step]").forEach(e=>{parseInt(e.dataset.step)<=step?(isArrow(e)?showArrow(e):e.classList.add("visible")):(isArrow(e)?hideArrow(e):e.classList.remove("visible"))});for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script></body></html>
