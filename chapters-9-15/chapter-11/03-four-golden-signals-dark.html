<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Four Golden Signals Dark</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#07111d;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;background:#07111d}.step-item{opacity:0;transform:scale(.94);transform-origin:50% 50%;transform-box:fill-box;transition:.45s}.step-item.visible{opacity:1;transform:scale(1)}.dot{width:8px;height:8px;border-radius:50%;background:#243244;transition:.25s}.dot.done{background:#22c55e}.dot.active{background:#60a5fa;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#94a3b8;display:flex;gap:8px}.key{border:1px solid #334155;background:#1e293b;border-radius:6px;padding:2px 9px}.panel{fill:#071825;stroke-width:2}.h{font-size:42px;font-weight:900}.label{font-size:19px;font-weight:850;fill:#f8fafc}.big{font-size:82px;font-weight:900;fill:#4ade80}</style></head><body><div class="container" id="slide" onclick="nextStep()"><svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"><defs><filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000b"/></filter></defs>
<g class="step-item" data-step="0"><text x="600" y="42" text-anchor="middle" font-size="30" font-weight="900" fill="#fff">Four Golden Signals</text><text x="600" y="68" text-anchor="middle" font-size="15" fill="#94a3b8">Dark operational view for production dashboards.</text></g>
<g class="step-item" data-step="1"><rect x="15" y="75" width="545" height="270" rx="12" class="panel" stroke="#2563eb" filter="url(#shadow)"/><text x="190" y="135" class="h" fill="#3b82f6">LATENCY</text><text x="145" y="190" class="label">P50</text><rect x="205" y="168" width="120" height="28" rx="4" fill="#22c55e"/><text x="445" y="190" class="label" fill="#4ade80">45ms</text><text x="145" y="245" class="label">P95</text><rect x="205" y="223" width="190" height="28" rx="4" fill="#facc15"/><text x="445" y="245" class="label" fill="#facc15">178ms</text><text x="145" y="300" class="label">P99</text><rect x="205" y="278" width="230" height="28" rx="4" fill="#f97316"/><text x="445" y="300" class="label" fill="#f97316">245ms</text><line x1="60" y1="330" x2="500" y2="330" stroke="#ef4444" stroke-width="3" stroke-dasharray="8 8"/></g>
<g class="step-item" data-step="2"><rect x="580" y="75" width="605" height="270" rx="12" class="panel" stroke="#22c55e" filter="url(#shadow)"/><text x="705" y="135" class="h" fill="#4ade80">TRAFFIC</text><text x="960" y="135" font-size="38" font-weight="900" fill="#fff">8.5k msg/hr</text><g class="label"><text x="675" y="185">Line</text><text x="675" y="230">Facebook</text><text x="675" y="275">Slack</text><text x="675" y="320">WhatsApp</text></g><rect x="775" y="165" width="260" height="28" fill="#22c55e"/><rect x="775" y="210" width="205" height="28" fill="#2563eb"/><rect x="775" y="255" width="150" height="28" fill="#7c3aed"/><rect x="775" y="300" width="110" height="28" fill="#06b6d4"/></g>
<g class="step-item" data-step="3"><rect x="15" y="365" width="545" height="270" rx="12" class="panel" stroke="#ef4444" filter="url(#shadow)"/><text x="170" y="430" class="h" fill="#ef4444">ERRORS</text><text x="140" y="540" class="big">0.3%</text><text x="205" y="585" font-size="26" font-weight="900" fill="#fff">25 errors/hr</text><g font-size="20" fill="#fff"><text x="95" y="625">timeout</text><text x="260" y="625" fill="#ef4444">12 errors/hr</text><text x="95" y="655">parse</text><text x="260" y="655" fill="#f59e0b">8 errors/hr</text></g></g>
<g class="step-item" data-step="4"><rect x="580" y="365" width="605" height="270" rx="12" class="panel" stroke="#a855f7" filter="url(#shadow)"/><text x="770" y="430" class="h" fill="#a855f7">SATURATION</text><line x1="670" y1="520" x2="1130" y2="520" stroke="#ef4444" stroke-dasharray="8 8"/><g transform="translate(700,485)"><rect width="70" height="160" rx="9" fill="#071825" stroke="#94a3b8" stroke-width="2"/><rect y="65" width="70" height="95" rx="8" fill="#22c55e"/><text x="35" y="52" text-anchor="middle" font-size="20" font-weight="900" fill="#4ade80">62%</text><text x="35" y="188" text-anchor="middle" class="label">CPU</text></g><g transform="translate(825,485)"><rect width="70" height="160" rx="9" fill="#071825" stroke="#94a3b8" stroke-width="2"/><rect y="48" width="70" height="112" rx="8" fill="#7c3aed"/><text x="35" y="52" text-anchor="middle" font-size="20" font-weight="900" fill="#a855f7">71%</text><text x="35" y="188" text-anchor="middle" class="label">Memory</text></g><g transform="translate(950,485)"><rect width="70" height="160" rx="9" fill="#071825" stroke="#94a3b8" stroke-width="2"/><rect y="88" width="70" height="72" rx="8" fill="#2563eb"/><text x="35" y="52" text-anchor="middle" font-size="20" font-weight="900" fill="#60a5fa">45%</text><text x="35" y="188" text-anchor="middle" class="label">Disk</text></g><g transform="translate(1075,485)"><rect width="70" height="160" rx="9" fill="#071825" stroke="#94a3b8" stroke-width="2"/><rect y="141" width="70" height="19" rx="8" fill="#06b6d4"/><text x="35" y="52" text-anchor="middle" font-size="20" font-weight="900" fill="#22d3ee">12%</text><text x="35" y="188" text-anchor="middle" class="label">Queue</text></g></g>
<g class="step-item" data-step="5"><circle cx="600" cy="360" r="100" fill="#071825" stroke="#fff" stroke-width="4" filter="url(#shadow)"/><text x="600" y="335" text-anchor="middle" font-size="23" font-weight="900" fill="#fff">If you can only</text><text x="600" y="365" text-anchor="middle" font-size="23" font-weight="900" fill="#fff">measure four things,</text><text x="600" y="395" text-anchor="middle" font-size="23" font-weight="900" fill="#facc15">measure these.</text></g>
</svg></div><div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div><script>
const TOTAL=5;let step=-1;for(let i=0;i<=TOTAL;i++){const d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function render(){document.querySelectorAll("[data-step]").forEach(e=>parseInt(e.dataset.step)<=step?e.classList.add("visible"):e.classList.remove("visible"));for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script></body></html>
