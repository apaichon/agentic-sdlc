<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Four Golden Signals Light</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;background:#fbfcff}.step-item{opacity:0;transform:scale(.94);transform-origin:50% 50%;transform-box:fill-box;transition:.45s}.step-item.visible{opacity:1;transform:scale(1)}.dot{width:8px;height:8px;border-radius:50%;background:#d8e0ec;transition:.25s}.dot.done{background:#0e7490}.dot.active{background:#2563eb;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#64748b;display:flex;gap:8px}.key{border:1px solid #cbd5e1;background:#e2e8f0;border-radius:6px;padding:2px 9px}.panel{fill:#fff;stroke-width:3}.h{font-size:42px;font-weight:900}.label{font-size:19px;font-weight:850;fill:#1f3448}.big{font-size:82px;font-weight:900;fill:#16a34a}</style></head><body><div class="container" id="slide" onclick="nextStep()"><svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#e8ecf3"/></pattern><filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#26324a25"/></filter></defs><rect width="1200" height="700" fill="url(#grid)"/>
<g class="step-item" data-step="0"><text x="600" y="40" text-anchor="middle" font-size="30" font-weight="900" fill="#102033">Four Golden Signals</text><text x="600" y="66" text-anchor="middle" font-size="15" fill="#526078">If you can only measure four things, measure these.</text></g>
<g class="step-item" data-step="1"><rect x="25" y="80" width="530" height="260" rx="12" class="panel" stroke="#1d6ed8" filter="url(#shadow)"/><text x="160" y="135" class="h" fill="#1d6ed8">LATENCY</text><text x="80" y="190" class="label">P50</text><rect x="150" y="170" width="120" height="28" rx="4" fill="#22c55e"/><text x="315" y="192" class="label">45ms</text><text x="80" y="245" class="label">P95</text><rect x="150" y="225" width="250" height="28" rx="4" fill="#facc15"/><text x="430" y="247" class="label">178ms</text><text x="80" y="300" class="label">P99</text><rect x="150" y="280" width="310" height="28" rx="4" fill="#f97316"/><text x="485" y="302" class="label">245ms</text><line x1="60" y1="330" x2="500" y2="330" stroke="#ef4444" stroke-width="3" stroke-dasharray="8 8"/></g>
<g class="step-item" data-step="2"><rect x="585" y="80" width="590" height="260" rx="12" class="panel" stroke="#16a34a" filter="url(#shadow)"/><text x="755" y="135" class="h" fill="#15803d">TRAFFIC</text><text x="930" y="135" font-size="36" font-weight="900" fill="#1f3448">8.5k msg/hr</text><g class="label"><text x="665" y="185">Line</text><text x="665" y="225">Facebook</text><text x="665" y="265">Slack</text><text x="665" y="305">WhatsApp</text></g><rect x="760" y="165" width="290" height="24" fill="#22c55e"/><rect x="760" y="205" width="235" height="24" fill="#2563eb"/><rect x="760" y="245" width="170" height="24" fill="#7c3aed"/><rect x="760" y="285" width="210" height="24" fill="#0ea5a5"/></g>
<g class="step-item" data-step="3"><rect x="25" y="365" width="530" height="260" rx="12" class="panel" stroke="#dc2626" filter="url(#shadow)"/><text x="165" y="430" class="h" fill="#dc2626">ERRORS</text><text x="140" y="545" class="big">0.3%</text><text x="175" y="590" font-size="28" font-weight="900" fill="#1f3448">25 errors/hr</text></g>
<g class="step-item" data-step="4"><rect x="585" y="365" width="590" height="260" rx="12" class="panel" stroke="#7c3aed" filter="url(#shadow)"/><text x="760" y="430" class="h" fill="#7c3aed">SATURATION</text><g transform="translate(690,475)"><rect width="60" height="140" rx="9" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/><rect y="55" width="60" height="85" rx="8" fill="#7c3aed"/><text x="30" y="165" text-anchor="middle" font-size="22" font-weight="900" fill="#1f3448">62%</text></g><g transform="translate(800,475)"><rect width="60" height="140" rx="9" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/><rect y="40" width="60" height="100" rx="8" fill="#7c3aed"/><text x="30" y="165" text-anchor="middle" font-size="22" font-weight="900" fill="#1f3448">71%</text></g><g transform="translate(910,475)"><rect width="60" height="140" rx="9" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/><rect y="78" width="60" height="62" rx="8" fill="#2563eb"/><text x="30" y="165" text-anchor="middle" font-size="22" font-weight="900" fill="#1f3448">45%</text></g><g transform="translate(1020,475)"><rect width="60" height="140" rx="9" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/><rect y="123" width="60" height="17" rx="8" fill="#0ea5a5"/><text x="30" y="165" text-anchor="middle" font-size="22" font-weight="900" fill="#1f3448">12%</text></g></g>
<g class="step-item" data-step="5"><path d="M520 255l80-50l80 50v90l-80 50l-80-50z" fill="#243747" stroke="#fff" stroke-width="3" filter="url(#shadow)"/><text x="600" y="275" text-anchor="middle" font-size="24" font-weight="900" fill="#fff">If you can</text><text x="600" y="305" text-anchor="middle" font-size="24" font-weight="900" fill="#fff">only measure</text><text x="600" y="335" text-anchor="middle" font-size="24" font-weight="900" fill="#facc15">four things,</text><text x="600" y="365" text-anchor="middle" font-size="24" font-weight="900" fill="#fff">measure these.</text></g>
</svg></div><div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div><script>
const TOTAL=5;let step=-1;for(let i=0;i<=TOTAL;i++){const d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function render(){document.querySelectorAll("[data-step]").forEach(e=>parseInt(e.dataset.step)<=step?e.classList.add("visible"):e.classList.remove("visible"));for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script></body></html>
