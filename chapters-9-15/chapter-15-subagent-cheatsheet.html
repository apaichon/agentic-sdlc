<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chapter 15 — Sub-Agent Cheatsheet</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none}

svg{width:100%;height:100%;display:block;background:#fbfcff}

.dot{width:8px;height:8px;border-radius:50%;background:#d8e0ec;transition:.25s}
.dot.done{background:#0e7490}
.dot.active{background:#2563eb;transform:scale(1.45)}
#progress{display:flex;gap:8px;margin-top:10px}

.key{border:1px solid #cbd5e1;background:#e2e8f0;border-radius:6px;padding:2px 9px;font-size:12px}
.title{font-size:28px;font-weight:900;fill:#10203f}
.subtitle{font-size:14px;fill:#526078}
.card-title{font-size:14px;font-weight:900;fill:#10203f}
.label{font-size:10px;font-weight:900;letter-spacing:.06em;fill:#64748b}
.body{font-size:12px;fill:#10203f}
.chip{font-size:10px;font-weight:900;fill:#fff}
.agent{font-size:11px;font-weight:900;fill:#fff}
.skill{font-family:"SFMono-Regular","Cascadia Code","Liberation Mono",Menlo,monospace;font-size:11px;fill:#0f172a}
.mono{font-family:"SFMono-Regular","Cascadia Code","Liberation Mono",Menlo,monospace;font-size:11.5px;fill:#0f172a}
.pop.visible{animation:pop .55s ease both}
@keyframes pop{0%{transform:translateY(10px) scale(.94)}70%{transform:translateY(0) scale(1.02)}100%{transform:translateY(0) scale(1)}}

<!-- Step 2: Prompt Template -->

  <g transform="translate(36,344)">

    <rect width="560" height="36" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="24" font-size="13" font-weight="900" fill="#67e8f9">⌨  PROMPT TEMPLATE — copy &amp; fill</text>
    <text x="20" y="62" class="mono" fill="#e2e8f0">Agent({</text>
    <text x="40" y="80" class="mono" fill="#94a3b8">description: </text>
    <text x="135" y="80" class="mono" fill="#fde047">"&lt;3-5 word task&gt;",</text>

</div>
<div id="progress"></div><div id="counter"></div>
<div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div>
<script>
const TOTAL=3;let step=-1;
for(let i=0;i<=TOTAL;i++){const d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}
function render(){document.querySelectorAll("[data-step]").forEach(e=>{parseInt(e.dataset.step)<=step?e.classList.add("visible"):e.classList.remove("visible")});for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}
function nextStep(){if(step<TOTAL){step++;render()}}
function prevStep(){if(step>0){step--;render()}}
document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});
slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});
if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script></body></html>
