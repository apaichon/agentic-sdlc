<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Figure 15.5 Animated - Guardrails and Pitfalls</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;background:#fbfdff}.step-item{opacity:0;transform:scale(.93);transform-origin:50% 50%;transform-box:fill-box;transition:opacity .45s,transform .45s}.step-item.visible{opacity:1;transform:scale(1)}.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;transition:.3s}.dot.done{background:#0e7490}.dot.active{background:#3b82f6;transform:scale(1.4)}#progress-bar{display:flex;gap:8px;margin-top:10px}#step-counter{font-size:12px;color:#94a3b8;margin-top:6px;letter-spacing:.08em}#click-hint{margin-top:14px;font-size:13px;color:#64748b;display:flex;gap:8px}.key{background:#e2e8f0;border:1px solid #cbd5e1;border-radius:6px;padding:2px 10px}.head{font-size:25px;font-weight:900}.main{font-size:15px;font-weight:900;fill:#102033}.sub{font-size:12px;fill:#526176}.num{font-size:15px;font-weight:900;fill:#fff}</style></head><body><div class="container" id="slide" onclick="nextStep()"><svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse"><path d="M26 0H0V26" fill="none" stroke="#e8edf4"/></pattern><filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#1f2d4228"/></filter></defs><rect width="1200" height="700" fill="url(#grid)"/><g class="step-item" data-step="0"><text x="600" y="48" text-anchor="middle" font-size="34" font-weight="900" fill="#102033">Six Guardrails vs Seven Pitfalls</text><text x="600" y="74" text-anchor="middle" font-size="15" fill="#64748b">Agent team safety map</text></g>
<g class="step-item" data-step="1"><g transform="translate(55,92)"><rect width="525" height="500" rx="18" fill="#fff" stroke="#16a34a" stroke-width="3" filter="url(#shadow)"/><rect width="525" height="58" rx="16" fill="#f0fdf4"/><text x="262" y="38" text-anchor="middle" class="head" fill="#16a34a">Six Guardrails</text></g></g><g class="step-item" data-step="2"><g transform="translate(620,92)"><rect width="525" height="500" rx="18" fill="#fff" stroke="#dc2626" stroke-width="3" filter="url(#shadow)"/><rect width="525" height="58" rx="16" fill="#fef2f2"/><text x="262" y="38" text-anchor="middle" class="head" fill="#dc2626">Seven Pitfalls</text></g></g>
<g class="step-item" data-step="3"><g transform="translate(80,170)"><circle cx="18" cy="0" r="16" fill="#16a34a"/><text x="18" y="5" text-anchor="middle" class="num">1</text><text x="52" y="0" class="main">Charter before agents start</text><text x="52" y="19" class="sub">Lock mission and constraints.</text></g><g transform="translate(650,170)"><circle cx="18" cy="0" r="16" fill="#dc2626"/><text x="18" y="5" text-anchor="middle" class="num">1</text><text x="52" y="0" class="main">Skipping Charter -> scope drift</text><text x="52" y="19" class="sub">Agents pursue conflicting goals.</text></g></g><g class="step-item" data-step="4"><g transform="translate(80,235)"><circle cx="18" cy="0" r="16" fill="#16a34a"/><text x="18" y="5" text-anchor="middle" class="num">2</text><text x="52" y="0" class="main">Memory writes every step</text><text x="52" y="19" class="sub">Persist context across agents.</text></g><g transform="translate(650,235)"><circle cx="18" cy="0" r="16" fill="#dc2626"/><text x="18" y="5" text-anchor="middle" class="num">2</text><text x="52" y="0" class="main">No Memory -> context loss</text><text x="52" y="19" class="sub">Agents re-research completed work.</text></g></g><g class="step-item" data-step="5"><g transform="translate(80,300)"><circle cx="18" cy="0" r="16" fill="#16a34a"/><text x="18" y="5" text-anchor="middle" class="num">3</text><text x="52" y="0" class="main">Handoff Packets only</text><text x="52" y="19" class="sub">Use structured artifact transfer.</text></g><g transform="translate(650,300)"><circle cx="18" cy="0" r="16" fill="#dc2626"/><text x="18" y="5" text-anchor="middle" class="num">3</text><text x="52" y="0" class="main">Free-form handoffs -> lost context</text><text x="52" y="19" class="sub">Next agent misses key decisions.</text></g></g><g class="step-item" data-step="6"><g transform="translate(80,365)"><circle cx="18" cy="0" r="16" fill="#16a34a"/><text x="18" y="5" text-anchor="middle" class="num">4</text><text x="52" y="0" class="main">Human gates at plan + release</text><text x="52" y="19" class="sub">Two checkpoints, not constant dispatch.</text></g><g transform="translate(650,365)"><circle cx="18" cy="0" r="16" fill="#dc2626"/><text x="18" y="5" text-anchor="middle" class="num">4</text><text x="52" y="0" class="main">Zero gates -> silent errors</text><text x="52" y="19" class="sub">Bad plan or broken release ships.</text></g></g><g class="step-item" data-step="7"><g transform="translate(80,430)"><circle cx="18" cy="0" r="16" fill="#16a34a"/><text x="18" y="5" text-anchor="middle" class="num">5</text><text x="52" y="0" class="main">Orchestrator routes work</text><text x="52" y="19" class="sub">Delegate handoffs to the team.</text></g><g transform="translate(650,430)"><circle cx="18" cy="0" r="16" fill="#dc2626"/><text x="18" y="5" text-anchor="middle" class="num">5</text><text x="52" y="0" class="main">Human micro-routes everything</text><text x="52" y="19" class="sub">Pipeline slows at every handoff.</text></g></g><g class="step-item" data-step="8"><g transform="translate(80,495)"><circle cx="18" cy="0" r="16" fill="#16a34a"/><text x="18" y="5" text-anchor="middle" class="num">6</text><text x="52" y="0" class="main">One agent per stage</text><text x="52" y="19" class="sub">Prevent write conflicts and duplicate output.</text></g><g transform="translate(650,495)"><circle cx="18" cy="0" r="16" fill="#dc2626"/><text x="18" y="5" text-anchor="middle" class="num">6</text><text x="52" y="0" class="main">Parallel same-stage agents</text><text x="52" y="19" class="sub">Conflicting outputs and merge chaos.</text></g></g><g class="step-item" data-step="9"><g transform="translate(650,558)"><circle cx="18" cy="0" r="16" fill="#dc2626"/><text x="18" y="5" text-anchor="middle" class="num">7</text><text x="52" y="0" class="main">Agent expands scope mid-task</text><text x="52" y="19" class="sub">Unreviewed work enters the codebase.</text></g></g><g class="step-item" data-step="10"><rect x="155" y="620" width="890" height="52" rx="14" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/><text x="600" y="653" text-anchor="middle" font-size="22" font-weight="900" fill="#92400e">Skip any guardrail -> the matched pitfall activates.</text></g></svg></div><div id="progress-bar"></div><div id="step-counter"></div><div id="click-hint"><span class="key">CLICK</span> advance <span class="key">RIGHT-CLICK</span> back <span class="key">← →</span> step</div><script>
const TOTAL=10;let step=-1;function buildDots(){for(let i=0;i<=TOTAL;i++){let d=document.createElement('div');d.className='dot';d.id='dot-'+i;document.getElementById('progress-bar').appendChild(d)}}function render(){document.querySelectorAll('[data-step]').forEach(e=>parseInt(e.dataset.step)<=step?e.classList.add('visible'):e.classList.remove('visible'));for(let i=0;i<=TOTAL;i++){let d=document.getElementById('dot-'+i);d.className='dot'+(i<step?' done':i===step?' active':'')}document.getElementById('step-counter').textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='ArrowRight'){e.preventDefault();nextStep()}if(e.key==='ArrowLeft'){e.preventDefault();prevStep()}if(e.key==='Home'){step=0;render()}if(e.key==='End'){step=TOTAL;render()}});slide.addEventListener('contextmenu',e=>{e.preventDefault();prevStep()});buildDots();if(new URLSearchParams(location.search).has('final')){step=TOTAL;render()}else nextStep();
</script></body></html>
