<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Figure 15.4 Animated - Charter and Team State</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;background:#fbfdff}.step-item{opacity:0;transform:scale(.9);transform-origin:50% 50%;transform-box:fill-box;transition:.5s}.step-item.visible{opacity:1;transform:scale(1)}.arrow-draw{opacity:0;stroke-dasharray:1;stroke-dashoffset:1}.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0}.dot.done{background:#0e7490}.dot.active{background:#3b82f6;transform:scale(1.4)}#progress-bar{display:flex;gap:8px;margin-top:10px}#step-counter{font-size:12px;color:#94a3b8;margin-top:6px;letter-spacing:.08em}#click-hint{margin-top:14px;font-size:13px;color:#64748b;display:flex;gap:8px}.key{background:#e2e8f0;border:1px solid #cbd5e1;border-radius:6px;padding:2px 10px}.head{font-size:26px;font-weight:900}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:16px}.mono .k{font-weight:900}</style></head><body><div class="container" id="slide" onclick="nextStep()"><svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse"><path d="M26 0H0V26" fill="none" stroke="#e8edf4"/></pattern><filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#1f2d4228"/></filter><marker id="arrowMain" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#334155"/></marker></defs><rect width="1200" height="700" fill="url(#grid)"/><g class="step-item" data-step="0"><text x="600" y="52" text-anchor="middle" font-size="36" font-weight="900" fill="#102033">Agent Team Charter and Team State</text></g>

<g class="step-item" data-step="1"><g transform="translate(70,118)"><rect width="435" height="285" rx="16" fill="#fff" stroke="#0e7490" stroke-width="3" filter="url(#shadow)"/><rect width="435" height="72" rx="16" fill="#ecfeff"/><text x="24" y="46" class="head" fill="#0e7490">Agent Team Charter</text><g class="mono"><text x="26" y="115"><tspan class="k" fill="#0e7490">mission:</tspan> deliver adapter feature</text><text x="26" y="145"><tspan class="k" fill="#0e7490">constraints:</tspan> no direct DB writes</text><text x="26" y="175"><tspan class="k" fill="#0e7490">agents:</tspan> Scout, Planner, Builder</text><text x="26" y="205"><tspan class="k" fill="#0e7490">success_criteria:</tspan> tests pass, PR approved</text><text x="26" y="235"><tspan class="k" fill="#0e7490">handoff_format:</tspan> Packet v1</text></g></g></g><g class="step-item" data-step="2"><rect x="540" y="216" width="118" height="36" rx="18" fill="#fff" stroke="#94a3b8" stroke-width="2"/><text x="599" y="240" text-anchor="middle" font-size="14" font-weight="900" fill="#334155">initializes</text></g><g class="step-item" data-step="3"><g transform="translate(710,118)"><rect width="435" height="235" rx="16" fill="#fff" stroke="#2563eb" stroke-width="3" filter="url(#shadow)"/><rect width="435" height="72" rx="16" fill="#eff6ff"/><text x="24" y="46" class="head" fill="#2563eb">Team State</text><g class="mono"><text x="26" y="115"><tspan class="k" fill="#2563eb">current_step:</tspan> 5 - Builder</text><text x="26" y="145"><tspan class="k" fill="#2563eb">completed:</tspan> Scout, Planner x2</text><text x="26" y="175"><tspan class="k" fill="#2563eb">pending:</tspan> Reviewer, Tester, Release</text><text x="26" y="205"><tspan class="k" fill="#2563eb">last_handoff:</tspan> Builder -> Reviewer</text></g></g></g><g class="step-item" data-step="4"><rect x="540" y="406" width="118" height="36" rx="18" fill="#fff" stroke="#94a3b8" stroke-width="2"/><text x="599" y="430" text-anchor="middle" font-size="14" font-weight="900" fill="#334155">generates</text></g><g class="step-item" data-step="5"><g transform="translate(385,455)"><rect width="430" height="170" rx="16" fill="#fff" stroke="#7c3aed" stroke-width="3" filter="url(#shadow)"/><rect width="430" height="68" rx="16" fill="#f5f3ff"/><text x="24" y="43" class="head" fill="#7c3aed">Handoff Packet</text><g class="mono"><text x="28" y="106"><tspan class="k" fill="#7c3aed">from_agent:</tspan> Builder</text><text x="28" y="136"><tspan class="k" fill="#7c3aed">to_agent:</tspan> Reviewer</text><text x="28" y="166"><tspan class="k" fill="#7c3aed">artifact:</tspan> PR #142, diff URL</text></g></g></g><g class="step-item" data-step="6"><text x="600" y="672" text-anchor="middle" font-size="17" fill="#64748b">Charter locks the mission; Team State tracks progress; Handoff Packets move artifacts without human dispatch.</text></g></svg></div><div id="progress-bar"></div><div id="step-counter"></div><div id="click-hint"><span class="key">CLICK</span> advance <span class="key">RIGHT-CLICK</span> back <span class="key">← →</span> step</div><script>
const TOTAL=6;let step=-1;function buildDots(){for(let i=0;i<=TOTAL;i++){let d=document.createElement('div');d.className='dot';d.id='dot-'+i;document.getElementById('progress-bar').appendChild(d)}}function isArrow(e){return e.classList.contains('arrow-draw')}function showArrow(e){e.style.transition='none';e.style.opacity='0';e.style.strokeDashoffset='1';e.getBoundingClientRect();e.style.transition='opacity .05s ease,stroke-dashoffset .6s ease .05s';e.style.opacity='1';e.style.strokeDashoffset='0'}function hideArrow(e){e.style.transition='none';e.style.opacity='0';e.style.strokeDashoffset='1'}function render(){document.querySelectorAll('[data-step]').forEach(e=>parseInt(e.dataset.step)<=step?(isArrow(e)?showArrow(e):e.classList.add('visible')):(isArrow(e)?hideArrow(e):e.classList.remove('visible')));for(let i=0;i<=TOTAL;i++){let d=document.getElementById('dot-'+i);d.className='dot'+(i<step?' done':i===step?' active':'')}document.getElementById('step-counter').textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='ArrowRight'){e.preventDefault();nextStep()}if(e.key==='ArrowLeft'){e.preventDefault();prevStep()}if(e.key==='Home'){step=0;render()}if(e.key==='End'){step=TOTAL;render()}});slide.addEventListener('contextmenu',e=>{e.preventDefault();prevStep()});buildDots();if(new URLSearchParams(location.search).has('final')){step=TOTAL;render()}else nextStep();
</script></body></html>
