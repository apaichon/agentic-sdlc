const TOTAL=9;let step=-1;function buildDots(){for(let i=0;i<=TOTAL;i++){const d=document.createElement('div');d.className='dot';d.id='dot-'+i;document.getElementById('progress-bar').appendChild(d)}}function isArrow(e){return e.classList.contains('arrow-draw')}function showArrow(e){e.style.transition='none';e.style.opacity='0';e.style.strokeDashoffset='1';e.getBoundingClientRect();e.style.transition='opacity .05s ease,stroke-dashoffset .6s ease .05s';e.style.opacity='1';e.style.strokeDashoffset='0'}function hideArrow(e){e.style.transition='none';e.style.opacity='0';e.style.strokeDashoffset='1'}function render(){document.querySelectorAll('[data-step]').forEach(e=>parseInt(e.dataset.step)<=step?(isArrow(e)?showArrow(e):e.classList.add('visible')):(isArrow(e)?hideArrow(e):e.classList.remove('visible')));document.getElementById('center-pulse').classList.toggle('active',step>=1);for(let i=0;i<=TOTAL;i++){const d=document.getElementById('dot-'+i);d.className='dot'+(i<step?' done':i===step?' active':'')}document.getElementById('step-counter').textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='ArrowRight'){e.preventDefault();nextStep()}if(e.key==='ArrowLeft'){e.preventDefault();prevStep()}if(e.key==='Home'){step=0;render()}if(e.key==='End'){step=TOTAL;render()}});slide.addEventListener('contextmenu',e=>{e.preventDefault();prevStep()});buildDots();if(new URLSearchParams(location.search).has('final')){step=TOTAL;render()}else nextStep();
</script></body></html>
