<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Docker Compose Service Topology</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;display:block;background:#fbfcff}.step-item{opacity:0;transform:scale(.9);transform-origin:50% 50%;transform-box:fill-box;transition:opacity .45s ease,transform .45s ease}.step-item.visible{opacity:1;transform:scale(1)}.arrow-draw,.arrow-dashed{opacity:0;stroke-dasharray:1;stroke-dashoffset:1}.dot{width:8px;height:8px;border-radius:50%;background:#d8e0ec;transition:.25s}.dot.done{background:#0e7490}.dot.active{background:#2563eb;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#64748b;display:flex;gap:8px}.key{border:1px solid #cbd5e1;background:#e2e8f0;border-radius:6px;padding:2px 9px;font-size:12px}.h{font-size:20px;font-weight:900;fill:#10203f}.port{font-size:18px;font-weight:900}.label{font-size:14px;font-weight:780;fill:#10203f}.small{font-size:12px;fill:#10203f}.flow.visible{animation:dash 1.4s linear infinite}@keyframes dash{to{stroke-dashoffset:-20}}
</style>
</head>

<path class="arrow-draw flow" data-step="2" pathLength="1" d="M600 177V218" fill="none" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrow)"/>
<g class="step-item" data-step="2"><rect x="15" y="205" width="1170" height="230" rx="10" fill="#f5faff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/><text x="98" y="265" class="h" fill="#1d4ed8">Application Tier</text><rect x="485" y="222" width="230" height="74" rx="8" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="575" y="255" class="h">Message Router</text><text x="612" y="282" class="port" fill="#2563eb">:8080</text><circle cx="525" cy="260" r="10" fill="#2563eb"/><circle cx="505" cy="285" r="10" fill="#2563eb"/><circle cx="545" cy="285" r="10" fill="#2563eb"/><path d="M525 270L505 280M525 270L545 280M525 250V235" stroke="#2563eb" stroke-width="4"/></g>
<path class="arrow-draw flow" data-step="3" pathLength="1" d="M600 296L155 350M600 296L335 350M600 296L515 350M600 296L695 350M600 296L875 350M600 296L1045 350" fill="none" stroke="#1f2937" stroke-width="2.2" marker-end="url(#arrow)"/>
<g class="step-item" data-step="3">
  <g transform="translate(70,360)"><rect width="155" height="72" rx="8" fill="#fff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/><circle cx="40" cy="36" r="22" fill="#16a34a"/><text x="40" y="42" text-anchor="middle" font-size="15" font-weight="900" fill="#fff">LINE</text><text x="88" y="34" class="label">Line</text><text x="88" y="57" class="port" fill="#2563eb">:8081</text></g>
  <g transform="translate(250,360)"><rect width="155" height="72" rx="8" fill="#fff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/><circle cx="40" cy="36" r="22" fill="#1877f2"/><text x="40" y="46" text-anchor="middle" font-size="30" fill="#fff">f</text><text x="88" y="34" class="label">Facebook</text><text x="88" y="57" class="port" fill="#2563eb">:8082</text></g>
  <g transform="translate(430,360)"><rect width="155" height="72" rx="8" fill="#fff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/><text x="40" y="46" text-anchor="middle" font-size="34" fill="#e11d48">sl</text><text x="88" y="34" class="label">Slack</text><text x="88" y="57" class="port" fill="#2563eb">:8083</text></g>
  <g transform="translate(610,360)"><rect width="155" height="72" rx="8" fill="#fff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/><circle cx="40" cy="36" r="22" fill="#22c55e"/><text x="40" y="45" text-anchor="middle" font-size="28" fill="#fff">w</text><text x="88" y="34" class="label">WhatsApp</text><text x="88" y="57" class="port" fill="#2563eb">:8084</text></g>
  <g transform="translate(790,360)"><rect width="155" height="72" rx="8" fill="#fff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/><text x="40" y="46" text-anchor="middle" font-size="34" fill="#4f46e5">T</text><text x="88" y="34" class="label">Teams</text><text x="88" y="57" class="port" fill="#2563eb">:8085</text></g>
  <g transform="translate(970,360)"><rect width="155" height="72" rx="8" fill="#fff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/><text x="40" y="46" text-anchor="middle" font-size="34" fill="#2563eb">sms</text><text x="88" y="34" class="label">SMS Gateway</text><text x="88" y="57" class="port" fill="#2563eb">:8086</text></g>
</g>
<g class="step-item" data-step="4"><rect x="15" y="458" width="1170" height="205" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="2" filter="url(#shadow)"/><text x="34" y="550" class="h" fill="#334155">Infrastructure</text><text x="34" y="574" class="h" fill="#334155">Tier</text></g>
<path class="arrow-dashed flow" data-step="5" pathLength="1" d="M175 432V516M335 432V505M515 432V516M695 432V516M875 432V505M1045 432V516" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
<g class="step-item" data-step="5">
  <g transform="translate(160,520)"><rect width="230" height="80" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/><text x="105" y="35" class="h">RabbitMQ</text><text x="105" y="60" class="port" fill="#f97316">:5672/15672</text></g>
  <g transform="translate(430,520)"><rect width="180" height="80" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/><text x="78" y="35" class="h">MongoDB</text><text x="78" y="60" class="port" fill="#16a34a">:27017</text></g>
  <g transform="translate(650,520)"><rect width="180" height="80" rx="8" fill="#fff5f5" stroke="#dc2626" stroke-width="2"/><text x="88" y="35" class="h">Redis</text><text x="88" y="60" class="port" fill="#dc2626">:6379</text></g>
  <g transform="translate(865,520)"><rect width="240" height="80" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2"/><text x="112" y="35" class="h">ClickHouse</text><text x="112" y="60" class="port" fill="#d97706">:8123/9000</text></g>
</g>
<path class="arrow-draw flow" data-step="6" pathLength="1" d="M275 600V635M520 600V635M740 600V635M985 600V635" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
<g class="step-item" data-step="6"><text x="275" y="665" text-anchor="middle" class="small">rabbitmq_data</text><text x="520" y="665" text-anchor="middle" class="small">mongodb_data</text><text x="740" y="665" text-anchor="middle" class="small">redis_data</text><text x="985" y="665" text-anchor="middle" class="small">clickhouse_data</text></g>
</svg></div><div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div>
<script>
const TOTAL=6;let step=-1;for(let i=0;i<=TOTAL;i++){const d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function isArrow(e){return e.classList.contains("arrow-draw")||e.classList.contains("arrow-dashed")}function showArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.getBoundingClientRect();e.style.transition="opacity .05s ease,stroke-dashoffset .7s ease .05s";e.style.opacity=1;e.style.strokeDashoffset=0;e.classList.add("visible")}function hideArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.classList.remove("visible")}function render(){document.querySelectorAll("[data-step]").forEach(e=>{parseInt(e.dataset.step)<=step?(isArrow(e)?showArrow(e):e.classList.add("visible")):(isArrow(e)?hideArrow(e):e.classList.remove("visible"))});for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script></body></html>
