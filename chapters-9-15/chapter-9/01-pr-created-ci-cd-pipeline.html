<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Created CI/CD Pipeline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;display:block;background:#fbfcff}.step-item{opacity:0;transform:scale(.9);transform-origin:50% 50%;transform-box:fill-box;transition:opacity .45s ease,transform .45s ease}.step-item.visible{opacity:1;transform:scale(1)}.arrow-draw,.arrow-dashed{opacity:0;stroke-dasharray:1;stroke-dashoffset:1}.dot{width:8px;height:8px;border-radius:50%;background:#d8e0ec;transition:.25s}.dot.done{background:#0e7490}.dot.active{background:#2563eb;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#64748b;display:flex;gap:8px}.key{border:1px solid #cbd5e1;background:#e2e8f0;border-radius:6px;padding:2px 9px;font-size:12px}.title{font-size:16px;font-weight:900;fill:#101d3a}.body{font-size:13px;fill:#101d3a}.num{font-size:14px;font-weight:900;fill:#101d3a}.flow.visible{animation:dash 1.4s linear infinite}@keyframes dash{to{stroke-dashoffset:-20}}.pulse.visible{animation:pulse 1.5s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
</style>
</head>
<body>
<div class="container" id="slide" onclick="nextStep()">
<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#e8ecf3"/></pattern>
<filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#26324a25"/></filter>
<marker id="arrowNavy" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#10275a"/></marker>
<marker id="arrowPurple" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#5b21b6"/></marker>
</defs>
<rect width="1200" height="700" fill="url(#grid)"/>
<g class="step-item" data-step="0"><text x="600" y="34" text-anchor="middle" font-size="28" font-weight="900" fill="#101d3a">PR Created CI/CD Pipeline</text><text x="600" y="60" text-anchor="middle" font-size="15" fill="#526078">Small changes move through fast checks, gated deploys, and immediate feedback.</text></g>

<g class="step-item pulse" data-step="1">
  <rect x="480" y="70" width="240" height="62" rx="10" fill="#fff" stroke="#5b21b6" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="520" cy="101" r="20" fill="#6d28d9"/><text x="520" y="108" text-anchor="middle" font-size="22" fill="#fff">gh</text>
  <text x="570" y="109" font-size="25" font-weight="900" fill="#101d3a">PR Created</text>
</g>
<path class="arrow-draw flow" data-step="2" pathLength="1" d="M600 132V168H100V198" fill="none" stroke="#5b21b6" stroke-width="3" marker-end="url(#arrowPurple)"/>
<path class="arrow-draw flow" data-step="5" pathLength="1" d="M600 132V168" fill="none" stroke="#5b21b6" stroke-width="3" marker-end="url(#arrowPurple)"/>

<g class="step-item" data-step="2"><g transform="translate(30,210)"><rect width="135" height="270" rx="10" fill="#f7fff0" stroke="#29a30f" stroke-width="2" filter="url(#shadow)"/><text x="68" y="78" text-anchor="middle" font-size="52" fill="#149223">brush</text><text x="68" y="116" text-anchor="middle" class="title">1. Lint</text><line x1="14" y1="156" x2="121" y2="156" stroke="#94a3b8" stroke-dasharray="6 5"/><text x="68" y="188" text-anchor="middle" class="body">golangci-lint +</text><text x="68" y="210" text-anchor="middle" class="body">ESLint, ~30s</text><circle cx="68" cy="246" r="16" fill="#d9f99d"/><text x="68" y="252" text-anchor="middle" class="num">1</text></g></g>
<path class="arrow-draw flow" data-step="3" pathLength="1" d="M165 345H195" fill="none" stroke="#10275a" stroke-width="4" marker-end="url(#arrowNavy)"/>
<g class="step-item" data-step="3"><g transform="translate(195,210)"><rect width="135" height="270" rx="10" fill="#f7fff8" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/><circle cx="68" cy="58" r="35" fill="#16a34a"/><path d="M48 58l14 15l28-32" stroke="#fff" stroke-width="8" fill="none" stroke-linecap="round"/><text x="68" y="116" text-anchor="middle" class="title">2. Unit Tests</text><line x1="14" y1="156" x2="121" y2="156" stroke="#94a3b8" stroke-dasharray="6 5"/><text x="68" y="188" text-anchor="middle" class="body">7 services in</text><text x="68" y="210" text-anchor="middle" class="body">matrix, ~2 min</text><circle cx="68" cy="246" r="16" fill="#bbf7d0"/><text x="68" y="252" text-anchor="middle" class="num">2</text></g></g>
<path class="arrow-draw flow" data-step="4" pathLength="1" d="M330 345H360" fill="none" stroke="#10275a" stroke-width="4" marker-end="url(#arrowNavy)"/>
<g class="step-item" data-step="4"><g transform="translate(360,210)"><rect width="135" height="270" rx="10" fill="#f0fffd" stroke="#0d9488" stroke-width="2" filter="url(#shadow)"/><text x="68" y="67" text-anchor="middle" font-size="44" fill="#0891b2">ship</text><text x="68" y="116" text-anchor="middle" class="title">3. Integration</text><text x="68" y="138" text-anchor="middle" class="title">Tests</text><line x1="14" y1="156" x2="121" y2="156" stroke="#94a3b8" stroke-dasharray="6 5"/><text x="68" y="188" text-anchor="middle" class="body">testcontainers,</text><text x="68" y="210" text-anchor="middle" class="body">~3 min</text><circle cx="68" cy="246" r="16" fill="#99f6e4"/><text x="68" y="252" text-anchor="middle" class="num">3</text></g></g>
<path class="arrow-draw flow" data-step="5" pathLength="1" d="M495 345H525" fill="none" stroke="#10275a" stroke-width="4" marker-end="url(#arrowNavy)"/>
<g class="step-item" data-step="5"><g transform="translate(525,210)"><rect width="135" height="270" rx="10" fill="#f4faff" stroke="#1d7ee8" stroke-width="2" filter="url(#shadow)"/><text x="68" y="67" text-anchor="middle" font-size="44" fill="#1268d8">ship</text><text x="68" y="116" text-anchor="middle" class="title">4. Docker</text><text x="68" y="138" text-anchor="middle" class="title">Build</text><line x1="14" y1="156" x2="121" y2="156" stroke="#94a3b8" stroke-dasharray="6 5"/><text x="68" y="188" text-anchor="middle" class="body">multi-stage,</text><text x="68" y="210" text-anchor="middle" class="body">BuildKit cache</text><circle cx="68" cy="246" r="16" fill="#bfdbfe"/><text x="68" y="252" text-anchor="middle" class="num">4</text></g></g>
<path class="arrow-draw flow" data-step="6" pathLength="1" d="M660 345H690" fill="none" stroke="#10275a" stroke-width="4" marker-end="url(#arrowNavy)"/>
<g class="step-item" data-step="6"><g transform="translate(690,210)"><rect width="135" height="270" rx="10" fill="#fbf7ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/><path d="M68 32l34 15v35c0 34-34 52-34 52S34 116 34 82V47z" fill="#7c3aed" opacity=".85"/><path d="M50 78l13 13l27-35" stroke="#fff" stroke-width="7" fill="none"/><text x="68" y="116" text-anchor="middle" class="title">5. Security</text><text x="68" y="138" text-anchor="middle" class="title">Scan</text><line x1="14" y1="156" x2="121" y2="156" stroke="#94a3b8" stroke-dasharray="6 5"/><text x="68" y="188" text-anchor="middle" class="body">Trivy CVE scan,</text><text x="68" y="210" text-anchor="middle" class="body">~1 min</text><circle cx="68" cy="246" r="16" fill="#ddd6fe"/><text x="68" y="252" text-anchor="middle" class="num">5</text></g></g>
<path class="arrow-draw flow" data-step="7" pathLength="1" d="M825 345H855" fill="none" stroke="#10275a" stroke-width="4" marker-end="url(#arrowNavy)"/>
<g class="step-item" data-step="7"><g transform="translate(855,210)"><rect width="120" height="270" rx="10" fill="#fff8ed" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/><text x="60" y="68" text-anchor="middle" font-size="34" fill="#f97316">rocket</text><text x="60" y="116" text-anchor="middle" class="title">6. Deploy</text><text x="60" y="138" text-anchor="middle" class="title">Staging</text><line x1="14" y1="156" x2="106" y2="156" stroke="#94a3b8" stroke-dasharray="6 5"/><text x="60" y="188" text-anchor="middle" class="body">smoke tests,</text><text x="60" y="210" text-anchor="middle" class="body">~3 min</text><circle cx="60" cy="246" r="16" fill="#fed7aa"/><text x="60" y="252" text-anchor="middle" class="num">6</text></g></g>
<path class="arrow-draw flow" data-step="8" pathLength="1" d="M975 345H1010" fill="none" stroke="#10275a" stroke-width="4" marker-end="url(#arrowNavy)"/>
<g class="step-item" data-step="8"><path d="M1018 345l24-24l24 24l-24 24z" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/><text x="1042" y="351" text-anchor="middle" font-size="18" fill="#ea580c">user</text><text x="1042" y="405" text-anchor="middle" class="title">Manual</text><text x="1042" y="425" text-anchor="middle" class="title">Approval</text></g>
<path class="arrow-draw flow" data-step="9" pathLength="1" d="M1066 345H1085" fill="none" stroke="#10275a" stroke-width="4" marker-end="url(#arrowNavy)"/>
<g class="step-item" data-step="9"><g transform="translate(1080,210)"><rect width="105" height="270" rx="10" fill="#fff7f5" stroke="#ef321e" stroke-width="2" filter="url(#shadow)"/><text x="52" y="65" text-anchor="middle" font-size="28" fill="#ef321e">flag</text><text x="52" y="116" text-anchor="middle" class="title">7. Deploy</text><text x="52" y="138" text-anchor="middle" class="title">Production</text><line x1="12" y1="156" x2="93" y2="156" stroke="#94a3b8" stroke-dasharray="6 5"/><text x="52" y="188" text-anchor="middle" class="body">rolling</text><text x="52" y="210" text-anchor="middle" class="body">deploy</text><circle cx="52" cy="246" r="16" fill="#fecaca"/><text x="52" y="252" text-anchor="middle" class="num">7</text></g></g>

<path class="arrow-dashed flow" data-step="10" pathLength="1" d="M1160 480V535H95V492" fill="none" stroke="#10275a" stroke-width="3" marker-end="url(#arrowNavy)"/>
<g class="step-item" data-step="10"><rect x="450" y="505" width="330" height="40" rx="8" fill="#fff" stroke="#10275a" stroke-width="2" filter="url(#shadow)"/><text x="480" y="532" font-size="20" fill="#ef4444">!</text><text x="515" y="531" font-size="18" font-weight="900" fill="#101d3a">Any stage fails?</text><text x="655" y="531" font-size="18" font-weight="900" fill="#dc2626">Fix and re-push</text></g>
<g class="step-item" data-step="11"><rect x="110" y="594" width="980" height="70" rx="8" fill="#fff" stroke="#94a3b8" stroke-dasharray="6 5" filter="url(#shadow)"/><circle cx="155" cy="629" r="20" fill="#16a34a"/><text x="155" y="638" text-anchor="middle" font-size="24" fill="#fff">v</text><text x="195" y="624" class="title">All stages pass</text><text x="195" y="646" class="body">Auto-advance</text><circle cx="385" cy="629" r="20" fill="#dc2626"/><text x="385" y="638" text-anchor="middle" font-size="24" fill="#fff">x</text><text x="425" y="624" class="title">Any stage fails</text><text x="425" y="646" class="body">Feedback in PR</text><circle cx="610" cy="629" r="20" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/><text x="650" y="624" class="title">Total pipeline time</text><text x="650" y="646" class="body">~11-14 minutes</text><text x="905" y="624" class="title">Fast feedback</text><text x="905" y="646" class="body">Small changes, fast pipeline</text></g>
</svg>
</div>
<div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div>
<script>
const TOTAL=11;let step=-1;for(let i=0;i<=TOTAL;i++){const d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function isArrow(e){return e.classList.contains("arrow-draw")||e.classList.contains("arrow-dashed")}function showArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.getBoundingClientRect();e.style.transition="opacity .05s ease,stroke-dashoffset .7s ease .05s";e.style.opacity=1;e.style.strokeDashoffset=0;e.classList.add("visible")}function hideArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.classList.remove("visible")}function render(){document.querySelectorAll("[data-step]").forEach(e=>{parseInt(e.dataset.step)<=step?(isArrow(e)?showArrow(e):e.classList.add("visible")):(isArrow(e)?hideArrow(e):e.classList.remove("visible"))});for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script>
</body>
</html>
