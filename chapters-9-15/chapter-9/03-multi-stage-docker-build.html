<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Multi-Stage Docker Build</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;display:block;background:#fbfcff}.step-item{opacity:0;transform:scale(.9);transform-origin:50% 50%;transform-box:fill-box;transition:opacity .45s ease,transform .45s ease}.step-item.visible{opacity:1;transform:scale(1)}.arrow-draw,.arrow-dashed{opacity:0;stroke-dasharray:1;stroke-dashoffset:1}.dot{width:8px;height:8px;border-radius:50%;background:#d8e0ec;transition:.25s}.dot.done{background:#0e7490}.dot.active{background:#2563eb;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#64748b;display:flex;gap:8px}.key{border:1px solid #cbd5e1;background:#e2e8f0;border-radius:6px;padding:2px 9px;font-size:12px}.h{font-size:34px;font-weight:900}.row{font-size:23px;font-weight:850;fill:#10203f}.mb{font-size:24px;font-weight:900}.flow.visible{animation:dash 1.4s linear infinite}@keyframes dash{to{stroke-dashoffset:-20}}.pop.visible{animation:pop .7s ease both}@keyframes pop{0%{transform:scale(.75)}70%{transform:scale(1.08)}100%{transform:scale(1)}}
</style></head><body><div class="container" id="slide" onclick="nextStep()"><svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
<defs><pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#e8ecf3"/></pattern><filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#26324a25"/></filter><marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#2563eb"/></marker></defs><rect width="1200" height="700" fill="url(#grid)"/>
<g class="step-item" data-step="0"><text x="600" y="45" text-anchor="middle" font-size="30" font-weight="900" fill="#10203f">Multi-Stage Docker Build</text><text x="600" y="72" text-anchor="middle" font-size="15" fill="#526078">Cut build-only tooling away from the runtime image.</text></g>
<g class="step-item" data-step="1"><g transform="translate(60,90)"><rect width="445" height="420" rx="12" fill="#f8fbff" stroke="#1d4ed8" stroke-width="3" filter="url(#shadow)"/><text x="160" y="55" class="h" fill="#1d4ed8">Build Stage</text><path d="M95 32l20 10l-20 10l-20-10zM75 55l20 10l20-10M75 75l20 10l20-10" stroke="#1d4ed8" stroke-width="6" fill="none"/>
<g transform="translate(18,95)"><rect width="410" height="72" rx="8" fill="#fff" stroke="#60a5fa"/><text x="90" y="44" class="row">golang:1.22-alpine</text><text x="360" y="44" class="mb" fill="#1d4ed8">350MB</text></g>
<g transform="translate(18,173)"><rect width="410" height="72" rx="8" fill="#fff" stroke="#60a5fa"/><text x="90" y="44" class="row">git + ca-certificates</text><text x="360" y="44" class="mb" fill="#1d4ed8">50MB</text></g>
<g transform="translate(18,251)"><rect width="410" height="72" rx="8" fill="#fff" stroke="#60a5fa"/><text x="90" y="44" class="row">go mod download</text><text x="360" y="44" class="mb" fill="#1d4ed8">200MB</text></g>
<g transform="translate(18,329)"><rect width="410" height="72" rx="8" fill="#fff" stroke="#60a5fa"/><text x="90" y="44" class="row">COPY source + go build</text><text x="360" y="44" class="mb" fill="#1d4ed8">200MB</text></g></g></g>
<path class="arrow-draw flow" data-step="2" pathLength="1" d="M520 345H670" fill="none" stroke="#2563eb" stroke-width="10" stroke-opacity=".8" marker-end="url(#arrowBlue)"/>
<g class="step-item" data-step="2"><text x="595" y="282" text-anchor="middle" font-size="28" fill="#10203f">cut</text><text x="595" y="400" text-anchor="middle" font-size="23" font-weight="900" fill="#10203f">Multi-Stage</text><text x="595" y="428" text-anchor="middle" font-size="23" font-weight="900" fill="#10203f">Build</text></g>
<g class="step-item" data-step="3"><g transform="translate(715,210)"><rect width="425" height="255" rx="12" fill="#f7fff8" stroke="#15803d" stroke-width="3" filter="url(#shadow)"/><text x="125" y="55" font-size="34" font-weight="900" fill="#15803d">Runtime Stage</text><text x="65" y="58" font-size="24" font-weight="900" fill="#15803d">RUN</text><g transform="translate(18,90)"><rect width="390" height="72" rx="8" fill="#fff" stroke="#86efac"/><text x="95" y="44" class="row">distroless/static</text><text x="350" y="44" class="mb" fill="#15803d">2MB</text></g><g transform="translate(18,168)"><rect width="390" height="72" rx="8" fill="#fff" stroke="#86efac"/><text x="95" y="44" class="row">compiled binary</text><text x="350" y="44" class="mb" fill="#15803d">15MB</text></g></g></g>
<g class="step-item pop" data-step="4"><rect x="180" y="520" width="195" height="72" rx="10" fill="#dc2626" stroke="#fecaca" stroke-width="3" filter="url(#shadow)"/><text x="278" y="567" text-anchor="middle" font-size="38" font-weight="900" fill="#fff">~800MB</text><rect x="535" y="490" width="150" height="110" rx="10" fill="#fff" stroke="#15803d" stroke-width="2" filter="url(#shadow)"/><text x="610" y="535" text-anchor="middle" font-size="38" font-weight="900" fill="#15803d">97.9%</text><text x="610" y="570" text-anchor="middle" font-size="28" font-weight="900" fill="#15803d">smaller</text><rect x="830" y="512" width="170" height="68" rx="8" fill="#059669" stroke="#86efac" stroke-width="3" filter="url(#shadow)"/><text x="915" y="556" text-anchor="middle" font-size="38" font-weight="900" fill="#fff">~17MB</text></g>
<path class="arrow-dashed flow" data-step="4" pathLength="1" d="M375 555H535M685 545H830" fill="none" stroke="#15803d" stroke-width="3"/>
<g class="step-item" data-step="5"><g transform="translate(715,605)"><rect width="120" height="62" rx="8" fill="#fff" stroke="#15803d" stroke-dasharray="6 5"/><text x="60" y="39" text-anchor="middle" font-size="16" font-weight="850" fill="#15803d">No shell</text></g><g transform="translate(850,605)"><rect width="130" height="62" rx="8" fill="#fff" stroke="#15803d" stroke-dasharray="6 5"/><text x="65" y="31" text-anchor="middle" font-size="16" font-weight="850" fill="#15803d">No package</text><text x="65" y="50" text-anchor="middle" font-size="16" font-weight="850" fill="#15803d">manager</text></g><g transform="translate(995,605)"><rect width="130" height="62" rx="8" fill="#fff" stroke="#15803d" stroke-dasharray="6 5"/><text x="65" y="39" text-anchor="middle" font-size="16" font-weight="850" fill="#15803d">nonroot user</text></g></g>
</svg></div><div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div><script>
const TOTAL=5;let step=-1;for(let i=0;i<=TOTAL;i++){const d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function isArrow(e){return e.classList.contains("arrow-draw")||e.classList.contains("arrow-dashed")}function showArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.getBoundingClientRect();e.style.transition="opacity .05s ease,stroke-dashoffset .7s ease .05s";e.style.opacity=1;e.style.strokeDashoffset=0;e.classList.add("visible")}function hideArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.classList.remove("visible")}function render(){document.querySelectorAll("[data-step]").forEach(e=>{parseInt(e.dataset.step)<=step?(isArrow(e)?showArrow(e):e.classList.add("visible")):(isArrow(e)?hideArrow(e):e.classList.remove("visible"))});for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script></body></html>
