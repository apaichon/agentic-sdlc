<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 9 Skill & Agent Exercises</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;display:block;background:#fbfcff}.step-item{opacity:0;transform:translateY(14px) scale(.98);transform-origin:50% 50%;transform-box:fill-box;transition:opacity .42s ease,transform .42s ease}.step-item.visible{opacity:1;transform:translateY(0) scale(1)}.dot{width:8px;height:8px;border-radius:50%;background:#d8e0ec;transition:.25s}.dot.done{background:#0e7490}.dot.active{background:#2563eb;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#64748b;display:flex;gap:8px}.key{border:1px solid #cbd5e1;background:#e2e8f0;border-radius:6px;padding:2px 9px;font-size:12px}.title{font-size:30px;font-weight:900;fill:#10203f}.subtitle{font-size:15px;fill:#526078}.card-title{font-size:17px;font-weight:900;fill:#10203f}.label{font-size:11px;font-weight:900;letter-spacing:.08em;fill:#64748b}.body{font-size:13.5px;fill:#10203f}.answer{font-size:13.5px;font-weight:850;fill:#0f172a}.chip{font-size:11px;font-weight:900;fill:#fff}.agent{font-size:12px;font-weight:900;fill:#fff}.skill{font-family:"SFMono-Regular","Cascadia Code","Liberation Mono",Menlo,monospace;font-size:12.5px;fill:#0f172a}.pop.visible{animation:pop .7s ease both}@keyframes pop{0%{transform:translateY(14px) scale(.92)}70%{transform:translateY(0) scale(1.03)}100%{transform:translateY(0) scale(1)}}
</style>
</head>
<body>
<div class="container" id="slide" onclick="nextStep()">
<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#e8ecf3"/></pattern>
<filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#26324a25"/></filter>
</defs>
<rect width="1200" height="700" fill="url(#grid)"/>

<g class="step-item" data-step="0">
  <text x="600" y="42" text-anchor="middle" class="title">Chapter 9 Skill & Agent Exercises</text>
  <text x="600" y="68" text-anchor="middle" class="subtitle">Practice choosing the right Agent, Skill, and artifact for CI/CD and deployment work.</text>
  <rect x="250" y="86" width="700" height="38" rx="19" fill="#e0f2fe" stroke="#0891b2"/>
  <text x="600" y="110" text-anchor="middle" font-size="15" font-weight="900" fill="#0e7490">Question pattern: Who owns it? What Skill helps? What artifact proves readiness?</text>
</g>

<g class="step-item pop" data-step="1">
  <g transform="translate(48,146)">
    <rect width="356" height="210" rx="10" fill="#fff" stroke="#5b21b6" stroke-width="2" filter="url(#shadow)"/>
    <rect width="356" height="42" rx="10" fill="#ede9fe" stroke="#5b21b6"/>
    <circle cx="28" cy="21" r="15" fill="#5b21b6"/><text x="28" y="26" text-anchor="middle" class="chip">9.1</text>
    <text x="55" y="27" class="card-title">CI/CD Pipeline</text>
    <text x="22" y="68" class="label">QUESTION</text>
    <text x="22" y="90" class="body">PR เปิดแล้ว ใครควร own pipeline checks?</text>
    <text x="22" y="117" class="label">EXPECTED ANSWER</text>
    <rect x="22" y="132" width="104" height="24" rx="12" fill="#5b21b6"/><text x="74" y="149" text-anchor="middle" class="agent">DevOps Agent</text>
    <text x="142" y="149" class="skill">ci-pipeline-design</text>
    <text x="22" y="177" class="label">EXERCISE</text>
    <text x="22" y="198" class="answer">Generate `.github/workflows/pr-checks.yml`</text>
  </g>
</g>

<g class="step-item pop" data-step="2">
  <g transform="translate(422,146)">
    <rect width="356" height="210" rx="10" fill="#fff" stroke="#0d9488" stroke-width="2" filter="url(#shadow)"/>
    <rect width="356" height="42" rx="10" fill="#ccfbf1" stroke="#0d9488"/>
    <circle cx="28" cy="21" r="15" fill="#0d9488"/><text x="28" y="26" text-anchor="middle" class="chip">9.2</text>
    <text x="55" y="27" class="card-title">Docker Compose Topology</text>
    <text x="22" y="68" class="label">QUESTION</text>
    <text x="22" y="90" class="body">Local stack ต้องมี service boundary อะไรบ้าง?</text>
    <text x="22" y="117" class="label">EXPECTED ANSWER</text>
    <rect x="22" y="132" width="104" height="24" rx="12" fill="#0d9488"/><text x="74" y="149" text-anchor="middle" class="agent">DevOps Agent</text>
    <text x="142" y="149" class="skill">environment-topology</text>
    <text x="22" y="177" class="label">EXERCISE</text>
    <text x="22" y="198" class="answer">Create `docker-compose.yml` + healthchecks</text>
  </g>
</g>

<g class="step-item pop" data-step="3">
  <g transform="translate(796,146)">
    <rect width="356" height="210" rx="10" fill="#fff" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/>
    <rect width="356" height="42" rx="10" fill="#dbeafe" stroke="#1d4ed8"/>
    <circle cx="28" cy="21" r="15" fill="#1d4ed8"/><text x="28" y="26" text-anchor="middle" class="chip">9.3</text>
    <text x="55" y="27" class="card-title">Multi-Stage Docker Build</text>
    <text x="22" y="68" class="label">QUESTION</text>
    <text x="22" y="90" class="body">ใครควรลด image size และ harden runtime?</text>
    <text x="22" y="117" class="label">EXPECTED ANSWER</text>
    <rect x="22" y="132" width="116" height="24" rx="12" fill="#1d4ed8"/><text x="80" y="149" text-anchor="middle" class="agent">Developer Agent</text>
    <text x="154" y="149" class="skill">dockerfile-hardening</text>
    <text x="22" y="177" class="label">EXERCISE</text>
    <text x="22" y="198" class="answer">Write Dockerfile and explain each stage</text>
  </g>
</g>

<g class="step-item pop" data-step="4">
  <g transform="translate(165,388)">
    <rect width="410" height="210" rx="10" fill="#fff" stroke="#15803d" stroke-width="2" filter="url(#shadow)"/>
    <rect width="410" height="42" rx="10" fill="#dcfce7" stroke="#15803d"/>
    <circle cx="28" cy="21" r="15" fill="#15803d"/><text x="28" y="26" text-anchor="middle" class="chip">9.4</text>
    <text x="55" y="27" class="card-title">Blue-Green Deployment</text>
    <text x="22" y="68" class="label">QUESTION</text>
    <text x="22" y="90" class="body">Traffic switch กับ rollback trigger ควรถูกออกแบบโดยใคร?</text>
    <text x="22" y="117" class="label">EXPECTED ANSWER</text>
    <rect x="22" y="132" width="104" height="24" rx="12" fill="#15803d"/><text x="74" y="149" text-anchor="middle" class="agent">Release Agent</text>
    <text x="142" y="149" class="skill">deployment-strategy</text>
    <text x="22" y="177" class="label">EXERCISE</text>
    <text x="22" y="198" class="answer">Draft rollout plan with health checks and rollback rules</text>
  </g>
</g>

<g class="step-item pop" data-step="5">
  <g transform="translate(625,388)">
    <rect width="410" height="210" rx="10" fill="#fff" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
    <rect width="410" height="42" rx="10" fill="#ffedd5" stroke="#f97316"/>
    <circle cx="28" cy="21" r="15" fill="#f97316"/><text x="28" y="26" text-anchor="middle" class="chip">9.5</text>
    <text x="55" y="27" class="card-title">Production Deploy Workflow</text>
    <text x="22" y="68" class="label">QUESTION</text>
    <text x="22" y="90" class="body">Production release ต้องมี gate และ runbook แบบไหน?</text>
    <text x="22" y="117" class="label">EXPECTED ANSWER</text>
    <rect x="22" y="132" width="104" height="24" rx="12" fill="#f97316"/><text x="74" y="149" text-anchor="middle" class="agent">Release Agent</text>
    <text x="142" y="149" class="skill">production-runbook</text>
    <text x="22" y="177" class="label">EXERCISE</text>
    <text x="22" y="198" class="answer">Create deploy checklist with go/no-go and abort criteria</text>
  </g>
</g>

<g class="step-item" data-step="6">
  <rect x="138" y="620" width="924" height="46" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="648" text-anchor="middle" font-size="16" font-weight="900" fill="#f8fafc">Rule of thumb: Agent owns the outcome, Skill encodes the repeatable workflow, Artifact proves the work is reviewable.</text>
</g>
</svg>
</div>
<div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div>
<script>
const TOTAL=6;let step=-1;for(let i=0;i<=TOTAL;i++){const d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function render(){document.querySelectorAll("[data-step]").forEach(e=>{parseInt(e.dataset.step)<=step?e.classList.add("visible"):e.classList.remove("visible")});for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script>
</body>
</html>
