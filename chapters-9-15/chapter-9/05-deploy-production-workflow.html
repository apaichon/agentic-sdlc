<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Deploy Production Workflow</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;display:block;background:#fbfcff}.step-item{opacity:0;transform:scale(.9);transform-origin:50% 50%;transform-box:fill-box;transition:opacity .45s ease,transform .45s ease}.step-item.visible{opacity:1;transform:scale(1)}.arrow-draw{opacity:0;stroke-dasharray:1;stroke-dashoffset:1}.dot{width:8px;height:8px;border-radius:50%;background:#d8e0ec;transition:.25s}.dot.done{background:#0e7490}.dot.active{background:#2563eb;transform:scale(1.45)}#progress{display:flex;gap:8px;margin-top:10px}#counter{font-size:12px;color:#8491a7;margin-top:6px;letter-spacing:.08em}#hint{margin-top:12px;font-size:13px;color:#64748b;display:flex;gap:8px}.key{border:1px solid #cbd5e1;background:#e2e8f0;border-radius:6px;padding:2px 9px;font-size:12px}.h{font-size:23px;font-weight:900;fill:#10203f}.small{font-size:14px;fill:#10203f}.flow.visible{animation:dash 1.4s linear infinite}@keyframes dash{to{stroke-dashoffset:-20}}.pulse.visible{animation:pulse 1.7s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
</style></head><body><div class="container" id="slide" onclick="nextStep()"><svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
<defs><pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#e8ecf3"/></pattern><filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#26324a25"/></filter><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#10203f"/></marker><marker id="redArrow" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#dc2626"/></marker></defs><rect width="1200" height="700" fill="url(#grid)"/>
<g class="step-item" data-step="0"><rect x="205" y="22" width="790" height="64" rx="8" fill="#fff" stroke="#10203f" stroke-width="3" filter="url(#shadow)"/><rect x="230" y="36" width="48" height="36" rx="4" fill="#1f2937"/><text x="254" y="61" text-anchor="middle" font-size="24" fill="#fff">&gt;_</text><text x="310" y="62" font-size="25" font-weight="900" fill="#10203f">/deploy production message-router,sms-gateway</text></g>
<path class="arrow-draw flow" data-step="1" pathLength="1" d="M600 86V125" fill="none" stroke="#10203f" stroke-width="3" marker-end="url(#arrow)"/>
<g class="step-item" data-step="1"><g transform="translate(280,130)"><rect width="580" height="150" rx="10" fill="#fffaf0" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/><rect x="0" y="0" width="580" height="50" rx="10" fill="#fff7d6" stroke="#f59e0b"/><rect x="20" y="15" width="44" height="44" rx="6" fill="#f59e0b"/><text x="42" y="47" text-anchor="middle" font-size="30" font-weight="900" fill="#fff">1</text><text x="100" y="36" class="h">Pre-flight Checks</text><text x="180" y="82" class="small">CI status:</text><text x="460" y="82" font-size="16" font-weight="900" fill="#15803d">PASS</text><text x="180" y="110" class="small">Security scan:</text><text x="460" y="110" font-size="16" font-weight="900" fill="#15803d">PASS</text><text x="180" y="138" class="small">No active incidents:</text><text x="460" y="138" font-size="16" font-weight="900" fill="#15803d">PASS</text><text x="68" y="130" text-anchor="middle" font-size="28" font-weight="900" fill="#f59e0b">checks</text></g></g>
<path class="arrow-draw flow" data-step="2" pathLength="1" d="M860 230H940V355" fill="none" stroke="#dc2626" stroke-width="4" marker-end="url(#redArrow)"/>
<g class="step-item pulse" data-step="2"><text x="955" y="285" font-size="17" font-weight="800" fill="#10203f">If any</text><text x="955" y="306" font-size="17" font-weight="800" fill="#10203f">check fails</text><rect x="915" y="362" width="100" height="80" rx="8" fill="#fff7f7" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/><circle cx="965" cy="395" r="22" fill="#dc2626"/><text x="965" y="404" text-anchor="middle" font-size="24" font-weight="900" fill="#fff">x</text><text x="965" y="428" text-anchor="middle" font-size="19" font-weight="900" fill="#dc2626">ABORT</text></g>
<path class="arrow-draw flow" data-step="3" pathLength="1" d="M600 280V323" fill="none" stroke="#10203f" stroke-width="3" marker-end="url(#arrow)"/>
<g class="step-item" data-step="3"><g transform="translate(280,326)"><rect width="580" height="105" rx="10" fill="#f2f8ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/><rect width="580" height="45" rx="10" fill="#eff6ff" stroke="#2563eb"/><rect x="20" y="13" width="44" height="44" rx="6" fill="#2563eb"/><text x="42" y="45" text-anchor="middle" font-size="30" font-weight="900" fill="#fff">2</text><text x="100" y="32" class="h">Build Verification</text><text x="95" y="86" text-anchor="middle" font-size="44" fill="#2563eb">ship</text><path d="M210 78H270" stroke="#10203f" stroke-width="4" marker-end="url(#arrow)"/><text x="360" y="78" font-size="38" fill="#2563eb">tag</text><text x="440" y="75" class="small">Tag and push</text><text x="440" y="96" class="small">to registry</text></g></g>
<path class="arrow-draw flow" data-step="4" pathLength="1" d="M600 431V466" fill="none" stroke="#10203f" stroke-width="3" marker-end="url(#arrow)"/>
<g class="step-item" data-step="4"><g transform="translate(280,470)"><rect width="580" height="105" rx="10" fill="#fbf7ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/><rect width="580" height="45" rx="10" fill="#f5f0ff" stroke="#7c3aed"/><rect x="20" y="13" width="44" height="44" rx="6" fill="#7c3aed"/><text x="42" y="45" text-anchor="middle" font-size="30" font-weight="900" fill="#fff">3</text><text x="100" y="32" class="h">Deploy Execution</text><text x="70" y="80" text-anchor="middle" class="small">Load</text><text x="70" y="98" text-anchor="middle" class="small">Balancer</text><text x="220" y="88" text-anchor="middle" class="small">New Version Pods</text><text x="360" y="88" text-anchor="middle" class="small">Database</text><line x1="430" y1="50" x2="430" y2="98" stroke="#94a3b8"/><circle cx="500" cy="78" r="24" fill="#7c3aed"/><text x="500" y="86" text-anchor="middle" font-size="24" fill="#fff">lock</text><text x="500" y="105" text-anchor="middle" class="small">Deploy Lock</text></g></g>
<path class="arrow-draw flow" data-step="5" pathLength="1" d="M600 575V610" fill="none" stroke="#10203f" stroke-width="3" marker-end="url(#arrow)"/>
<g class="step-item" data-step="5"><g transform="translate(280,612)"><rect width="580" height="78" rx="10" fill="#effefe" stroke="#0d9488" stroke-width="2" filter="url(#shadow)"/><rect width="580" height="38" rx="10" fill="#e6fffb" stroke="#0d9488"/><rect x="20" y="10" width="40" height="40" rx="6" fill="#0d9488"/><text x="40" y="39" text-anchor="middle" font-size="27" font-weight="900" fill="#fff">4</text><text x="100" y="28" class="h">Post-Deploy Verification</text><text x="115" y="62" text-anchor="middle" class="small">Smoke tests (Pass)</text><text x="295" y="62" text-anchor="middle" class="small">Prometheus Metrics</text><text x="470" y="62" text-anchor="middle" class="small">Grafana Dashboards</text></g></g>
<g class="step-item" data-step="6"><path d="M172 160H145Q125 160 125 190V640Q125 666 150 666H178" fill="none" stroke="#10203f" stroke-width="4"/><text x="58" y="385" text-anchor="middle" font-size="16" font-weight="900" fill="#10203f">Human-</text><text x="58" y="410" text-anchor="middle" font-size="16" font-weight="900" fill="#10203f">in-the-Loop</text><text x="58" y="435" text-anchor="middle" font-size="16" font-weight="900" fill="#10203f">approves</text><text x="58" y="460" text-anchor="middle" font-size="16" font-weight="900" fill="#10203f">each gate</text></g>
<g class="step-item" data-step="7"><g transform="translate(890,610) scale(.5 .85)"><rect width="580" height="78" rx="10" fill="#f0fff4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/><rect width="580" height="38" rx="10" fill="#e8fbe8" stroke="#16a34a"/><rect x="20" y="10" width="40" height="40" rx="6" fill="#16a34a"/><text x="40" y="39" text-anchor="middle" font-size="27" font-weight="900" fill="#fff">5</text><text x="100" y="28" class="h">Cleanup</text><text x="115" y="62" text-anchor="middle" class="small">Release Lock Cleared</text><text x="295" y="62" text-anchor="middle" class="small">Slack Notification Sent</text><text x="470" y="62" text-anchor="middle" class="small">Deployment Log Updated</text></g></g>
</svg></div><div id="progress"></div><div id="counter"></div><div id="hint"><span class="key">CLICK</span> advance <span class="key">RIGHT CLICK</span> back <span class="key">LEFT/RIGHT</span> step</div><script>
const TOTAL=7;let step=-1;for(let i=0;i<=TOTAL;i++){const d=document.createElement("div");d.className="dot";d.id="dot-"+i;progress.appendChild(d)}function isArrow(e){return e.classList.contains("arrow-draw")}function showArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1;e.getBoundingClientRect();e.style.transition="opacity .05s ease,stroke-dashoffset .7s ease .05s";e.style.opacity=1;e.style.strokeDashoffset=0;e.classList.add("visible")}function hideArrow(e){e.style.transition="none";e.style.opacity=0;e.style.strokeDashoffset=1}function render(){document.querySelectorAll("[data-step]").forEach(e=>{parseInt(e.dataset.step)<=step?(isArrow(e)?showArrow(e):e.classList.add("visible")):(isArrow(e)?hideArrow(e):e.classList.remove("visible"))});for(let i=0;i<=TOTAL;i++){let d=document.getElementById("dot-"+i);d.className="dot"+(i<step?" done":i===step?" active":"")}counter.textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener("keydown",e=>{if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();nextStep()}if(e.key==="ArrowLeft"){e.preventDefault();prevStep()}if(e.key==="Home"){step=0;render()}if(e.key==="End"){step=TOTAL;render()}});slide.addEventListener("contextmenu",e=>{e.preventDefault();prevStep()});if(new URLSearchParams(location.search).has("final")){step=TOTAL;render()}else{nextStep()}
</script></body></html>
