<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 14.3 — Four Workflow Modes: Sync / Async / Parallel / Resync</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#F0F2F5; display:flex; flex-direction:column;
    align-items:center; justify-content:center; min-height:100vh;
    font-family:system-ui,-apple-system,sans-serif; user-select:none;
  }
  .container { width:1200px; height:700px; position:relative; cursor:pointer; }
  svg { width:100%; height:100%; }
  #click-hint { margin-top:14px; font-size:13px; color:#64748b; letter-spacing:.05em; display:flex; align-items:center; gap:8px; }
  #click-hint .key { background:#e2e8f0; border:1px solid #cbd5e1; border-radius:6px; padding:2px 10px; font-size:12px; color:#475569; }
  #step-counter { font-size:12px; color:#94a3b8; margin-top:6px; letter-spacing:.08em; }
  #progress-bar { display:flex; gap:8px; margin-top:10px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#e2e8f0; transition:background .3s, transform .3s; }
  .dot.done   { background:#0E7490; }
  .dot.active { background:#3b82f6; transform:scale(1.4); }
  .step-item { opacity:0; transform:scale(.88); transform-origin:50% 50%; transform-box:fill-box; transition:opacity .5s ease, transform .5s ease; }
  .step-item.visible { opacity:1; transform:scale(1); }
  .badge-item { opacity:0; transform:scale(0); transform-origin:50% 50%; transform-box:fill-box; transition:opacity .4s ease, transform .4s cubic-bezier(.34,1.56,.64,1); }
  .badge-item.visible { opacity:1; transform:scale(1); }
  .arrow-draw   { opacity:0; stroke-dasharray:1; stroke-dashoffset:1; }
  .arrow-dashed { opacity:0; stroke-dasharray:0.06 0.03; stroke-dashoffset:1; }
</style>
</head>
<body>
<div class="container" id="slide" onclick="nextStep()">
<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000022"/>
  </filter>
</defs>
<rect width="1200" height="700" fill="#F8F9FA"/>

<!-- STEP 0: Title -->
<g class="step-item" data-step="0">
  <text x="600" y="34" text-anchor="middle" font-size="21" font-weight="800" fill="#1F2937">Four Workflow Modes: Sync · Async · Parallel · Resync</text>
  <text x="600" y="54" text-anchor="middle" font-size="13" fill="#6B7280">Choose the right mode per task · If A's output is B's input → NOT parallel, must sequence</text>
</g>

<!-- STEP 1: SYNC card (blue) -->
<g class="step-item" data-step="1">
  <g transform="translate(28,70)">
    <rect width="268" height="490" rx="16" fill="#dbeafe" stroke="#93c5fd" stroke-width="2.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="268" height="70" rx="16" fill="#1d4ed8"/>
    <rect x="0" y="52" width="268" height="18" fill="#1d4ed8"/>
    <text x="134" y="30" text-anchor="middle" font-size="22">💬</text>
    <text x="134" y="56" text-anchor="middle" font-size="18" font-weight="900" fill="white">SYNC</text>
    <text x="134" y="96" text-anchor="middle" font-size="11" fill="#1d4ed8">Use when alignment</text>
    <text x="134" y="112" text-anchor="middle" font-size="11" fill="#1d4ed8">is needed first.</text>
    <line x1="20" y1="126" x2="248" y2="126" stroke="#93c5fd" stroke-width="1"/>
    <text x="20" y="152" font-size="12" fill="#1e3a5f">●  High ambiguity</text>
    <text x="20" y="176" font-size="12" fill="#1e3a5f">●  Multiple unknowns</text>
    <text x="20" y="200" font-size="12" fill="#1e3a5f">●  Clarify together</text>
    <text x="20" y="216" font-size="11" fill="#1e3a5f">    before starting</text>
    <line x1="20" y1="236" x2="248" y2="236" stroke="#93c5fd" stroke-width="1"/>
    <text x="134" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">WHEN TO USE</text>
    <text x="134" y="292" text-anchor="middle" font-size="11" fill="#1e3a5f">Sprint planning</text>
    <text x="134" y="308" text-anchor="middle" font-size="11" fill="#1e3a5f">Architecture decision</text>
    <text x="134" y="324" text-anchor="middle" font-size="11" fill="#1e3a5f">Incident triage</text>
    <rect x="20" y="420" width="228" height="52" rx="10" fill="#1d4ed8"/>
    <text x="134" y="441" text-anchor="middle" font-size="10" font-weight="700" fill="white">Pattern: agents wait for</text>
    <text x="134" y="457" text-anchor="middle" font-size="10" fill="#bfdbfe">human to clarify before proceeding</text>
  </g>
</g>

<!-- STEP 2: ASYNC card (amber) -->
<g class="step-item" data-step="2">
  <g transform="translate(322,70)">
    <rect width="268" height="490" rx="16" fill="#fef9c3" stroke="#fde68a" stroke-width="2.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="268" height="70" rx="16" fill="#d97706"/>
    <rect x="0" y="52" width="268" height="18" fill="#d97706"/>
    <text x="134" y="30" text-anchor="middle" font-size="22">⏰</text>
    <text x="134" y="56" text-anchor="middle" font-size="18" font-weight="900" fill="white">ASYNC</text>
    <text x="134" y="96" text-anchor="middle" font-size="11" fill="#92400e">Use when the task is</text>
    <text x="134" y="112" text-anchor="middle" font-size="11" fill="#92400e">clear and well-defined.</text>
    <line x1="20" y1="126" x2="248" y2="126" stroke="#fde68a" stroke-width="1"/>
    <text x="20" y="152" font-size="12" fill="#78350f">●  Clear requirements</text>
    <text x="20" y="176" font-size="12" fill="#78350f">●  Minimal ambiguity</text>
    <text x="20" y="200" font-size="12" fill="#78350f">●  Execute and review</text>
    <text x="20" y="216" font-size="11" fill="#78350f">    later</text>
    <line x1="20" y1="236" x2="248" y2="236" stroke="#fde68a" stroke-width="1"/>
    <text x="134" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">WHEN TO USE</text>
    <text x="134" y="292" text-anchor="middle" font-size="11" fill="#78350f">Implement known feature</text>
    <text x="134" y="308" text-anchor="middle" font-size="11" fill="#78350f">Write tests for spec</text>
    <text x="134" y="324" text-anchor="middle" font-size="11" fill="#78350f">Generate documentation</text>
    <rect x="20" y="420" width="228" height="52" rx="10" fill="#d97706"/>
    <text x="134" y="441" text-anchor="middle" font-size="10" font-weight="700" fill="white">Pattern: human assigns task,</text>
    <text x="134" y="457" text-anchor="middle" font-size="10" fill="#fef3c7">agent executes, human reviews result</text>
  </g>
</g>

<!-- STEP 3: PARALLEL card (green) -->
<g class="step-item" data-step="3">
  <g transform="translate(616,70)">
    <rect width="268" height="490" rx="16" fill="#dcfce7" stroke="#86efac" stroke-width="2.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="268" height="70" rx="16" fill="#15803d"/>
    <rect x="0" y="52" width="268" height="18" fill="#15803d"/>
    <text x="134" y="30" text-anchor="middle" font-size="22">👥</text>
    <text x="134" y="56" text-anchor="middle" font-size="18" font-weight="900" fill="white">PARALLEL</text>
    <text x="134" y="96" text-anchor="middle" font-size="11" fill="#15803d">Use when work can happen</text>
    <text x="134" y="112" text-anchor="middle" font-size="11" fill="#15803d">independently.</text>
    <line x1="20" y1="126" x2="248" y2="126" stroke="#86efac" stroke-width="1"/>
    <text x="20" y="152" font-size="12" fill="#14532d">●  Independent outputs</text>
    <text x="20" y="176" font-size="12" fill="#14532d">●  No dependency chain</text>
    <text x="20" y="200" font-size="12" fill="#14532d">●  Execute simultaneously</text>
    <text x="20" y="216" font-size="11" fill="#14532d">    in parallel</text>
    <line x1="20" y1="236" x2="248" y2="236" stroke="#86efac" stroke-width="1"/>
    <text x="134" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">WHEN TO USE</text>
    <text x="134" y="292" text-anchor="middle" font-size="11" fill="#14532d">Write tests + implement feature</text>
    <text x="134" y="308" text-anchor="middle" font-size="11" fill="#14532d">Multiple independent modules</text>
    <text x="134" y="324" text-anchor="middle" font-size="11" fill="#14532d">Research + draft simultaneously</text>
    <rect x="20" y="420" width="228" height="52" rx="10" fill="#15803d"/>
    <text x="134" y="441" text-anchor="middle" font-size="10" font-weight="700" fill="white">Pattern: multiple agents work</text>
    <text x="134" y="457" text-anchor="middle" font-size="10" fill="#bbf7d0">concurrently on separate branches</text>
  </g>
</g>

<!-- STEP 4: RESYNC card (purple) -->
<g class="step-item" data-step="4">
  <g transform="translate(910,70)">
    <rect width="262" height="490" rx="16" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="262" height="70" rx="16" fill="#7c3aed"/>
    <rect x="0" y="52" width="262" height="18" fill="#7c3aed"/>
    <text x="131" y="30" text-anchor="middle" font-size="22">🔄</text>
    <text x="131" y="56" text-anchor="middle" font-size="18" font-weight="900" fill="white">RESYNC</text>
    <text x="131" y="96" text-anchor="middle" font-size="11" fill="#7c3aed">Use to recombine, align,</text>
    <text x="131" y="112" text-anchor="middle" font-size="11" fill="#7c3aed">and decide next steps.</text>
    <line x1="20" y1="126" x2="242" y2="126" stroke="#c4b5fd" stroke-width="1"/>
    <text x="20" y="152" font-size="12" fill="#4c1d95">●  Merge outputs</text>
    <text x="20" y="176" font-size="12" fill="#4c1d95">●  Resolve conflicts</text>
    <text x="20" y="200" font-size="12" fill="#4c1d95">●  Align on next steps</text>
    <text x="20" y="216" font-size="11" fill="#4c1d95">    together</text>
    <line x1="20" y1="236" x2="242" y2="236" stroke="#c4b5fd" stroke-width="1"/>
    <text x="131" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">WHEN TO USE</text>
    <text x="131" y="292" text-anchor="middle" font-size="11" fill="#4c1d95">After parallel wave completes</text>
    <text x="131" y="308" text-anchor="middle" font-size="11" fill="#4c1d95">Before major milestone</text>
    <text x="131" y="324" text-anchor="middle" font-size="11" fill="#4c1d95">After sprint retrospective</text>
    <rect x="20" y="420" width="222" height="52" rx="10" fill="#7c3aed"/>
    <text x="131" y="441" text-anchor="middle" font-size="10" font-weight="700" fill="white">Pattern: fan-in all outputs,</text>
    <text x="131" y="457" text-anchor="middle" font-size="10" fill="#e9d5ff">human reviews + decides direction</text>
  </g>
</g>

<!-- STEP 5: Warning banner -->
<g class="step-item" data-step="5">
  <g transform="translate(28,578)">
    <rect width="1144" height="56" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
    <text x="30" y="24" font-size="16">⚠️</text>
    <text x="572" y="24" text-anchor="middle" font-size="14" font-weight="800" fill="#dc2626">Critical Rule</text>
    <text x="572" y="46" text-anchor="middle" font-size="13" fill="#374151">If A's output is B's input → NOT parallel, must sequence. Parallel only when outputs are truly independent.</text>
  </g>
</g>

</svg>
</div>
<div id="progress-bar"></div>
<div id="step-counter">STEP 0 / 5</div>
<div id="click-hint"><span class="key">CLICK</span> advance &nbsp;·&nbsp; <span class="key">RIGHT-CLICK</span> back &nbsp;·&nbsp; <span class="key">← →</span> step &nbsp;·&nbsp; <span class="key">Home</span> start &nbsp;·&nbsp; <span class="key">End</span> finish</div>
<script>
const TOTAL = 5; let step = -1;
function buildDots() {
  const bar = document.getElementById('progress-bar');
  for (let i=0;i<=TOTAL;i++){const d=document.createElement('div');d.className='dot';d.id='dot-'+i;bar.appendChild(d);}
}
function showArrow(el){el.style.transition='none';el.style.opacity='0';el.style.strokeDashoffset='1';el.getBoundingClientRect();el.style.transition='opacity 0.05s ease, stroke-dashoffset 0.6s ease 0.05s';el.style.opacity='1';el.style.strokeDashoffset='0';}
function hideArrow(el){el.style.transition='none';el.style.opacity='0';el.style.strokeDashoffset='1';}
function isArrow(el){return el.classList.contains('arrow-draw')||el.classList.contains('arrow-dashed');}
function render(){
  document.querySelectorAll('[data-step]').forEach(el=>{
    if(parseInt(el.dataset.step)<=step){if(isArrow(el))showArrow(el);else el.classList.add('visible');}
    else{if(isArrow(el))hideArrow(el);else el.classList.remove('visible');}
  });
  for(let i=0;i<=TOTAL;i++){const d=document.getElementById('dot-'+i);if(d)d.className='dot'+(i<step?' done':i===step?' active':'');}
  document.getElementById('step-counter').textContent=`STEP ${step} / ${TOTAL}`;
}
function nextStep(){if(step<TOTAL){step++;render();}}
function prevStep(){if(step>0){step--;render();}}
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='ArrowRight'){e.preventDefault();nextStep();}
  if(e.key==='ArrowLeft'){e.preventDefault();prevStep();}
  if(e.key==='Home'){step=0;render();}
  if(e.key==='End'){step=TOTAL;render();}
});
document.getElementById('slide').addEventListener('contextmenu',e=>{e.preventDefault();prevStep();});
buildDots();nextStep();
</script>
</body>
</html>
