<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Figure 15.2 Animated - Agent Team Comparison</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif;user-select:none}.container{width:1200px;height:700px;cursor:pointer}svg{width:100%;height:100%;background:#fbfdff}.step-item{opacity:0;transform:scale(.9);transform-origin:50% 50%;transform-box:fill-box;transition:opacity .5s,transform .5s}.step-item.visible{opacity:1;transform:scale(1)}.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0}.dot.done{background:#0e7490}.dot.active{background:#3b82f6;transform:scale(1.4)}#progress-bar{display:flex;gap:8px;margin-top:10px}#step-counter{font-size:12px;color:#94a3b8;margin-top:6px;letter-spacing:.08em}#click-hint{margin-top:14px;font-size:13px;color:#64748b;display:flex;gap:8px}.key{background:#e2e8f0;border:1px solid #cbd5e1;border-radius:6px;padding:2px 10px}.h{font-size:26px;font-weight:900}.k{font-size:16px;font-weight:900;fill:#506176}.v{font-size:19px;font-weight:850;fill:#102033}</style></head><body><div class="container" id="slide" onclick="nextStep()"><svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse"><path d="M26 0H0V26" fill="none" stroke="#e8edf4"/></pattern><filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#1f2d4228"/></filter></defs><rect width="1200" height="700" fill="url(#grid)"/><g class="step-item" data-step="0"><text x="600" y="52" text-anchor="middle" font-size="36" font-weight="900" fill="#102033">Agent Team vs Role-Based Subagents</text></g>
<g class="step-item" data-step="1"><g transform="translate(55,105)"><rect width="515" height="470" rx="18" fill="#fff" stroke="#d97706" stroke-width="3" filter="url(#shadow)"/><rect width="515" height="76" rx="16" fill="#fff7ed"/><text x="258" y="47" text-anchor="middle" class="h" fill="#d97706">Role-Based Subagents</text></g></g><g class="step-item" data-step="2"><g transform="translate(630,105)"><rect width="515" height="470" rx="18" fill="#fff" stroke="#0e7490" stroke-width="3" filter="url(#shadow)"/><rect width="515" height="76" rx="16" fill="#ecfeff"/><text x="258" y="47" text-anchor="middle" class="h" fill="#0e7490">Agent Team Model</text></g></g><g class="step-item" data-step="3"><line x1="600" y1="105" x2="600" y2="575" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round"/></g>
<g class="step-item" data-step="4"><g transform="translate(85,205)"><text class="k">SPLIT AXIS</text><text x="150" class="v">Job title: PM / Dev / QA</text></g><g transform="translate(660,205)"><text class="k">SPLIT AXIS</text><text x="150" class="v">Workflow stage: Scout -> Build -> Test</text></g></g><g class="step-item" data-step="5"><g transform="translate(85,295)"><text class="k">TRIGGER</text><text x="150" class="v">Human assigns by role name</text></g><g transform="translate(660,295)"><text class="k">TRIGGER</text><text x="150" class="v">Orchestrator routes by completion</text></g></g><g class="step-item" data-step="6"><g transform="translate(85,385)"><text class="k">SCOPE</text><text x="150" class="v">One role for the entire feature</text></g><g transform="translate(660,385)"><text class="k">SCOPE</text><text x="150" class="v">Current stage only; next agent takes over</text></g></g><g class="step-item" data-step="7"><g transform="translate(85,475)"><text class="k">CONTEXT</text><text x="150" class="v">Role-scoped files and local memory</text></g><g transform="translate(660,475)"><text class="k">CONTEXT</text><text x="150" class="v">Shared Team State plus Memory agent</text></g></g><g class="step-item" data-step="8"><rect x="155" y="603" width="890" height="58" rx="14" fill="#ecfeff" stroke="#0e7490" stroke-width="2"/><text x="600" y="640" text-anchor="middle" font-size="24" font-weight="900" fill="#0f4f5f">Agent Team removes the human dispatch bottleneck.</text></g></svg></div><div id="progress-bar"></div><div id="step-counter"></div><div id="click-hint"><span class="key">CLICK</span> advance <span class="key">RIGHT-CLICK</span> back <span class="key">← →</span> step</div><script>
const TOTAL=8;let step=-1;function buildDots(){for(let i=0;i<=TOTAL;i++){let d=document.createElement('div');d.className='dot';d.id='dot-'+i;document.getElementById('progress-bar').appendChild(d)}}function render(){document.querySelectorAll('[data-step]').forEach(e=>parseInt(e.dataset.step)<=step?e.classList.add('visible'):e.classList.remove('visible'));for(let i=0;i<=TOTAL;i++){let d=document.getElementById('dot-'+i);d.className='dot'+(i<step?' done':i===step?' active':'')}document.getElementById('step-counter').textContent=`STEP ${step} / ${TOTAL}`}function nextStep(){if(step<TOTAL){step++;render()}}function prevStep(){if(step>0){step--;render()}}document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='ArrowRight'){e.preventDefault();nextStep()}if(e.key==='ArrowLeft'){e.preventDefault();prevStep()}if(e.key==='Home'){step=0;render()}if(e.key==='End'){step=TOTAL;render()}});slide.addEventListener('contextmenu',e=>{e.preventDefault();prevStep()});buildDots();if(new URLSearchParams(location.search).has('final')){step=TOTAL;render()}else nextStep();
</script></body></html>
