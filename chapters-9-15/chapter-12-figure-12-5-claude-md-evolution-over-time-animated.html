<div id="click-hint"><span class="key">CLICK</span> advance &nbsp;·&nbsp; <span class="key">RIGHT-CLICK</span> back &nbsp;·&nbsp; <span class="key">← →</span> step &nbsp;·&nbsp; <span class="key">Home</span> start &nbsp;·&nbsp; <span class="key">End</span> finish</div>
<script>
const TOTAL = 11;
let step = -1;
function buildDots() {
  const bar = document.getElementById('progress-bar');
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.createElement('div'); d.className = 'dot'; d.id = 'dot-' + i;
    bar.appendChild(d);
  }
}
function showArrow(el) {
  el.style.transition = 'none';
  el.style.opacity = '0';
  el.style.strokeDashoffset = '1';
  el.getBoundingClientRect();
  el.style.transition = 'opacity 0.05s ease, stroke-dashoffset 0.6s ease 0.05s';
  el.style.opacity = '1';
  el.style.strokeDashoffset = '0';
}
function hideArrow(el) {
  el.style.transition = 'none';
  el.style.opacity = '0';
  el.style.strokeDashoffset = '1';
}
function isArrow(el) {
  return el.classList.contains('arrow-draw') || el.classList.contains('arrow-dashed');
}
function render() {
  document.querySelectorAll('[data-step]').forEach(el => {
    if (parseInt(el.dataset.step) <= step) {
      if (isArrow(el)) showArrow(el); else el.classList.add('visible');
    } else {
      if (isArrow(el)) hideArrow(el); else el.classList.remove('visible');
    }
  });
  for (let i = 0; i <= TOTAL; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) d.className = 'dot' + (i < step ? ' done' : i === step ? ' active' : '');
  }
  document.getElementById('step-counter').textContent = `STEP ${step} / ${TOTAL}`;
}
function nextStep() { if (step < TOTAL) { step++; render(); } }
function prevStep()  { if (step > 0)    { step--; render(); } }
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
  if (e.key === 'Home') { step = 0; render(); }
  if (e.key === 'End')  { step = TOTAL; render(); }
});
document.getElementById('slide').addEventListener('contextmenu', e => { e.preventDefault(); prevStep(); });
buildDots();
nextStep();
</script>
