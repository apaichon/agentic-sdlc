<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic SDLC Course Overview - Animated</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh;
    background:#e9eef6;
    color:#111827;
    font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:18px;
    user-select:none;
  }
  .container {
    width:min(1200px, 100%);
    aspect-ratio:12/7;
    position:relative;
    cursor:pointer;
  }
  svg {
    width:100%;
    height:100%;
    display:block;
    border-radius:28px;
    filter:drop-shadow(0 26px 60px rgba(15,23,42,.18));
  }
  .step-item {
    opacity:0;
    transform:scale(.92);
    transform-origin:50% 50%;
    transform-box:fill-box;
    transition:opacity .48s ease, transform .48s ease;
  }
  .step-item.visible { opacity:1; transform:scale(1); }
  .arrow-draw { opacity:0; stroke-dasharray:1; stroke-dashoffset:1; }
  .pulse.active { animation:pulse 2.5s ease-in-out infinite; }
  .float.active { animation:float 3.4s ease-in-out infinite; }
  .scan.active { animation:scan 2.8s linear infinite; }
  #progress-bar { display:flex; gap:8px; margin-top:12px; }
  .dot { width:8px; height:8px; border-radius:999px; background:#cbd5e1; transition:.25s; }
  .dot.done { background:#0f766e; }
  .dot.active { background:#4f46e5; transform:scale(1.45); }
  #step-counter { margin-top:8px; color:#64748b; font-size:12px; font-weight:800; letter-spacing:.08em; }
  #click-hint { margin-top:8px; color:#64748b; font-size:13px; display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .key { background:#fff; border:1px solid #cbd5e1; border-radius:6px; padding:2px 8px; color:#334155; font-size:12px; font-weight:800; }
  @keyframes pulse { 0%,100%{opacity:.16; transform:scale(1)} 50%{opacity:.42; transform:scale(1.08)} }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  @keyframes scan { from{stroke-dashoffset:0} to{stroke-dashoffset:-24} }
  @media (max-width:760px) {
    body { padding:0; justify-content:flex-start; }
    .container { width:100vw; height:auto; margin-top:12px; }
    #click-hint { padding:0 12px 12px; }
  }
</style>
</head>

<script>
const TOTAL = 6;
let step = -1;

function buildDots() {
  const bar = document.getElementById('progress-bar');
  for (let i = 0; i <= TOTAL; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.id = 'dot-' + i;
    bar.appendChild(dot);
  }
}

function isArrow(el) {
  return el.classList.contains('arrow-draw');
}

function showArrow(el) {
  el.style.transition = 'none';
  el.style.opacity = '0';
  el.style.strokeDashoffset = '1';
  el.getBoundingClientRect();
  el.style.transition = 'opacity .08s ease, stroke-dashoffset .7s ease .05s';
  el.style.opacity = '1';
  el.style.strokeDashoffset = '0';
}

function hideArrow(el) {
  el.style.transition = 'none';
  el.style.opacity = '0';
  el.style.strokeDashoffset = '1';
}

function render() {
  document.querySelectorAll('[data-step]').forEach(el => {
    const shouldShow = Number(el.dataset.step) <= step;
    if (isArrow(el)) {
      shouldShow ? showArrow(el) : hideArrow(el);
    } else {
      el.classList.toggle('visible', shouldShow);
    }
  });
  document.querySelectorAll('.pulse, .float, .scan').forEach(el => {
    el.classList.toggle('active', step >= 1);
  });
  for (let i = 0; i <= TOTAL; i++) {
    const dot = document.getElementById('dot-' + i);
    dot.className = 'dot' + (i < step ? ' done' : i === step ? ' active' : '');
  }
  document.getElementById('step-counter').textContent = `STEP ${Math.max(step, 0)} / ${TOTAL}`;
}

function setStep(next) {
  step = Math.max(0, Math.min(TOTAL, next));
  render();
}

function nextStep() {
  setStep(step + 1);
}

function prevStep() {
  setStep(step - 1);
}

document.getElementById('slide').addEventListener('contextmenu', event => {
  event.preventDefault();
  prevStep();
});

document.addEventListener('keydown', event => {
  if (event.key === 'ArrowRight' || event.key === ' ') {
    event.preventDefault();
    nextStep();
  }
  if (event.key === 'ArrowLeft') {
    event.preventDefault();
    prevStep();
  }
  if (event.key === 'Home') setStep(0);
  if (event.key === 'End') setStep(TOTAL);
});

buildDots();
setStep(0);
</script>
